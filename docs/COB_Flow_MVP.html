<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef } = React;

/* =========================================================================
   COB FLOW — COB PRIMACY DECISION ENGINE
   Pure function. Input: { accident, coverages, member, plans }.
   Output: { primaryId, secondaryId, rule, ruleDescription, citations,
             confidence, rationale, warnings, reviewRequired }
   Positioning: decision-support / analyst assist. Engine recommends;
   the analyst signs. Low-confidence and high-dollar always require review.
   DEPLOYMENT: Wisconsin pilot only. The no-fault PIP rule is dormant
   (NO_FAULT_STATES is empty); it remains in the codebase for the Phase 3
   expansion to MI/FL/NY/etc. but never fires in the Wisconsin build.
   ========================================================================= */
// Wisconsin-only build: NO_FAULT_STATES intentionally empty. The no-fault PIP
// rule path below remains for forward-compatibility but cannot match.
const NO_FAULT_STATES = new Set([]);

/* =========================================================================
   WISCONSIN OVERLAY
   For any claim with accidentState === "WI", surface Wisconsin-specific
   recovery constraints alongside the primacy determination:
     - Made-whole doctrine (Rimes v. State Farm; Vogt v. Schroeder; Petta)
     - Modified comparative negligence with 51% bar (Wis. Stat. § 895.045)
     - Common-fund doctrine (pro-rata attorney fee share)
     - Wis. Stat. § 632.32 (auto policies), § 631.43 (subrogation rights)
   These are recovery constraints, not primacy rules. They wrap the
   primacy determination with an overlay block consumed by the Recovery
   Tracker and the demand-letter document.
   ========================================================================= */
function wisconsinOverlay({ accident, liability, recovery, coverages }) {
  if (accident?.state !== "WI") return null;

  const sfErisaPresent = (coverages || []).some(
    c => c.planType === "HEALTH" && c.funding === "SELF_FUNDED" && c.hasCoordinationClause
  );

  const flags = [];
  flags.push({
    name: "MADE_WHOLE_DOCTRINE",
    label: "Made-whole doctrine evaluation required",
    note: sfErisaPresent
      ? "Self-funded ERISA plan present — clear plan language may preempt the made-whole doctrine. Review plan COB/reimbursement provisions for explicit waiver before proceeding."
      : "Wisconsin made-whole doctrine applies unless explicitly waived in plan language. Confirm claimant has been made whole for ALL elements of damage before pursuing recovery.",
    citations: ["Rimes v. State Farm Mut. Auto. Ins. Co., 106 Wis. 2d 263 (1982)",
                "Vogt v. Schroeder, 129 Wis. 2d 3 (1986)",
                "Petta v. ABC Ins. Co., 692 N.W.2d 639 (2005)"],
  });
  flags.push({
    name: "COMMON_FUND_DOCTRINE",
    label: "Common-fund pro-rata attorney fee share applies",
    note: "Where claimant's attorney creates the recovery fund, plan typically bears pro-rata share of attorney fees out of recovery. Compute: plan_share = (plan_recovery / total_recovery) × attorney_fee.",
    citations: ["Wisconsin common-law (equitable doctrine)"],
  });
  flags.push({
    name: "WI_STATUTORY_FRAMEWORK",
    label: "Wisconsin statutory framework",
    note: "Wisconsin is at-fault (NOT no-fault). Auto policies governed by Wis. Stat. § 632.32. Subrogation rights under insurance contracts governed by Wis. Stat. § 631.43. Med-Pay is optional under § 632.32.",
    citations: ["Wis. Stat. § 632.32", "Wis. Stat. § 631.43"],
  });

  // Comparative-negligence calculation when fault data is present
  let compNeg = null;
  if (liability && typeof liability.claimantFaultPct === "number") {
    const claimantPct = liability.claimantFaultPct;
    const defendantPct = 100 - claimantPct;
    const totalMedical = recovery?.totalMedicalPaid ?? 0;
    if (claimantPct >= 51) {
      compNeg = {
        barred: true,
        claimantFaultPct: claimantPct,
        recoverable: 0,
        rationale: `Claimant is ${claimantPct}% at fault — at or above the 51% bar under Wis. Stat. § 895.045. Recovery barred. Recommend closing the claim without further recovery activity.`,
        citation: "Wis. Stat. § 895.045 (modified comparative negligence)",
      };
    } else {
      compNeg = {
        barred: false,
        claimantFaultPct: claimantPct,
        defendantFaultPct: defendantPct,
        totalMedicalPaid: totalMedical,
        recoverable: +(totalMedical * (defendantPct / 100)).toFixed(2),
        rationale: `Claimant is ${claimantPct}% at fault. Recoverable medical damages = $${totalMedical.toLocaleString()} × ${defendantPct}% = $${(totalMedical * defendantPct / 100).toFixed(2)} under modified comparative negligence.`,
        citation: "Wis. Stat. § 895.045",
      };
    }
  }

  // Common-fund pro-rata calculation when settlement & fee data is present
  let commonFund = null;
  if (recovery && typeof recovery.totalSettlement === "number"
      && typeof recovery.attorneyFee === "number"
      && typeof recovery.planGrossRecovery === "number") {
    const proRataShare = +(
      (recovery.planGrossRecovery / recovery.totalSettlement) * recovery.attorneyFee
    ).toFixed(2);
    commonFund = {
      planGrossRecovery: recovery.planGrossRecovery,
      totalSettlement: recovery.totalSettlement,
      attorneyFee: recovery.attorneyFee,
      planAttorneyFeeShare: proRataShare,
      netPlanRecovery: +(recovery.planGrossRecovery - proRataShare).toFixed(2),
      rationale: `Common-fund pro-rata: ($${recovery.planGrossRecovery.toLocaleString()} / $${recovery.totalSettlement.toLocaleString()}) × $${recovery.attorneyFee.toLocaleString()} = $${proRataShare.toLocaleString()} share of attorney fee. Net plan recovery = $${(recovery.planGrossRecovery - proRataShare).toLocaleString()}.`,
    };
  }

  return {
    state: "WI",
    isAtFault: true,
    isNoFault: false,
    flags,
    compNeg,
    commonFund,
    selfFundedErisaPresent: sfErisaPresent,
    summary: sfErisaPresent
      ? "Wisconsin claim. Made-whole MAY be preempted by self-funded ERISA plan language; review plan document before sending demand. Common-fund and comparative-negligence analysis required regardless."
      : "Wisconsin claim. Made-whole doctrine applies. Common-fund pro-rata and comparative-negligence analysis required before any recovery action.",
  };
}

function determineCobPrimacy({ accident, member, coverages }) {
  const warnings = [];
  const out = (extra) => ({ confidence: "HIGH", warnings, reviewRequired: false, ...extra });

  if (!coverages || coverages.length < 2) {
    return out({
      rule: "INSUFFICIENT_DATA",
      ruleDescription: "Only one coverage on file — no coordination required.",
      citations: [],
      confidence: "N/A",
      rationale: "Coordination of benefits applies only when two or more plans cover the same loss. Add additional coverage to determine primacy.",
      reviewRequired: false,
      primaryId: coverages?.[0]?.id || null,
      secondaryId: null,
    });
  }

  const health = coverages.filter(c => c.planType === "HEALTH");
  const auto   = coverages.filter(c => c.planType === "AUTO_PIP" || c.planType === "AUTO_MEDPAY");
  const medicare = coverages.find(c => c.planType === "MEDICARE");
  const medicaid = coverages.find(c => c.planType === "MEDICAID");
  const tfl      = coverages.find(c => c.planType === "TFL");

  // --- Rule 0: Medicaid payer of last resort (federal statute) ----------
  // Medicaid is ALWAYS last by law. If Medicaid present with any other coverage,
  // determine primacy among the others and place Medicaid at the bottom.
  if (medicaid && coverages.length >= 2) {
    const others = coverages.filter(c => c.id !== medicaid.id);
    if (others.length === 1) {
      return out({
        rule: "MEDICAID_PAYER_OF_LAST_RESORT",
        ruleDescription: "Medicaid is the payer of last resort by federal statute.",
        citations: ["Social Security Act § 1902(a)(25)", "42 CFR 433 Subpart D"],
        rationale: `Medicaid (${medicaid.payerName}) is statutorily the payer of last resort. ${others[0].payerName} pays first; Medicaid pays only after the third party is exhausted (via cost avoidance or pay-and-chase).`,
        primaryId: others[0].id,
        secondaryId: medicaid.id,
      });
    }
    const sub = determineCobPrimacy({ accident, member, coverages: others });
    return out({
      rule: "MEDICAID_PAYER_OF_LAST_RESORT",
      ruleDescription: `Medicaid is the payer of last resort. Primacy among non-Medicaid coverages determined by ${sub.rule}.`,
      citations: ["Social Security Act § 1902(a)(25)", "42 CFR 433 Subpart D", ...(sub.citations || [])],
      confidence: sub.confidence,
      rationale: `${sub.rationale} Medicaid (${medicaid.payerName}) is tertiary by statute and pays only after all other third parties are exhausted.`,
      primaryId: sub.primaryId,
      secondaryId: sub.secondaryId,
      warnings: [...(sub.warnings || []), `Medicaid (${medicaid.payerName}) tertiary by federal law.`],
      reviewRequired: sub.reviewRequired,
    });
  }

  // --- Rule 0b: TRICARE for Life (TFL) ----------------------------------
  // Medicare primary, TFL secondary (different from regular TRICARE).
  if (tfl && medicare) {
    return out({
      rule: "TFL_MEDICARE_PRIMARY",
      ruleDescription: "TRICARE for Life: Medicare is primary, TFL is secondary.",
      citations: ["10 U.S.C. § 1086(d)", "CMS NTP Module 5"],
      rationale: `Member has Medicare and TRICARE for Life. Medicare pays first; TFL pays the remaining Medicare cost-sharing for TRICARE-covered services.`,
      primaryId: medicare.id,
      secondaryId: tfl.id,
    });
  }

  // --- Rule 1: Auto accident + no-fault PIP state -----------------------
  if (accident?.isAuto && auto.length && NO_FAULT_STATES.has(accident.state)) {
    const autoCov = auto[0];
    const healthCov = health[0];
    if (healthCov?.funding === "SELF_FUNDED" && healthCov.hasCoordinationClause && autoCov.hasExcessClause) {
      warnings.push("ERISA self-funded plan with valid COB clause meets excess auto clause — case law splits; review controlling circuit.");
      return out({
        rule: "ERISA_VS_AUTO_EXCESS",
        ruleDescription: "Self-funded ERISA plan with COB clause vs. auto excess clause — ERISA preemption analysis required.",
        citations: ["ERISA § 514", "Buckley v. American Medical Security, 973 F. Supp. 1005"],
        confidence: "MEDIUM",
        reviewRequired: true,
        rationale: `${accident.state} is a mandatory no-fault state, which would normally make ${autoCov.payerName} (auto PIP) primary. However, ${healthCov.payerName} is a self-funded ERISA plan with a coordination clause, and the auto policy contains an excess clause. Federal courts have split on which clause controls; the controlling circuit's precedent should be reviewed before sending demand.`,
        primaryId: autoCov.id,
        secondaryId: healthCov.id,
      });
    }
    return out({
      rule: "MANDATORY_NO_FAULT_PIP",
      ruleDescription: `${accident.state} mandatory no-fault — auto PIP is primary for accident-related medical expenses up to PIP limits.`,
      citations: [accident.state === "MI" ? "MCL 500.3105" : `${accident.state} no-fault statute`],
      rationale: `Loss occurred in ${accident.state}, a mandatory no-fault state. ${autoCov.payerName} ${autoCov.planType === "AUTO_PIP" ? "PIP" : "med-pay"} coverage is primary for accident-related medical expenses up to applicable policy limits. ${health[0] ? `${health[0].payerName} health plan is secondary for any expenses exceeding the auto limit or not covered by PIP.` : ""}`,
      primaryId: autoCov.id,
      secondaryId: health[0]?.id || null,
    });
  }

  // --- Rule 1b: Auto accident in non-no-fault state with med-pay --------
  if (accident?.isAuto && auto.length) {
    const autoCov = auto[0];
    if (autoCov.planType === "AUTO_MEDPAY") {
      return out({
        rule: "AUTO_MEDPAY_OPTIONAL",
        ruleDescription: "Auto med-pay in a non-no-fault state — typically secondary, but plan COB language controls.",
        citations: ["State insurance code (varies)"],
        confidence: "MEDIUM",
        reviewRequired: true,
        rationale: `${accident.state} is not a mandatory no-fault state. Med-pay coverage from ${autoCov.payerName} may be primary or secondary depending on the health plan's COB language and the auto policy's coordination provisions. Review both plan documents.`,
        primaryId: health[0]?.id || autoCov.id,
        secondaryId: health[0] ? autoCov.id : null,
      });
    }
  }

  // --- Rule 2: Medicare Secondary Payer (working aged / disability / ESRD)
  if (medicare && health.length) {
    const employerCov = health.find(c => c.basis === "ACTIVE_EMPLOYEE" || c.basis === "SPOUSE_OF_ACTIVE");
    const cobraCov = health.find(c => c.basis === "COBRA");

    // ESRD coordination period — 30 months, EGHP/COBRA primary
    if (medicare.medicareReason === "ESRD") {
      const ghp = employerCov || cobraCov;
      if (ghp && (medicare.esrdMonthsElapsed ?? 0) < 30) {
        return out({
          rule: "MSP_ESRD_COORDINATION",
          ruleDescription: "MSP — ESRD coordination period (first 30 months: EGHP/COBRA primary).",
          citations: ["42 U.S.C. § 1395y(b)(1)(C)"],
          rationale: `Member is Medicare-entitled on the basis of ESRD and is in month ${medicare.esrdMonthsElapsed} of the 30-month coordination period. ${ghp.payerName} is primary; Medicare is secondary until the 30-month period ends.`,
          primaryId: ghp.id,
          secondaryId: medicare.id,
        });
      }
    }

    // Disability MSP — under 65, group size >= 100
    if (employerCov && member.age < 65 && medicare.medicareReason === "DISABILITY") {
      if (employerCov.employerSize === "L" || (employerCov.employerHeadcount ?? 0) >= 100) {
        return out({
          rule: "MSP_DISABILITY",
          ruleDescription: "MSP — disability provision (employer headcount ≥100).",
          citations: ["42 U.S.C. § 1395y(b)(1)(B)"],
          rationale: `Member is under 65, Medicare-entitled by disability, and covered as an active employee under ${employerCov.payerName} where the employer has 100+ employees. EGHP is primary; Medicare is secondary.`,
          primaryId: employerCov.id,
          secondaryId: medicare.id,
        });
      }
      warnings.push("Disability MSP trigger requires employer headcount ≥100 — confirm group size before relying on this determination.");
    }

    // Working aged MSP — age >= 65, group size >= 20
    if (employerCov && member.age >= 65) {
      const sizeOk = employerCov.employerSize === "L"
                  || employerCov.employerSize === "M"
                  || (employerCov.employerHeadcount ?? 0) >= 20;
      if (sizeOk) {
        return out({
          rule: "MSP_WORKING_AGED",
          ruleDescription: "MSP — working aged provision (employer headcount ≥20).",
          citations: ["42 U.S.C. § 1395y(b)(1)(A)", "42 C.F.R. § 411.170"],
          rationale: `Member is ≥65 and covered as an active employee (or spouse of one) under ${employerCov.payerName}${employerCov.employerHeadcount ? ` (${employerCov.employerHeadcount} employees)` : ""}. EGHP is primary; Medicare is secondary under the working-aged MSP rule.`,
          primaryId: employerCov.id,
          secondaryId: medicare.id,
        });
      }
      // Employer too small — Medicare is primary
      return out({
        rule: "MSP_SMALL_EMPLOYER_EXCEPTION",
        ruleDescription: "Small employer exception — Medicare primary when EGHP employer headcount <20.",
        citations: ["42 U.S.C. § 1395y(b)(1)(A)"],
        rationale: `Member is ≥65 and covered under ${employerCov.payerName} but the employer has fewer than 20 employees. Working-aged MSP does not apply. Medicare is primary.`,
        primaryId: medicare.id,
        secondaryId: employerCov.id,
      });
    }

    return out({
      rule: "MEDICARE_PRIMARY",
      ruleDescription: "Medicare is primary; supplemental/retiree coverage is secondary.",
      citations: ["42 U.S.C. § 1395y(b)"],
      rationale: `No MSP trigger applies (no qualifying active-employee coverage). Medicare is primary; ${health[0]?.payerName || "other coverage"} is secondary.`,
      primaryId: medicare.id,
      secondaryId: health[0]?.id || null,
    });
  }

  // --- Rule 3: Employee vs Dependent ------------------------------------
  const asEmployee = health.find(c => c.basis === "ACTIVE_EMPLOYEE" || c.basis === "RETIREE");
  const asDependent = health.find(c => c.basis === "DEPENDENT_SPOUSE" || c.basis === "DEPENDENT_CHILD");
  if (asEmployee && asDependent) {
    return out({
      rule: "EMPLOYEE_OVER_DEPENDENT",
      ruleDescription: "A plan covering the patient as an employee is primary to a plan covering them as a dependent.",
      citations: ["NAIC Model COB Regulation § 6(D)(1)"],
      rationale: `${asEmployee.payerName} covers ${member.firstName} as ${asEmployee.basis === "RETIREE" ? "a retiree" : "an active employee"}. ${asDependent.payerName} covers them as a dependent. The employee-coverage plan is primary.`,
      primaryId: asEmployee.id,
      secondaryId: asDependent.id,
    });
  }

  // --- Rule 3b: Active employee vs retiree/COBRA ------------------------
  const active = health.find(c => c.basis === "ACTIVE_EMPLOYEE");
  const retOrCobra = health.find(c => c.basis === "RETIREE" || c.basis === "COBRA");
  if (active && retOrCobra) {
    return out({
      rule: "ACTIVE_OVER_RETIREE",
      ruleDescription: "Active-employee coverage is primary to retiree/COBRA coverage.",
      citations: ["NAIC Model COB Regulation § 6(D)(2)"],
      rationale: `${active.payerName} covers ${member.firstName} as an active employee; ${retOrCobra.payerName} covers them as ${retOrCobra.basis === "COBRA" ? "a COBRA continuant" : "a retiree"}. Active is primary.`,
      primaryId: active.id,
      secondaryId: retOrCobra.id,
    });
  }

  // --- Rule 4: Dependent child — birthday rule --------------------------
  const childCovs = health.filter(c => c.basis === "DEPENDENT_CHILD");
  if (childCovs.length >= 2 && member.relationship === "CHILD") {
    if (member.qmcso?.primaryCoverageId) {
      const ordered = member.qmcso.primaryCoverageId;
      const primary = childCovs.find(c => c.id === ordered);
      const secondary = childCovs.find(c => c.id !== ordered);
      return out({
        rule: "QMCSO_COURT_ORDER",
        ruleDescription: "Court order (QMCSO) controls — overrides birthday rule.",
        citations: ["ERISA § 609(a)", "29 U.S.C. § 1169"],
        rationale: `A Qualified Medical Child Support Order on file designates ${primary?.payerName} as primary for ${member.firstName}.`,
        primaryId: primary?.id,
        secondaryId: secondary?.id,
      });
    }
    if (member.parentsSeparated) {
      // Custodial parent first
      const custodial = childCovs.find(c => c.subscriberRole === "CUSTODIAL_PARENT");
      const nonCustodial = childCovs.find(c => c.subscriberRole === "NON_CUSTODIAL_PARENT");
      if (custodial && nonCustodial) {
        return out({
          rule: "SEPARATED_PARENTS_CUSTODY_ORDER",
          ruleDescription: "Custodial parent's plan is primary when parents are separated/divorced without QMCSO.",
          citations: ["NAIC Model COB Regulation § 6(D)(4)"],
          rationale: `Parents are separated/divorced with no court order. Custodial parent (${custodial.subscriberName}) plan ${custodial.payerName} is primary; non-custodial parent plan ${nonCustodial.payerName} is secondary.`,
          primaryId: custodial.id,
          secondaryId: nonCustodial.id,
        });
      }
    }
    // Birthday rule
    const [a, b] = childCovs;
    const aDate = parseMonthDay(a.subscriberDob);
    const bDate = parseMonthDay(b.subscriberDob);
    if (aDate && bDate) {
      let primary, secondary;
      if (aDate < bDate)      { primary = a; secondary = b; }
      else if (bDate < aDate) { primary = b; secondary = a; }
      else {
        // tie — longer coverage
        primary = (a.effectiveDate <= b.effectiveDate) ? a : b;
        secondary = primary === a ? b : a;
        warnings.push("Tie on birthday — fell back to longer-coverage rule.");
      }
      return out({
        rule: "BIRTHDAY_RULE",
        ruleDescription: "Birthday rule — parent with earlier birthday (month/day) is primary.",
        citations: ["NAIC Model COB Regulation § 6(D)(3)", "Catholic Diocese of Biloxi Supp. Med. Plan (5th Cir.)"],
        rationale: `Both parents cover ${member.firstName} as a dependent child. ${primary.subscriberName} (DOB ${primary.subscriberDob}) has the earlier birthday in the calendar year, so ${primary.payerName} is primary over ${secondary.payerName}.`,
        primaryId: primary.id,
        secondaryId: secondary.id,
      });
    }
  }

  // --- Rule 5: ERISA self-funded coordination ---------------------------
  if (health.length === 2) {
    const sf = health.find(c => c.funding === "SELF_FUNDED" && c.hasCoordinationClause);
    const fi = health.find(c => c.funding === "FULLY_INSURED");
    if (sf && fi) {
      if (sf.hasEscapeClause) {
        warnings.push("Self-funded plan's escape clause is unenforceable under federal common law (McGurl, PM Group Life). Ignoring escape clause.");
      }
      return out({
        rule: "ERISA_SELF_FUNDED_PREEMPTION",
        ruleDescription: "Self-funded ERISA plan's COB terms preempt conflicting state COB; escape clauses unenforceable.",
        citations: ["ERISA § 514", "McGurl v. Trucking Employees of N. Jersey Welfare Fund", "PM Group Life Ins. Co. v. Western Growers Assurance Trust"],
        confidence: "MEDIUM",
        rationale: `${sf.payerName} is a self-funded ERISA plan with a coordination clause. ${fi.payerName} is fully-insured. Apply ERISA plan's COB terms; any escape clause in ${sf.payerName} is unenforceable under federal common law.`,
        primaryId: fi.id,  // fully-insured typically primary when ERISA plan has secondary COB
        secondaryId: sf.id,
        reviewRequired: true,
      });
    }
  }

  // --- Rule 6: Longer/shorter fallback ----------------------------------
  if (health.length >= 2) {
    const sorted = [...health].sort((a, b) => (a.effectiveDate || "9999").localeCompare(b.effectiveDate || "9999"));
    warnings.push("No higher-priority rule fired — applied longer/shorter fallback.");
    return out({
      rule: "LONGER_SHORTER",
      ruleDescription: "Longer-coverage rule — the plan that has covered the patient longest is primary.",
      citations: ["NAIC Model COB Regulation § 6(D)(7)"],
      confidence: "LOW",
      reviewRequired: true,
      rationale: `No employee/dependent, birthday, or ERISA priority rule applied. ${sorted[0].payerName} has covered ${member.firstName} since ${sorted[0].effectiveDate}, longer than ${sorted[1].payerName} (since ${sorted[1].effectiveDate}). ${sorted[0].payerName} is primary by the longer-coverage rule.`,
      primaryId: sorted[0].id,
      secondaryId: sorted[1].id,
    });
  }

  return out({
    rule: "UNDETERMINED",
    ruleDescription: "Insufficient information to determine primacy automatically.",
    citations: [],
    confidence: "LOW",
    reviewRequired: true,
    rationale: "The available coverage and member data did not match any decision rule. Manual review required.",
    primaryId: coverages[0]?.id,
    secondaryId: coverages[1]?.id,
  });
}

function parseMonthDay(yyyyMmDd) {
  if (!yyyyMmDd) return null;
  const [, m, d] = yyyyMmDd.split("-");
  if (!m || !d) return null;
  return parseInt(m, 10) * 100 + parseInt(d, 10);
}

/* =========================================================================
   TRIAGE RULES — flags subrogation potential from claim data
   ========================================================================= */
const TRAUMA_ICD_PREFIXES = ["S", "T0", "T1", "T2", "T3", "T4", "T5", "T6", "T7", "V"]; // S=injuries, T0-T7=poisoning/burns, V=transport accident
function triageClaim(claim) {
  const signals = [];
  let score = 0;
  if (claim.accidentIndicator === "Y") { signals.push("Accident-related indicator present"); score += 40; }
  if (claim.placeOfService === "23")    { signals.push("Place of service: Emergency Room"); score += 20; }
  if (claim.placeOfService === "21")    { signals.push("Place of service: Inpatient Hospital"); score += 15; }
  const traumaDx = (claim.diagnosisCodes || []).filter(d => TRAUMA_ICD_PREFIXES.some(p => d.startsWith(p)));
  if (traumaDx.length) { signals.push(`Diagnosis/Trauma Code Edit hit: ${traumaDx.join(", ")}`); score += 30; }
  if (claim.billedAmount > 25000) { signals.push("High-dollar claim (>$25k)"); score += 10; }
  if ((claim.providerSpecialty || "").toLowerCase().includes("orthop")) { signals.push("Orthopedic provider"); score += 5; }
  return {
    hasSubrogationPotential: score >= 40,
    score,
    signals,
    recommendedAction: score >= 60 ? "OPEN_RECOVERY" : score >= 40 ? "INVESTIGATE" : "NO_ACTION",
  };
}

/* ---------- Dialog (replaces window.prompt/confirm) ---------- */
function Dialog({ config, onClose }) {
  const [values, setValues] = useState({});
  useEffect(() => {
    if (!config) return;
    const initial = {};
    (config.fields || []).forEach(f => { initial[f.name] = f.defaultValue ?? ""; });
    setValues(initial);
  }, [config]);
  if (!config) return null;
  const update = (name, v) => setValues(prev => ({ ...prev, [name]: v }));
  const valid = (config.fields || []).every(f => !f.required || (values[f.name] || "").trim().length > 0);
  const submit = () => {
    if (!valid) return;
    if (config.onSubmit) config.onSubmit(values);
    onClose();
  };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
         onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="absolute inset-0 bg-slate-900/50" />
      <div className="relative bg-white rounded-lg shadow-2xl max-w-md w-full p-5 space-y-4 fade-in">
        <div>
          <h3 className="text-base font-semibold text-slate-900">{config.title}</h3>
          {config.description && <p className="text-sm text-slate-600 mt-1 whitespace-pre-line">{config.description}</p>}
        </div>
        {config.body && <div>{config.body}</div>}
        {(config.fields || []).length > 0 && (
          <div className="space-y-3">
            {config.fields.map((f, i) => (
              <div key={f.name}>
                <label className="text-xs font-medium text-slate-700 block mb-1">
                  {f.label}{f.required ? <span className="text-rose-600"> *</span> : null}
                </label>
                {f.type === "textarea" ? (
                  <textarea
                    autoFocus={i === 0}
                    value={values[f.name] ?? ""}
                    onChange={e => update(f.name, e.target.value)}
                    placeholder={f.placeholder} rows={f.rows || 3}
                    className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500" />
                ) : f.type === "select" ? (
                  <select
                    autoFocus={i === 0}
                    value={values[f.name] ?? ""}
                    onChange={e => update(f.name, e.target.value)}
                    className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500">
                    {(f.options || []).map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                  </select>
                ) : (
                  <input
                    type={f.type || "text"}
                    autoFocus={i === 0}
                    value={values[f.name] ?? ""}
                    onChange={e => update(f.name, e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter" && valid) submit(); }}
                    placeholder={f.placeholder}
                    className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500" />
                )}
                {f.hint && <div className="text-xs text-slate-500 mt-1">{f.hint}</div>}
              </div>
            ))}
          </div>
        )}
        <div className="flex justify-end gap-2 pt-2 border-t border-slate-100">
          <button onClick={onClose}
            className="text-sm px-3 py-1.5 bg-white border border-slate-300 text-slate-700 rounded-md hover:bg-slate-50">
            {config.cancelLabel || "Cancel"}
          </button>
          {config.onSubmit && (
            <button onClick={submit} disabled={!valid}
              className={`text-sm px-3 py-1.5 text-white rounded-md ${valid ? (config.danger ? "bg-rose-600 hover:bg-rose-700" : "bg-brand-600 hover:bg-brand-700") : "bg-slate-300 cursor-not-allowed"}`}>
              {config.submitLabel || "OK"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---------- Toast (replaces window.alert for success) ---------- */
function Toast({ message, onClose }) {
  useEffect(() => {
    if (!message) return;
    const t = setTimeout(onClose, 3500);
    return () => clearTimeout(t);
  }, [message]);
  if (!message) return null;
  return (
    <div className="fixed bottom-4 right-4 z-[60] bg-slate-900 text-white text-sm px-4 py-2.5 rounded-lg shadow-xl fade-in max-w-sm flex items-start gap-2">
      <Icon d={ICONS.check} className="w-4 h-4 mt-0.5 text-emerald-400 flex-shrink-0" />
      <span>{message}</span>
    </div>
  );
}

// Derive a demo email from a seeded user's display name (e.g. "J. Mueller" -> "j.mueller@cobflow.dev").
// Prototype only; production gets email from SSO claims.
function userEmail(user) {
  if (!user) return "";
  const parts = user.name.replace(/\./g, "").split(/\s+/).filter(Boolean);
  const first = (parts[0] || "user").toLowerCase();
  const last = (parts[1] || "demo").toLowerCase();
  return first + "." + last + "@cobflow.dev";
}

// Normalize a USERS row's role to the four-role currentUser shape the app expects.
// SENIOR_ANALYST is a Job Level in v0.7, not a Role — collapse to ANALYST for currentUser.role.
function normalizeRole(role) {
  return role === "SENIOR_ANALYST" ? "ANALYST" : role;
}

  const [currentUser, setCurrentUser] = useState({ id: "u_jm", name: "J. Mueller", initials: "JM", role: "ANALYST" });
  // Sign-in: pick a USERS row, normalize its role into the currentUser shape, and land on Dashboard.
  const handleSignIn = (userRow) => {
    setCurrentUser({
      id: userRow.id,
      name: userRow.name,
      initials: userRow.initials,
      role: normalizeRole(userRow.role),
    });
    setView("dashboard");
    setSelectedClaimId(null);
    setSelectedPersonId(null);
    setSidebarOpen(false);
    setSignedIn(true);
  };
  // Sign-out: drop back to landing page and reset session-scoped UI state.
  const handleSignOut = () => {
    setSignedIn(false);
    setView("dashboard");
    setSelectedClaimId(null);
    setSelectedPersonId(null);
    setSidebarOpen(false);
  };
  // Cycle: Analyst → Supervisor → Manager → Admin → Analyst. Each role identity is one of the seeded USERS.
  const toggleRole = () => setCurrentUser(u => {
    let next;
    if (u.role === "ANALYST")         next = { id: "u_tr", name: "T. Ramos",   initials: "TR", role: "SUPERVISOR" };
    else if (u.role === "SUPERVISOR") next = { id: "u_db", name: "D. Berger",  initials: "DB", role: "MANAGER" };
    else if (u.role === "MANAGER")    next = { id: "u_ad", name: "S. Patel",   initials: "SP", role: "ADMIN" };
    else                              next = { id: "u_jm", name: "J. Mueller", initials: "JM", role: "ANALYST" };
    // Bounce to Dashboard if the new role can't see the current view.
    const onMgmt = view.startsWith("admin"); // historical: admin_overview, admin_team, admin_team_person
    const onAdmin = view.startsWith("sys");  // sys_admin_*
    const onCm = view === "my_learning" || view === "cm_oversight" || view === "cm_mgmt";
    if (next.role === "ANALYST" && (onMgmt || onAdmin)) setView("dashboard");
    if (next.role === "ADMIN" && onMgmt) setView("dashboard");  // Admin doesn't see Management
    if ((next.role === "SUPERVISOR" || next.role === "MANAGER") && onAdmin) setView("dashboard"); // Supervisor/Manager don't see Admin
    // CM view bounces: Analyst → my_learning only; Supervisor/Manager → either cm_mgmt or cm_oversight
    if (onCm) {
      const allowed = (next.role === "ANALYST" && view === "my_learning") ||
                      ((next.role === "SUPERVISOR" || next.role === "MANAGER") && (view === "cm_mgmt" || view === "cm_oversight"));
      if (!allowed) {
        if (next.role === "ANALYST") setView("my_learning");
        else if (next.role === "SUPERVISOR" || next.role === "MANAGER") setView("cm_mgmt");
        else setView("dashboard");
      }
    }
    return next;
  });
  const roleColor = (role) => {
    if (role === "SUPERVISOR") return { border: "border-violet-300", bg: "bg-violet-50", text: "text-violet-800", initialBg: "bg-violet-200", initialText: "text-violet-900" };
    if (role === "MANAGER")    return { border: "border-emerald-300", bg: "bg-emerald-50", text: "text-emerald-800", initialBg: "bg-emerald-200", initialText: "text-emerald-900" };
    if (role === "ADMIN")      return { border: "border-amber-300", bg: "bg-amber-50", text: "text-amber-800", initialBg: "bg-amber-200", initialText: "text-amber-900" };
    return { border: "border-slate-300", bg: "bg-white", text: "text-slate-700", initialBg: "bg-slate-200", initialText: "text-slate-700" };
  };
  const roleLabel = (role) => role === "SUPERVISOR" ? "Supervisor" : role === "MANAGER" ? "Manager" : role === "ADMIN" ? "Admin" : "Analyst";
  // In-memory mutable extras per claim — notes, tasks, activity entries, correspondence, records
  // added by the user via the Claim Detail view. Reset on page refresh (prototype).
  const [claimExtras, setClaimExtras] = useState({});
  const updateClaimExtras = (claimId, updater) => {
    setClaimExtras(prev => {
      const existing = prev[claimId] || { notes: [], tasks: [], activity: [], documents: [] };
      return { ...prev, [claimId]: updater(existing) };
    });
  };
  const openClaim = (claimId) => { setSelectedClaimId(claimId); setView("claim-detail"); setSidebarOpen(false); };

  const tenant = TENANTS.find(t => t.id === tenantId);
  const claims = SAMPLE_CLAIMS.filter(c => c.tenant === tenantId);
  const recoveries = SAMPLE_RECOVERIES.filter(r => claims.some(c => c.id === r.claimId));

  const nav = [
    { id: "dashboard",   label: "Dashboard",        icon: ICONS.dashboard },
    { id: "intake",      label: "Claims & Triage",  icon: ICONS.intake },
    { id: "cob",         label: "COB Analyzer",     icon: ICONS.cob },
    { id: "recovery",    label: "Recovery Tracker", icon: ICONS.recovery },
    { id: "my_learning", label: "Learning",         icon: ICONS.book, requiresRole: ["ANALYST"] },
    { id: "management",  label: "Management",       icon: ICONS.user, requiresRole: ["SUPERVISOR", "MANAGER"],
      children: [
        { id: "admin_overview", label: "Overview" },
        { id: "admin_team",     label: "Team" },
        ...(currentUser.role === "SUPERVISOR" || currentUser.role === "MANAGER" ? [{ id: "cm_mgmt",      label: "Learning Content"   }] : []),
        ...(currentUser.role === "SUPERVISOR" || currentUser.role === "MANAGER" ? [{ id: "cm_oversight", label: "Learning Oversight" }] : []),
      ] },
    { id: "sys_admin",   label: "Admin",            icon: ICONS.settings, requiresRole: ["ADMIN"] },
  ].filter(n => !n.requiresRole || n.requiresRole.includes(currentUser.role));

  const go = (v) => { setView(v); setSidebarOpen(false); if (v !== "admin_team_person") setSelectedPersonId(null); };
  const openPerson = (id) => { setSelectedPersonId(id); setView("admin_team_person"); setSidebarOpen(false); };

  // Auth gate — landing page shows first; signed-in state renders the full app shell below.
  if (!signedIn) {
    return <LandingPage users={USERS} onSignIn={handleSignIn} />;
  }

  return (
    <div className="min-h-screen flex flex-col">
      {/* Top bar */}
      <header className="bg-white border-b border-slate-200 flex items-center justify-between px-3 sm:px-6 h-14 sticky top-0 z-30">
        <div className="flex items-center gap-3">
          <button className="md:hidden p-2 -ml-2" onClick={() => setSidebarOpen(s => !s)}>
            <Icon d={sidebarOpen ? ICONS.close : ICONS.menu} />
          </button>
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center text-white font-bold text-sm">CF</div>
            <div className="font-semibold text-slate-800">COB Flow</div>
            <Pill className="bg-red-100 text-red-800 hidden sm:inline-flex">Wisconsin pilot · MVP</Pill>
          </div>
        </div>
        <div className="flex items-center gap-2 sm:gap-3">
          <select
            value={tenantId}
            onChange={e => { setTenantId(e.target.value); setSelectedClaimId(null); }}
            className="text-xs sm:text-sm border border-slate-300 rounded-md py-1.5 px-2 bg-white text-slate-700 max-w-[150px] sm:max-w-none truncate"
          >
            {TENANTS.map(t => (
              <option key={t.id} value={t.id}>{t.name} — {t.mode}</option>
            ))}
          </select>
          <button onClick={toggleRole}
            title="Toggle role (prototype demo): Analyst → Supervisor → Manager → Admin → Analyst"
            className={`flex items-center gap-2 px-2 py-1 rounded-md text-xs font-medium border ${roleColor(currentUser.role).border} ${roleColor(currentUser.role).bg} ${roleColor(currentUser.role).text} hover:opacity-90`}>
            <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-semibold ${roleColor(currentUser.role).initialBg} ${roleColor(currentUser.role).initialText}`}>{currentUser.initials}</div>
            <span className="hidden sm:inline">{roleLabel(currentUser.role)}</span>
          </button>
          <AccountMenu user={currentUser} onSignOut={handleSignOut} />
        </div>
      </header>

      <div className="flex flex-1">
        {/* Sidebar */}
        <aside className={`${sidebarOpen ? "block" : "hidden"} md:block fixed md:static inset-0 top-14 md:top-auto z-20 md:z-0 bg-white md:bg-transparent border-r border-slate-200 w-60 md:w-56 shrink-0`}>
          <nav className="p-3 space-y-1">
            {nav.map(n => {
              const isParentActive = n.children && n.children.some(c => view === c.id || (c.id === "admin_team" && view === "admin_team_person"));
              return (
                <div key={n.id}>
                  <button
                    onClick={() => {
                      if (n.children) {
                        // Clicking parent: navigate to first child if not already in this section
                        if (!isParentActive) go(n.children[0].id);
                      } else {
                        go(n.id);
                      }
                    }}
                    className={`w-full flex items-center gap-3 px-3 py-2 rounded-md text-sm ${view === n.id || isParentActive ? "bg-brand-50 text-brand-700 font-medium" : "text-slate-700 hover:bg-slate-100"}`}>
                    <Icon d={n.icon} className="w-5 h-5" />
                    {n.label}
                  </button>
                  {n.children && isParentActive && (
                    <div className="ml-3 mt-1 space-y-1 border-l border-slate-200 pl-3">
                      {n.children.map(c => {
                        const childActive = view === c.id || (c.id === "admin_team" && view === "admin_team_person");
                        return (
                          <button key={c.id} onClick={() => go(c.id)}
                            className={`w-full text-left px-3 py-1.5 rounded-md text-xs ${childActive ? "bg-brand-100 text-brand-700 font-medium" : "text-slate-600 hover:bg-slate-100"}`}>
                            {c.label}
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </nav>
          <div className="p-3 mt-2 mx-3 rounded-lg bg-slate-50 border border-slate-200 text-xs text-slate-600">
            <div className="font-semibold text-slate-700 mb-1">Customer mode</div>
            <div>{tenant.mode}</div>
            <div className="mt-2 text-slate-500">Data isolation: row-level</div>
          </div>
        </aside>

        {/* Main */}
        <main className="flex-1 p-4 sm:p-6 max-w-full overflow-x-hidden">
          {view === "dashboard" && <DashboardView claims={claims} recoveries={recoveries} go={go} setSelectedClaimId={setSelectedClaimId} openClaim={openClaim} />}
          {view === "intake"    && <IntakeView claims={claims} selectedClaimId={selectedClaimId} setSelectedClaimId={setSelectedClaimId} openClaim={openClaim} />}
          {view === "cob"       && <CobAnalyzerView claims={claims} initialClaimId={selectedClaimId} />}
          {view === "recovery"  && <RecoveryView recoveries={recoveries} claims={claims} />}
          {view === "admin_overview"     && <AdminOverview tenant={tenant} currentUser={currentUser} claims={claims} recoveries={recoveries} openClaim={openClaim} />}
          {view === "admin_team"         && <AdminTeam currentUser={currentUser} openPerson={openPerson} />}
          {view === "admin_team_person"  && <AdminTeamPerson personId={selectedPersonId} currentUser={currentUser} goBack={() => go("admin_team")} openClaim={openClaim} />}
          {view === "sys_admin"          && <SysAdminView tenant={tenant} currentUser={currentUser} />}
          {view === "claim-detail"  && <ClaimDetailView claim={claims.find(c => c.id === selectedClaimId)} claimExtras={claimExtras[selectedClaimId] || { notes:[], tasks:[], activity:[], correspondence:[], records:[] }} onExtraChange={updateClaimExtras} tenant={tenant} currentUser={currentUser} goBack={() => go("intake")} />}
          {view === "my_learning"   && <MyLearningView currentUser={currentUser} />}
          {view === "cm_oversight"  && <CmOversightView currentUser={currentUser} />}
          {view === "cm_mgmt"       && <CmMgmtView currentUser={currentUser} />}
        </main>
      </div>
    </div>
  );
}

/* ---------- Dashboard ---------- */
function DashboardView({ claims, recoveries, go, setSelectedClaimId }) {
  const triaged = claims.map(c => ({ ...c, triage: triageClaim(c) }));
  const potentialCount = triaged.filter(c => c.triage.hasSubrogationPotential).length;
  const recoveredTotal = recoveries.filter(r => r.stage === "SETTLED" || r.stage === "CLOSED").reduce((s, r) => s + (r.recovered || 0), 0);
  const pendingTotal   = recoveries.filter(r => r.stage !== "SETTLED" && r.stage !== "CLOSED").reduce((s, r) => s + (r.demand || 0), 0);

  return (
    <div className="space-y-6 fade-in">
      <div>
        <h1 className="text-2xl font-semibold text-slate-800">Dashboard</h1>
        <p className="text-sm text-slate-500">Subrogation recovery activity at a glance.</p>
      </div>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
        <Kpi label="Open claims" value={claims.length} accent="bg-brand-50 text-brand-700" />
        <Kpi label="Subrogation potential" value={potentialCount} accent="bg-amber-50 text-amber-700" />
        <Kpi label="Recovered (YTD)" value={fmtMoney(recoveredTotal)} accent="bg-emerald-50 text-emerald-700" />
        <Kpi label="Pending demands" value={fmtMoney(pendingTotal)} accent="bg-violet-50 text-violet-700" />
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <Card title="Recent claims needing review" action={{label: "Open Intake →", onClick: () => go("intake")}}>
          <ul className="divide-y divide-slate-100">
            {triaged.filter(c => c.triage.hasSubrogationPotential).slice(0, 5).map(c => (
              <li key={c.id} className="py-3 flex items-start justify-between gap-2">
                <div className="min-w-0">
                  <div className="font-medium text-slate-800 text-sm truncate">{c.member.firstName} {c.member.lastName} <span className="text-slate-400 font-normal">— {c.id}</span></div>
                  <div className="text-xs text-slate-500 truncate">{c.diagnosisCodes.join(", ")} · {fmtMoney(c.paidAmount)} paid</div>
                  <div className="text-xs text-amber-700 truncate mt-0.5">{c.triage.signals[0]}</div>
                </div>
                <button onClick={() => { setSelectedClaimId(c.id); go("cob"); }} className="shrink-0 text-xs px-2 py-1 bg-brand-50 text-brand-700 rounded-md hover:bg-brand-100">Run COB →</button>
              </li>
            ))}
          </ul>
        </Card>

        <Card title="Active recoveries" action={{label: "Open Recovery →", onClick: () => go("recovery")}}>
          <div className="space-y-2">
            {recoveries.slice(0, 5).map(r => {
              const stage = RECOVERY_STAGES.find(s => s.id === r.stage);
              return (
                <div key={r.id} className="flex items-center justify-between text-sm border border-slate-100 rounded-md px-3 py-2">
                  <div className="min-w-0">
                    <div className="font-medium text-slate-800 truncate">{r.id} · {r.target}</div>
                    <div className="text-xs text-slate-500">Demand {fmtMoney(r.demand)} · {r.assignedTo}</div>
                  </div>
                  <Pill className={stage.color}>{stage.label}</Pill>
                </div>
              );
            })}
          </div>
        </Card>
      </div>
    </div>
  );
}
const Kpi = ({ label, value, accent }) => (

    <div className={`inline-block text-xs font-semibold px-2 py-0.5 rounded-full ${accent}`}>{label}</div>
    <div className="text-2xl sm:text-3xl font-semibold text-slate-800 mt-2">{value}</div>
  </div>
);
const Card = ({ title, action, children }) => (

      <h2 className="font-medium text-slate-800 text-sm">{title}</h2>
      {action && <button onClick={action.onClick} className="text-xs text-brand-700 hover:underline">{action.label}</button>}
