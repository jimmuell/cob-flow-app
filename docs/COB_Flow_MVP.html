/* ---------- My Learning (Analyst) ---------- */
function MyLearningView({ currentUser }) {
  const [selectedModId, setSelectedModId] = useState(null);
  const [activeQuizId, setActiveQuizId] = useState(null);
  const [showCapstone, setShowCapstone] = useState(false);
  const [toast, setToast] = useState("");
  // Local session state for completions and attempts added during this session
  const [localCompletions, setLocalCompletions] = useState([]);
  const [localAttempts, setLocalAttempts] = useState([]);
  const showToast = (msg) => setToast(msg);

  const allCompletions = [...CM_LESSON_COMPLETIONS, ...localCompletions];
  const allAttempts = [...CM_QUIZ_ATTEMPTS, ...localAttempts];

  const enrollment = CM_ENROLLMENTS.find(e => e.userId === currentUser.id);
  if (!enrollment) return (
    <div className="space-y-4 fade-in">
      <h1 className="text-2xl font-semibold text-slate-800">My Learning</h1>
      <p className="text-sm text-slate-500">No courses assigned yet. Contact your supervisor to be enrolled in a learning sequence.</p>
    </div>
  );

  const sequence  = CM_SEQUENCES.find(s => s.id === enrollment.sequenceId);
  const course    = sequence ? CM_COURSES.find(c => c.id === sequence.courseIds[0]) : null;
  const modules   = course ? CM_MODULES.filter(m => m.courseId === course.id).sort((a, b) => a.order - b.order) : [];

  const isModComplete = (modId) => allCompletions.some(lc => lc.moduleId === modId && lc.userId === currentUser.id);
  const getLatestAttempt = (quizId) => allAttempts.filter(qa => qa.quizId === quizId && qa.userId === currentUser.id)
    .sort((a, b) => (b.completedAt || b.attestedAt || "").localeCompare(a.completedAt || a.attestedAt || "")).at(0);

  const completedCount = modules.filter(m => isModComplete(m.id)).length;
  const allModsDone    = modules.length > 0 && modules.every(m => isModComplete(m.id));
  const capstonePassed = getLatestAttempt(CM_COURSE_QUIZ.id)?.passed === true;
  const unlock         = CM_AUTHORITY_UNLOCKS.find(au => au.userId === currentUser.id && au.active);
  const progressPct    = modules.length > 0 ? Math.round((completedCount / modules.length) * 100) : 0;

  const selectedMod  = modules.find(m => m.id === selectedModId);
  const activeQuiz   = CM_MODULE_QUIZZES.find(q => q.id === activeQuizId);

  const handleMarkComplete = (modId) => {
    setLocalCompletions(prev => [...prev, {
      id: `lc_local_${Date.now()}`, userId: currentUser.id, moduleId: modId,
      completedAt: new Date().toISOString(), quizAttemptId: null,
    }]);
    const mod = modules.find(m => m.id === modId);
    showToast(`${mod?.title || "Module"} — reading marked complete`);
    setSelectedModId(null);
  };

  const handleQuizPass = (quizId, score, total) => {
    const quiz = CM_MODULE_QUIZZES.find(q => q.id === quizId);
    const modId = quiz?.moduleId;
    setLocalAttempts(prev => [...prev, {
      id: `qa_local_${Date.now()}`, userId: currentUser.id, quizId,
      score, outOf: total, passed: true, completedAt: new Date().toISOString(),
    }]);
    if (modId && !isModComplete(modId)) {
      setLocalCompletions(prev => [...prev, {
        id: `lc_local_${Date.now()}`, userId: currentUser.id, moduleId: modId,
        completedAt: new Date().toISOString(), quizAttemptId: `qa_local_${Date.now()}`,
      }]);
    }
    const mod = CM_MODULES.find(m => m.id === modId);
    showToast(`Quiz passed: ${score}/${total} · ${mod?.title || "module"} complete`);
    setActiveQuizId(null);
  };

  const handleQuizFail = (quizId, score, total) => {
    setLocalAttempts(prev => [...prev, {
      id: `qa_local_${Date.now()}`, userId: currentUser.id, quizId,
      score, outOf: total, passed: false, completedAt: new Date().toISOString(),
    }]);
    showToast(`Quiz: ${score}/${total} — review the reading and try again`);
    setActiveQuizId(null);
  };

  const handleAttest = () => {
    setLocalAttempts(prev => [...prev, {
      id: `qa_local_${Date.now()}`, userId: currentUser.id, quizId: CM_COURSE_QUIZ.id,
      score: null, outOf: null, passed: true, type: "free_response_attestation",
      attestedAt: new Date().toISOString(),
    }]);
    showToast("Capstone attestation recorded · course complete · authority unlock applied");
    setShowCapstone(false);
  };

  return (
    <div className="space-y-4 fade-in">
      <div>
        <h1 className="text-2xl font-semibold text-slate-800">My Learning</h1>
        <p className="text-sm text-slate-500">Enrolled courses, module progress, and authority unlocks.</p>
      </div>

      {/* Enrollment / progress card */}
      <div className="bg-white border border-slate-200 rounded-lg p-5">
        <div className="flex items-start justify-between gap-3 flex-wrap mb-4">
          <div>
            <div className="text-sm font-semibold text-slate-800">{sequence?.title}</div>
            <div className="text-xs text-slate-500 mt-0.5">{course?.title} · {modules.length} modules · ~{course?.estimatedHours}h estimated</div>
          </div>
          <Pill className={allModsDone && capstonePassed ? "bg-emerald-100 text-emerald-800" : "bg-blue-100 text-blue-800"}>
            {allModsDone && capstonePassed ? "Complete" : "In progress"}
          </Pill>
        </div>
        <div className="text-xs text-slate-500 mb-1">{completedCount} of {modules.length} modules complete</div>
        <div className="h-2 bg-slate-200 rounded-full overflow-hidden">
          <div className="h-2 bg-brand-500 rounded-full transition-all" style={{ width: `${progressPct}%` }} />
        </div>
        {(unlock || (capstonePassed && !unlock)) && (
          <div className="mt-3 bg-emerald-50 border border-emerald-200 rounded-md px-3 py-2 text-xs text-emerald-800 flex items-center gap-2">
            <Icon d={ICONS.check} className="w-4 h-4 text-emerald-500 shrink-0" />
            Authority unlock: +{fmtMoney((unlock || sequence?.unlockOnCompletion)?.authorityBoost?.settlement ?? 10000)} settlement · +{fmtMoney((unlock || sequence?.unlockOnCompletion)?.authorityBoost?.demand ?? 5000)} demand
          </div>
        )}
      </div>

      {/* Module list */}
      <div className="space-y-2">
        {modules.map((mod, idx) => {
          const complete = isModComplete(mod.id);
          const quiz = CM_MODULE_QUIZZES.find(q => q.moduleId === mod.id);
          const latestAttempt = quiz ? getLatestAttempt(quiz.id) : null;
          const quizPassed = latestAttempt?.passed === true;
          const prevDone = idx === 0 || isModComplete(modules[idx - 1]?.id);
          const locked = !prevDone && !complete;
          return (
            <div key={mod.id} className={`bg-white border rounded-lg p-4 transition-opacity ${locked ? "opacity-50" : ""} ${complete ? "border-emerald-200" : "border-slate-200"}`}>
              <div className="flex items-start justify-between gap-3 flex-wrap">
                <div className="flex items-start gap-3 min-w-0">
                  <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-semibold shrink-0 ${complete ? "bg-emerald-100 text-emerald-800" : "bg-slate-100 text-slate-700"}`}>
                    {complete ? <Icon d={ICONS.check} className="w-4 h-4 text-emerald-600" /> : <span>{idx + 1}</span>}
                  </div>
                  <div className="min-w-0">
                    <div className="text-sm font-medium text-slate-800">{mod.title}</div>
                    <div className="text-xs text-slate-500 mt-0.5">{(mod.slides || []).length} slides · ~{mod.estimatedMinutes} min</div>
                    {latestAttempt && (
                      <div className={`text-xs mt-1 ${quizPassed ? "text-emerald-700" : "text-rose-700"}`}>
                        Quiz: {latestAttempt.score}/{latestAttempt.outOf} · {quizPassed ? "Passed" : "Not passed yet"}
                      </div>
                    )}
                  </div>
                </div>
                <div className="flex gap-2 items-center flex-wrap">
                  <button
                    onClick={() => !locked && setSelectedModId(mod.id)}
                    disabled={locked}
                    className={`text-xs px-2.5 py-1.5 rounded-md border ${locked ? "border-slate-200 text-slate-400 cursor-not-allowed" : "border-slate-300 text-slate-700 hover:bg-slate-50"}`}>
                    {complete ? "Review slides" : "Start reading"}
                  </button>
                  {quiz && !locked && (
                    <button
                      onClick={() => setActiveQuizId(quiz.id)}
                      className={`text-xs px-2.5 py-1.5 rounded-md ${quizPassed ? "border border-emerald-300 text-emerald-700 hover:bg-emerald-50" : "bg-brand-600 text-white hover:bg-brand-700"}`}>
                      {quizPassed ? "Retake quiz" : "Take quiz"}
                    </button>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Capstone — only shown after all modules done */}
      {allModsDone && (
        <div className={`bg-white border rounded-lg p-4 ${capstonePassed ? "border-emerald-200 bg-emerald-50" : "border-brand-300 bg-brand-50"}`}>
          <div className="flex items-start justify-between gap-3 flex-wrap">
            <div>
              <div className="text-sm font-semibold text-slate-800">{CM_COURSE_QUIZ.title}</div>
              <div className="text-xs text-slate-500 mt-0.5">Course capstone · self-attestation required · ~{CM_COURSE_QUIZ.scenarios[0]?.estimatedMinutes} min</div>
              {capstonePassed && <div className="text-xs text-emerald-700 mt-1">Completed · authority unlock applied ✓</div>}
            </div>
            <button onClick={() => setShowCapstone(true)}
              className={`text-xs px-2.5 py-1.5 rounded-md ${capstonePassed ? "border border-slate-300 text-slate-700 hover:bg-slate-50" : "bg-brand-600 text-white hover:bg-brand-700"}`}>
              {capstonePassed ? "Review capstone" : "Begin capstone"}
            </button>
          </div>
        </div>
      )}

      <Toast message={toast} onClose={() => setToast("")} />
      {selectedMod && (
        <SlideViewer
          mod={selectedMod}
          isComplete={isModComplete(selectedMod.id)}
          onClose={() => setSelectedModId(null)}
          onMarkComplete={() => handleMarkComplete(selectedMod.id)}
        />
      )}
      {activeQuiz && (
        <McQuizTaker
          quiz={activeQuiz}
          previousBest={getLatestAttempt(activeQuiz.id)}
          onClose={() => setActiveQuizId(null)}
          onPass={(score, total) => handleQuizPass(activeQuiz.id, score, total)}
          onFail={(score, total) => handleQuizFail(activeQuiz.id, score, total)}
        />
      )}
      {showCapstone && (
        <FrCapstoneTaker
          quiz={CM_COURSE_QUIZ}
          alreadyPassed={capstonePassed}
          onClose={() => setShowCapstone(false)}
          onAttest={handleAttest}
        />
      )}
    </div>
  );
}

                    <div className="flex justify-between text-xs text-slate-500 mb-1">
                      <span>{completedMods}/{mods.length} modules</span>
                      <span>{pct}%</span>
                    </div>
                    <div className="h-1.5 bg-slate-200 rounded-full overflow-hidden mb-2">
                      <div className="h-1.5 bg-brand-500 rounded-full transition-all" style={{ width: `${pct}%` }} />
                    </div>
                    <div className="grid gap-1" style={{ gridTemplateColumns: `repeat(${mods.length}, minmax(0, 1fr))` }}>
                      {mods.map((m, i) => {
                        const done = CM_LESSON_COMPLETIONS.some(lc => lc.userId === analyst.id && lc.moduleId === m.id);
                        const quiz = CM_MODULE_QUIZZES.find(q => q.moduleId === m.id);
                        const qPassed = quiz ? CM_QUIZ_ATTEMPTS.some(qa => qa.userId === analyst.id && qa.quizId === quiz.id && qa.passed) : true;
                        return (
                          <div key={m.id} title={m.title}
                            className={`rounded px-1.5 py-1 text-center text-[10px] truncate ${done && qPassed ? "bg-emerald-100 text-emerald-800" : done ? "bg-amber-100 text-amber-800" : "bg-slate-100 text-slate-500"}`}>
                            Mod.{i + 1}
                          </div>
                        );
                      })}
                    </div>
                    {capstoneDone && <div className="text-xs text-emerald-700 mt-2 font-medium">Capstone attested ✓</div>}
                  </div>
                ) : (
                  <div className="text-xs text-slate-400 italic">Not enrolled in any sequence.</div>
                )}
              </div>
            );
          })}
        </div>

        {/* Notifications */}
        <div className="space-y-3">
          <div className="text-xs font-semibold text-slate-700 uppercase tracking-wide">Learning Notifications</div>
          {myNotifs.length === 0 ? (
            <div className="text-sm text-slate-500 bg-slate-50 border border-slate-200 rounded-lg p-4 italic">{notifEmptyMsg}</div>
          ) : (
            <div className="space-y-2">
              {myNotifs.map(n => {
                const typeColor = n.type === "course_completed" ? "bg-emerald-100 text-emerald-800" :
                                  n.type === "quiz_failed" ? "bg-rose-100 text-rose-800" : "bg-blue-100 text-blue-800";
                const typeLabel = n.type === "course_completed" ? "Course complete" :
                                  n.type === "quiz_failed" ? "Quiz failed" : "Module complete";
                const who = USERS.find(u => u.id === n.relatedUserId);
                return (
                  <div key={n.id} className={`bg-white border rounded-lg p-3 ${!n.read ? "border-blue-200" : "border-slate-200 opacity-75"}`}>
                    <div className="flex items-start justify-between gap-2 mb-1">
                      <Pill className={`${typeColor} text-[10px]`}>{typeLabel}</Pill>
                      <span className="text-[10px] text-slate-500">{n.createdAt.slice(0, 10)}</span>
                    </div>
                    <div className="text-xs text-slate-700">{n.message}</div>
                    {who && <div className="text-[10px] text-slate-500 mt-1">{who.name}</div>}
                  </div>
                );
              })}
            </div>
          )}
          {myNotifs.some(n => !n.read) && (
            <button onClick={() => showToast("All notifications marked as read (prototype)")}
              className="text-xs text-brand-700 hover:underline">Mark all read</button>
          )}
        </div>
      </div>

      <Toast message={toast} onClose={() => setToast("")} />
    </div>
  );
}

/* ---------- Learning Oversight — role-branching entry point.
   Supervisor: delegates to SupervisorOversightDetail (their own team).
   Manager: supervisors-list with aggregate stats + drill-down. ---------- */
function CmOversightView({ currentUser }) {
  const [selectedSupervisor, setSelectedSupervisor] = useState(null);

  // Supervisor (and safe fallback): full team view via existing detail component
  if (currentUser.role !== "MANAGER") {
    return <SupervisorOversightDetail targetUser={currentUser} />;
  }

  // Manager — drill-down selected
  if (selectedSupervisor) {
    return (
      <SupervisorOversightDetail
        targetUser={selectedSupervisor}
        onBack={() => setSelectedSupervisor(null)}
      />
    );
  }

  // Manager — supervisors-list
  const myTeams = TEAMS.filter(t => t.managerId === currentUser.id);
  return (
    <div className="space-y-4 fade-in">
      <div>
        <h1 className="text-2xl font-semibold text-slate-800">Learning Oversight</h1>
        <p className="text-sm text-slate-500">Track your supervisors' team progress and supervisor-level activity.</p>
      </div>
      {myTeams.length === 0 ? (
        <div className="bg-slate-50 border border-slate-200 rounded-lg p-6 text-sm text-slate-500 text-center italic">
          No supervisor teams assigned to you. Contact your administrator to associate supervisor teams with your manager record.
        </div>
      ) : (
        <div className="space-y-3">
          <p className="text-xs text-slate-500">Click a supervisor to view their team's detail.</p>
          {myTeams.map(team => {
            const supervisor  = USERS.find(u => u.id === team.supervisorId);
            const teamMembers = USERS.filter(u => u.teamId === team.id && u.role === "ANALYST");
            const enrolled    = CM_ENROLLMENTS.filter(e => teamMembers.some(a => a.id === e.userId)).length;
            const cutoff = "2026-04-22"; // 30 days before 2026-05-22
            const recentCompletions = CM_LESSON_COMPLETIONS.filter(lc =>
              teamMembers.some(a => a.id === lc.userId) && lc.completedAt >= cutoff
            ).length;
            const recentUnlocks = CM_AUTHORITY_UNLOCKS.filter(au =>
              teamMembers.some(a => a.id === au.userId) && au.active && au.grantedAt >= cutoff
            ).length;
            const activityDates = [
              ...CM_LESSON_COMPLETIONS.filter(lc => teamMembers.some(a => a.id === lc.userId)).map(lc => lc.completedAt),
              ...CM_QUIZ_ATTEMPTS.filter(qa => teamMembers.some(a => a.id === qa.userId) && qa.completedAt).map(qa => qa.completedAt),
            ].filter(Boolean).sort().reverse();
            const lastActivity = activityDates[0]?.slice(0, 10) || null;
            return (
              <button key={team.id} onClick={() => supervisor && setSelectedSupervisor(supervisor)}
                className="w-full text-left bg-white border border-slate-200 rounded-lg p-4 hover:border-brand-400 hover:shadow-sm transition-all">
                <div className="flex items-start justify-between gap-3">
                  <div className="flex items-center gap-3">
                    <div className="w-9 h-9 rounded-full bg-violet-100 text-violet-800 text-xs font-semibold flex items-center justify-center shrink-0">
                      {supervisor?.initials || "?"}
                    </div>
                    <div>
                      <div className="text-sm font-semibold text-slate-800">{supervisor?.name || "—"}</div>
                      <div className="text-xs text-slate-500">{team.name}</div>
                    </div>
                  </div>
                  <div className="text-xs text-slate-400 shrink-0">
                    {lastActivity ? `Last activity ${lastActivity}` : "No activity yet"}
                  </div>
                </div>
                <div className="mt-3 grid grid-cols-2 sm:grid-cols-4 gap-2">
                  <div className="bg-slate-50 rounded px-2 py-1.5 text-center">
                    <div className="text-lg font-semibold text-slate-800">{teamMembers.length}</div>
                    <div className="text-[10px] text-slate-500">Analysts</div>
                  </div>
                  <div className="bg-slate-50 rounded px-2 py-1.5 text-center">
                    <div className="text-lg font-semibold text-blue-700">{enrolled}</div>
                    <div className="text-[10px] text-slate-500">Enrolled</div>
                  </div>
                  <div className="bg-slate-50 rounded px-2 py-1.5 text-center">
                    <div className="text-lg font-semibold text-emerald-700">{recentCompletions}</div>
                    <div className="text-[10px] text-slate-500">Completions (30d)</div>
                  </div>
                  <div className="bg-slate-50 rounded px-2 py-1.5 text-center">
                    <div className="text-lg font-semibold text-amber-700">{recentUnlocks}</div>
                    <div className="text-[10px] text-slate-500">Unlocks (30d)</div>
                  </div>
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

                      title: `Edit course`,
                      description: `Update metadata for "${course.title}".`,
                      fields: [
                        { name: "title",          label: "Title",           type: "text",   required: true,  defaultValue: course.title },
                        { name: "description",    label: "Description",     type: "text",   required: false, defaultValue: course.description },
                        { name: "estimatedHours", label: "Est. Hours",      type: "text",   required: false, defaultValue: String(course.estimatedHours || "") },
                        { name: "status",         label: "Status",          type: "select", required: true,  defaultValue: course.status,
                          options: [{ value: "draft", label: "Draft" }, { value: "published", label: "Published" }, { value: "archived", label: "Archived" }] },
                      ],
                      submitLabel: "Save",
                      onSubmit: (vals) => {
                        const idx = CM_COURSES.findIndex(c => c.id === course.id);
                        if (idx !== -1) { CM_COURSES[idx] = { ...CM_COURSES[idx], ...vals, estimatedHours: Number(vals.estimatedHours) || course.estimatedHours }; }
                        setCmCourses([...CM_COURSES]);
                        showToast(`"${vals.title}" updated`);
                      },
                    })}
                      className="text-xs border border-slate-300 px-2 py-1 rounded-md text-slate-700 hover:bg-slate-50">Edit</button>
                  </div>
                </div>
                <div className="mt-3 border-t border-slate-100 pt-3 space-y-1">
                  <div className="text-xs text-slate-500 font-semibold uppercase mb-1">Modules ({mods.length})</div>
                  {mods.map(m => (
                    <div key={m.id} className="flex items-center justify-between text-xs text-slate-700">
                      <span>{m.order}. {m.title}</span>
                      <span className="text-slate-500 shrink-0 ml-4">{(m.slides || []).length} slides · {m.estimatedMinutes}m</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {tab === "modules" && (
        <div className="space-y-3">
          <div className="text-xs text-slate-500">{CM_MODULES.length} modules across {CM_COURSES.length} course{CM_COURSES.length !== 1 ? "s" : ""}.</div>
          <div className="bg-white border border-slate-200 rounded-lg overflow-x-auto">
            <table className="min-w-full text-sm">
              <thead className="bg-slate-50 text-xs uppercase text-slate-500">
                <tr>
                  <th className="text-left px-3 py-2 font-medium">#</th>
                  <th className="text-left px-3 py-2 font-medium">Module</th>
                  <th className="text-left px-3 py-2 font-medium">Course</th>
                  <th className="text-right px-3 py-2 font-medium">Slides</th>
                  <th className="text-right px-3 py-2 font-medium">Est.</th>
                  <th className="text-left px-3 py-2 font-medium">Status</th>
                  <th className="text-left px-3 py-2 font-medium"></th>
                </tr>
              </thead>
              <tbody>
                {CM_MODULES.map(m => {
                  const course = CM_COURSES.find(c => c.id === m.courseId);
                  const quiz = CM_MODULE_QUIZZES.find(q => q.moduleId === m.id);
                  return (
                    <tr key={m.id} className="border-t border-slate-100">
                      <td className="px-3 py-2 text-xs text-slate-500">{m.order}</td>
                      <td className="px-3 py-2 text-slate-800 max-w-[220px]"><div className="truncate">{m.title}</div></td>
                      <td className="px-3 py-2 text-xs text-slate-600 max-w-[160px]"><div className="truncate">{course?.title || "—"}</div></td>
                      <td className="px-3 py-2 text-xs text-right tabular-nums text-slate-700">{(m.slides || []).length}</td>
                      <td className="px-3 py-2 text-xs text-right tabular-nums text-slate-500">{m.estimatedMinutes}m</td>
                      <td className="px-3 py-2"><Pill className="bg-emerald-100 text-emerald-800">{m.status}</Pill></td>
                      <td className="px-3 py-2 text-xs">
                        <button onClick={() => setSlideEditorMod(m)}
                          className="text-brand-700 hover:underline">Edit</button>
                        {quiz && <span className="text-slate-400 ml-2">{quiz.questions?.length || 0}q quiz</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {tab === "sequences" && (
        <div className="space-y-3">
          <div className="flex justify-between items-center flex-wrap gap-2">
            <div className="text-xs text-slate-500">Sequences are ordered learning paths. Each sequence references courses and carries an authority-unlock spec applied on completion.</div>
            <button onClick={() => setDialog({
              title: "New sequence",
              description: "Create a new learning sequence.",
              fields: [
                { name: "title",       label: "Name",        type: "text",   required: true,  defaultValue: "" },
                { name: "description", label: "Description", type: "text",   required: false, defaultValue: "" },
                { name: "audience",    label: "Audience",    type: "select", required: true,  defaultValue: "analyst",
                  options: [{ value: "analyst", label: "Analyst" }] },
                { name: "status",      label: "Status",      type: "select", required: true,  defaultValue: "draft",
                  options: [{ value: "draft", label: "Draft" }, { value: "published", label: "Published" }] },
              ],
              submitLabel: "Create",
              onSubmit: (vals) => {
                const newSeq = { id: `seq_${Date.now()}`, ...vals, courseIds: [], createdBy: "platform", tenantId: null };
                CM_SEQUENCES.push(newSeq);
                setCmSequences([...CM_SEQUENCES]);
                showToast(`Sequence "${vals.title}" created`);
              },
            })}
              className="text-xs px-2.5 py-1.5 border border-slate-300 text-slate-700 rounded-md hover:bg-slate-50">+ New sequence</button>
          </div>
          {cmSequences.map(seq => {
            const course = CM_COURSES.find(c => c.id === seq.courseIds[0]);
            const enrolled = CM_ENROLLMENTS.filter(e => e.sequenceId === seq.id).length;
            return (
              <div key={seq.id} className="bg-white border border-slate-200 rounded-lg p-4">
                <div className="flex items-start justify-between gap-3">
                  <div className="min-w-0">
                    <div className="text-sm font-semibold text-slate-800">{seq.title}</div>
                    <div className="text-xs text-slate-500 mt-0.5">{seq.description}</div>
                    <div className="text-xs text-slate-500 mt-1">Target: {seq.audience} · {seq.courseIds.length} course · {enrolled} enrolled</div>
                    {seq.unlockOnCompletion && (
                      <div className="text-xs text-amber-700 mt-1">
                        Unlock on completion: +{fmtMoney(seq.unlockOnCompletion.authorityBoost.settlement)} settlement · +{fmtMoney(seq.unlockOnCompletion.authorityBoost.demand)} demand
                      </div>
                    )}
                  </div>
                  <div className="flex gap-2 shrink-0">
                    <Pill className="bg-emerald-100 text-emerald-800">Published</Pill>
                  </div>
                </div>
                {course && (
                  <div className="mt-3 border-t border-slate-100 pt-2 text-xs text-slate-600">
                    Course: <span className="font-medium text-slate-800">{course.title}</span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {tab === "quizzes" && (
        <div className="space-y-3">
          <div className="text-xs text-slate-500">Module MC quizzes require 80% to pass. The FR capstone requires self-attestation after reviewing the model answer.</div>
          {CM_MODULE_QUIZZES.map(quiz => {
            const mod = CM_MODULES.find(m => m.id === quiz.moduleId);
            const attempts = CM_QUIZ_ATTEMPTS.filter(qa => qa.quizId === quiz.id);
            const passCount = attempts.filter(a => a.passed).length;
            const passRate = attempts.length > 0 ? Math.round((passCount / attempts.length) * 100) : null;
            return (
              <div key={quiz.id} className="bg-white border border-slate-200 rounded-lg p-4">
                <div className="flex items-start justify-between gap-3 flex-wrap">
                  <div className="min-w-0">
                    <div className="text-sm font-semibold text-slate-800">{quiz.title}</div>
                    <div className="text-xs text-slate-500 mt-0.5">Module: {mod?.title || "—"} · {(quiz.questions || []).length} questions · 80% to pass</div>
                    {passRate !== null && (
                      <div className="text-xs text-slate-600 mt-1">Pass rate: {passRate}% ({passCount}/{attempts.length} attempts)</div>
                    )}
                  </div>
                  <div className="flex gap-2 items-center shrink-0">
                    <Pill className="bg-blue-100 text-blue-800">MC</Pill>
                    <button onClick={() => setQuizEditorTarget({ quiz, isCapstone: false })}
                      className="text-xs border border-slate-300 px-2 py-1 rounded-md text-slate-700 hover:bg-slate-50">Edit</button>
                  </div>
                </div>
                <div className="mt-2 space-y-1">
                  {(quiz.questions || []).slice(0, 2).map((q, i) => (
                    <div key={q.id} className="text-xs text-slate-600 truncate">Q{i + 1}. {q.stem}</div>
                  ))}
                  {(quiz.questions?.length || 0) > 2 && (
                    <div className="text-xs text-slate-400 italic">+ {quiz.questions.length - 2} more question{quiz.questions.length - 2 !== 1 ? "s" : ""}</div>
                  )}
                </div>
              </div>
            );
          })}
          {/* FR capstone */}
          <div className="bg-white border border-slate-200 rounded-lg p-4">
            <div className="flex items-start justify-between gap-3 flex-wrap">
              <div className="min-w-0">
                <div className="text-sm font-semibold text-slate-800">{CM_COURSE_QUIZ.title}</div>
                <div className="text-xs text-slate-500 mt-0.5">
                  Course: {CM_COURSES.find(c => c.id === CM_COURSE_QUIZ.courseId)?.title || "—"} · {CM_COURSE_QUIZ.scenarios?.length || 0} scenario · Self-attestation
                </div>
                <div className="text-xs text-slate-600 mt-1">
                  {CM_QUIZ_ATTEMPTS.filter(qa => qa.quizId === CM_COURSE_QUIZ.id && qa.passed).length} attestation{CM_QUIZ_ATTEMPTS.filter(qa => qa.quizId === CM_COURSE_QUIZ.id && qa.passed).length !== 1 ? "s" : ""} on record
                </div>
              </div>
              <Pill className="bg-violet-100 text-violet-800 shrink-0">FR Capstone</Pill>
              <button onClick={() => setQuizEditorTarget({ quiz: CM_COURSE_QUIZ, isCapstone: true })}
                className="text-xs border border-slate-300 px-2 py-1 rounded-md text-slate-700 hover:bg-slate-50 shrink-0">Edit</button>
            </div>
            {CM_COURSE_QUIZ.scenarios?.map(sc => (
              <div key={sc.id} className="mt-2 border-t border-slate-100 pt-2 text-xs text-slate-600">
                {sc.title} · {sc.covers} · ~{sc.estimatedMinutes} min
              </div>
            ))}
          </div>
        </div>
      )}
      {slideEditorMod && (
        <SlideEditor mod={slideEditorMod} onSave={(slides) => { showToast(`Module ${slideEditorMod.order} slides updated · ${slides.length} slides`); setSlideEditorMod(null); }} onClose={() => setSlideEditorMod(null)} />
      )}
      {quizEditorTarget && (
        <QuizEditor quiz={quizEditorTarget.quiz} isCapstone={quizEditorTarget.isCapstone}
          onSave={(qs, title) => { showToast(`Quiz "${title}" updated · ${qs.length} questions`); setQuizEditorTarget(null); }}
          onClose={() => setQuizEditorTarget(null)} />
      )}
    </div>
  );
}

/* ---------- Slide Editor ---------- */
function SlideEditor({ mod, onSave, onClose }) {
  const CITATION_TEMPLATES = {
    "Internal":     "[Module N § Section Title]",
    "Syllabus":     "[Syllabus Module N]",
    "Spec":         "[Spec § N.N Rule N]",
    "WI Admin Code":"[Wis. Admin. Code § Ins 3.40(11)(a)]",
    "WI Statute":   "[Wis. Stat. § 632.32]",
    "Case Law":     "[Rimes v. State Farm, 106 Wis. 2d 263 (1982)]",
    "FH Training":  "[FH Master Deck slide NN]",
    "FH Handbook":  "[FH Handbook Topic #NNN (Topic Name)]",
    "CMS":          "[CMS COB Workbook Module N]",
  };

  const initSlides = () => (mod.slides || []).map((s, i) => ({ ...s, _idx: i }));
  const [slides, setSlides] = useState(initSlides);
  const [selected, setSelected] = useState(0);
  const [preview, setPreview] = useState(false);
  const [addMenu, setAddMenu] = useState(false);
  const [pdfLoading, setPdfLoading] = useState(false);
  const [dirty, setDirty] = useState(false);
  const bodyRef = useRef(null);

  const currentSlide = slides[selected] || null;

  const updateCurrent = (patch) => {
    setSlides(ss => ss.map((s, i) => i === selected ? { ...s, ...patch } : s));
    setDirty(true);
  };

  const insertCitation = (tmpl) => {
    const ta = bodyRef.current;
    if (!ta) return;
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    const before = (currentSlide.body || "").slice(0, start);
    const after  = (currentSlide.body || "").slice(end);
    const newBody = before + tmpl + after;
    updateCurrent({ body: newBody });
    setTimeout(() => { ta.focus(); ta.setSelectionRange(start + tmpl.length, start + tmpl.length); }, 0);
  };

  const addSlide = (type) => {
    setAddMenu(false);
    if (type === "pdf") {
      const input = document.createElement("input");
      input.type = "file"; input.accept = ".pdf";
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setPdfLoading(true);
        setTimeout(() => {
          const newSlides = [1, 2, 3].map((p, i) => ({
            id: `imported_${Date.now()}_${i}`,
            type: "imported",
            image_url: "",
            caption: `Imported page ${p} of ${file.name}`,
            source_pdf: file.name,
            source_page: p,
            _idx: slides.length + i,
          }));
          setSlides(ss => [...ss, ...newSlides]);
          setSelected(slides.length);
          setDirty(true);
          setPdfLoading(false);
        }, 1000);
      };
      input.click();
      return;
    }
    const base = type === "image"
      ? { id: `img_${Date.now()}`, type: "image", image_url: "", caption: "", body: "" }
      : { id: `txt_${Date.now()}`, type: "text", heading: "", body: "" };
    setSlides(ss => [...ss, { ...base, _idx: ss.length }]);
    setSelected(slides.length);
    setDirty(true);
  };

  const moveSlide = (from, dir) => {
    const to = from + dir;
    if (to < 0 || to >= slides.length) return;
    const next = [...slides];
    [next[from], next[to]] = [next[to], next[from]];
    setSlides(next);
    setSelected(to);
    setDirty(true);
  };

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    updateCurrent({ image_url: url, _filename: file.name });
  };

  const handleSave = () => {
    const finalSlides = slides.map(({ _idx, _filename, ...rest }, i) => ({ ...rest, order: i + 1 }));
    const idx = CM_MODULES.findIndex(m => m.id === mod.id);
    if (idx !== -1) CM_MODULES[idx].slides = finalSlides;
    setDirty(false);
    onSave(finalSlides);
  };

  const SLIDE_TYPE_ICONS = {
    text:     "M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z",
    image:    "M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z",
    imported: "M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10",
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-2" style={{ background: "rgba(15,23,42,0.6)" }}>
      <div className="relative bg-white rounded-lg shadow-2xl w-full flex flex-col fade-in" style={{ maxWidth: 1000, height: "92vh" }}>
        {/* Header */}
        <div className="px-4 py-2.5 border-b border-slate-200 flex items-center justify-between shrink-0">
          <div>
            <div className="text-sm font-semibold text-slate-800">Slide Editor — {mod.title}</div>
            <div className="text-xs text-slate-500">{slides.length} slide{slides.length !== 1 ? "s" : ""}{dirty ? " · " : ""}{dirty && <span className="text-amber-600">Unsaved changes</span>}</div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => setPreview(p => !p)}
              className={`text-xs px-2.5 py-1 rounded-md border ${preview ? "bg-slate-800 text-white border-slate-800" : "border-slate-300 text-slate-700 hover:bg-slate-50"}`}>
              {preview ? "Edit" : "Preview"}
            </button>
            <button onClick={handleSave} disabled={!dirty}
              className={`text-xs px-3 py-1.5 rounded-md text-white ${dirty ? "bg-brand-600 hover:bg-brand-700" : "bg-slate-300 cursor-not-allowed"}`}>
              Save
            </button>
            <button onClick={() => { if (!dirty || confirm("Discard unsaved changes?")) onClose(); }}
              className="p-1.5 hover:bg-slate-100 rounded">
              <Icon d={ICONS.close} className="w-4 h-4" />
            </button>
          </div>
        </div>

        <div className="flex flex-1 overflow-hidden">
          {/* Left rail */}
          <div className="w-56 shrink-0 border-r border-slate-200 flex flex-col bg-slate-50">
            <div className="flex-1 overflow-y-auto p-2 space-y-1">
              {slides.map((s, i) => (
                <div key={s.id || i}
                  className={`group flex items-center gap-1.5 rounded-md px-2 py-1.5 cursor-pointer text-xs ${i === selected ? "bg-brand-100 text-brand-800" : "hover:bg-slate-200 text-slate-700"}`}
                  onClick={() => { setSelected(i); setPreview(false); }}>
                  <svg className="w-3 h-3 shrink-0" fill="none" stroke="currentColor" strokeWidth={2} viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d={SLIDE_TYPE_ICONS[s.type] || SLIDE_TYPE_ICONS.text} />
                  </svg>
                  <span className="flex-1 truncate">{s.heading || s.caption || `Slide ${i + 1}`}</span>
                  <div className="hidden group-hover:flex flex-col gap-0.5">
                    <button onClick={e => { e.stopPropagation(); moveSlide(i, -1); }} className="hover:text-brand-700 leading-none">▲</button>
                    <button onClick={e => { e.stopPropagation(); moveSlide(i, 1);  }} className="hover:text-brand-700 leading-none">▼</button>
                  </div>
                </div>
              ))}
              {slides.length === 0 && <div className="text-xs text-slate-400 italic px-2 py-4">No slides yet. Add one below.</div>}
            </div>
            {/* Add Slide menu */}
            <div className="relative border-t border-slate-200 p-2">
              {pdfLoading && <div className="text-xs text-slate-500 px-2 py-1.5 text-center animate-pulse">Importing PDF pages…</div>}
              {!pdfLoading && (
                <>
                  <button onClick={() => setAddMenu(m => !m)}
                    className="w-full text-xs px-2 py-1.5 bg-brand-600 text-white rounded-md hover:bg-brand-700">
                    + Add Slide
                  </button>
                  {addMenu && (
                    <div className="absolute bottom-full left-2 right-2 mb-1 bg-white border border-slate-200 rounded-md shadow-lg text-xs overflow-hidden z-10">
                      {[["text", "Text"], ["image", "Image"], ["pdf", "PDF Import"]].map(([t, l]) => (
                        <button key={t} onClick={() => addSlide(t)}
                          className="w-full text-left px-3 py-2 hover:bg-slate-50 text-slate-700">{l}</button>
                      ))}
                    </div>
                  )}
                </>
              )}
            </div>
          </div>

          {/* Main pane */}
          <div className="flex-1 overflow-y-auto p-4">
            {!currentSlide ? (
              <div className="h-full flex items-center justify-center text-sm text-slate-400 italic">Select or add a slide.</div>
            ) : preview ? (
              /* Preview mode */
              <div className="max-w-xl mx-auto bg-slate-50 border border-slate-200 rounded-lg p-6">
                {currentSlide.type === "text" && (
                  <>
                    {currentSlide.heading && <h2 className="text-lg font-semibold text-slate-800 mb-3">{currentSlide.heading}</h2>}
                    <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{currentSlide.body}</p>
                  </>
                )}
                {currentSlide.type === "image" && (
                  <>
                    {currentSlide.image_url
                      ? <img src={currentSlide.image_url} alt={currentSlide.caption} className="w-full rounded mb-3 object-contain" style={{ maxHeight: 360 }} />
                      : <div className="w-full h-48 bg-slate-200 rounded mb-3 flex items-center justify-center text-slate-400 text-sm">No image uploaded</div>
                    }
                    {currentSlide.caption && <div className="text-xs text-slate-500 italic text-center mb-2">{currentSlide.caption}</div>}
                    {currentSlide.body && <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{currentSlide.body}</p>}
                  </>
                )}
                {currentSlide.type === "imported" && (
                  <>
                    <div className="w-full h-48 bg-slate-200 rounded mb-3 flex items-center justify-center text-slate-400 text-sm">
                      {currentSlide.source_pdf ? `${currentSlide.source_pdf} — p.${currentSlide.source_page}` : "Imported page"}
                    </div>
                    {currentSlide.caption && <div className="text-xs text-slate-500 italic text-center">{currentSlide.caption}</div>}
                  </>
                )}
              </div>
            ) : (
              /* Edit mode */
              <div className="space-y-4 max-w-2xl">
                {currentSlide.type === "text" && (
                  <>
                    <div>
                      <label className="text-xs font-medium text-slate-600 block mb-1">Heading</label>
                      <input value={currentSlide.heading || ""} onChange={e => updateCurrent({ heading: e.target.value })}
                        className="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400"
                        placeholder="Slide heading" />
                    </div>
                    <div>
                      <div className="flex items-center justify-between mb-1">
                        <label className="text-xs font-medium text-slate-600">Body (Markdown)</label>
                      </div>
                      {/* Citation helpers */}
                      <div className="flex flex-wrap gap-1 mb-2">
                        {Object.entries(CITATION_TEMPLATES).map(([label, tmpl]) => (
                          <button key={label} onClick={() => insertCitation(tmpl)}
                            className="text-[10px] px-1.5 py-0.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded border border-slate-200">
                            {label}
                          </button>
                        ))}
                      </div>
                      <textarea ref={bodyRef} value={currentSlide.body || ""}
                        onChange={e => updateCurrent({ body: e.target.value })} rows={20}
                        className="w-full border border-slate-300 rounded-md px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-brand-400 resize-y"
                        placeholder="Slide body in Markdown…" />
                    </div>
                  </>
                )}
                {currentSlide.type === "image" && (
                  <>
                    <div>
                      <label className="text-xs font-medium text-slate-600 block mb-1">Image</label>
                      {currentSlide.image_url
                        ? <div className="mb-2"><img src={currentSlide.image_url} className="max-h-48 rounded border border-slate-200 object-contain" alt="" /></div>
                        : null
                      }
                      <label className="flex items-center justify-center w-full h-24 border-2 border-dashed border-slate-300 rounded-lg cursor-pointer hover:border-brand-400 hover:bg-brand-50 transition-colors">
                        <div className="text-xs text-slate-500">Click to upload image (stored locally)</div>
                        <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                      </label>
                    </div>
                    <div>
                      <label className="text-xs font-medium text-slate-600 block mb-1">Caption</label>
                      <input value={currentSlide.caption || ""} onChange={e => updateCurrent({ caption: e.target.value })}
                        className="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400"
                        placeholder="Image caption" />
                    </div>
                    <div>
                      <label className="text-xs font-medium text-slate-600 block mb-1">Body (optional Markdown)</label>
                      <textarea value={currentSlide.body || ""} onChange={e => updateCurrent({ body: e.target.value })} rows={8}
                        className="w-full border border-slate-300 rounded-md px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-brand-400 resize-y"
                        placeholder="Optional body text…" />
                    </div>
                  </>
                )}
                {currentSlide.type === "imported" && (
                  <>
                    <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 text-sm text-slate-700">
                      <div className="font-medium mb-1">Imported slide — read-only</div>
                      <div className="text-xs text-slate-500">Source: {currentSlide.source_pdf || "unknown PDF"} · Page {currentSlide.source_page || "?"}</div>
                      <div className="mt-3 h-32 bg-slate-200 rounded flex items-center justify-center text-slate-400 text-xs">PDF page thumbnail (Phase 2: real rendering)</div>
                    </div>
                    <div>
                      <label className="text-xs font-medium text-slate-600 block mb-1">Caption (editable)</label>
                      <input value={currentSlide.caption || ""} onChange={e => updateCurrent({ caption: e.target.value })}
                        className="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400"
                        placeholder="Caption" />
                    </div>
                  </>
                )}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Quiz Editor ---------- */
function QuizEditor({ quiz, isCapstone, onSave, onClose }) {
  const isFR = isCapstone || quiz.type === "free_response";
  const initQuestions = () => (quiz.questions || (quiz.scenarios ? quiz.scenarios.map((sc, i) => ({
    id: sc.id, type: "free_response",
    stem: `${sc.facts}\n\nPrompts:\n${sc.prompts.map((p, pi) => `${pi + 1}. ${p}`).join("\n")}`,
    model_answer: sc.modelAnswer, grading_rubric: "(See model answer walkthrough above)",
    topic: sc.title, _scIdx: i,
  })) : []));

  const [title, setTitle] = useState(quiz.title || "");
  const [description, setDescription] = useState(quiz.description || "");
  const [passThreshold, setPassThreshold] = useState(quiz.passThreshold ?? 80);
  const [questions, setQuestions] = useState(initQuestions);
  const [selectedQ, setSelectedQ] = useState(questions.length > 0 ? 0 : null);
  const [dirty, setDirty] = useState(false);
  const [previewQ, setPreviewQ] = useState({});
  const [showAnswer, setShowAnswer] = useState({});
  const [addTypeMenu, setAddTypeMenu] = useState(false);

  const currentQ = selectedQ !== null ? questions[selectedQ] : null;

  const updateQ = (patch) => {
    setQuestions(qs => qs.map((q, i) => i === selectedQ ? { ...q, ...patch } : q));
    setDirty(true);
  };

  const moveQ = (from, dir) => {
    const to = from + dir;
    if (to < 0 || to >= questions.length) return;
    const next = [...questions];
    [next[from], next[to]] = [next[to], next[from]];
    setQuestions(next);
    setSelectedQ(to);
    setDirty(true);
  };

  const addQuestion = (type) => {
    setAddTypeMenu(false);
    const base = type === "free_response"
      ? { id: `q_fr_${Date.now()}`, type: "free_response", stem: "", topic: "", model_answer: "", grading_rubric: "" }
      : { id: `q_mc_${Date.now()}`, type: "multiple_choice", stem: "", topic: "", options: { a: "", b: "", c: "", d: "" }, answer: "a", rationale: "" };
    setQuestions(qs => [...qs, base]);
    setSelectedQ(questions.length);
    setDirty(true);
  };

  const handleSave = () => {
    const finalQuestions = questions.map(({ _scIdx, ...rest }, i) => ({ ...rest, order: i + 1 }));
    if (isCapstone) {
      CM_COURSE_QUIZ.title = title;
    } else {
      const idx = CM_MODULE_QUIZZES.findIndex(q => q.id === quiz.id);
      if (idx !== -1) {
        CM_MODULE_QUIZZES[idx].title = title;
        CM_MODULE_QUIZZES[idx].passThreshold = passThreshold;
        CM_MODULE_QUIZZES[idx].questions = finalQuestions;
      }
    }
    setDirty(false);
    onSave(finalQuestions, title);
  };

  const TYPE_BADGE = { multiple_choice: "MC", free_response: "FR" };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-2" style={{ background: "rgba(15,23,42,0.6)" }}>
      <div className="relative bg-white rounded-lg shadow-2xl w-full flex flex-col fade-in" style={{ maxWidth: 900, height: "92vh" }}>
        {/* Header */}
        <div className="px-4 py-2.5 border-b border-slate-200 flex items-center justify-between shrink-0">
          <div>
            <div className="text-sm font-semibold text-slate-800">Quiz Editor{isCapstone ? " (FR Capstone)" : ""}</div>
            <div className="text-xs text-slate-500">{questions.length} question{questions.length !== 1 ? "s" : ""}{dirty ? " · " : ""}{dirty && <span className="text-amber-600">Unsaved changes</span>}</div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={handleSave} disabled={!dirty}
              className={`text-xs px-3 py-1.5 rounded-md text-white ${dirty ? "bg-brand-600 hover:bg-brand-700" : "bg-slate-300 cursor-not-allowed"}`}>
              Save
            </button>
            <button onClick={() => { if (!dirty || confirm("Discard unsaved changes?")) onClose(); }}
              className="p-1.5 hover:bg-slate-100 rounded">
              <Icon d={ICONS.close} className="w-4 h-4" />
            </button>
          </div>
        </div>

        <div className="flex-1 overflow-y-auto">
          {/* Quiz-level fields */}
          <div className="p-4 border-b border-slate-100 grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label className="text-xs font-medium text-slate-600 block mb-1">Quiz Title</label>
              <input value={title} onChange={e => { setTitle(e.target.value); setDirty(true); }}
                className="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400" />
            </div>
            <div>
              <label className="text-xs font-medium text-slate-600 block mb-1">
                {isCapstone || isFR ? "Completion" : "Pass Threshold (%)"}
              </label>
              {isCapstone || isFR
                ? <div className="text-sm text-slate-500 px-3 py-2 bg-slate-50 border border-slate-200 rounded-md">Completion-based (self-attestation)</div>
                : <input type="number" min={0} max={100} value={passThreshold}
                    onChange={e => { setPassThreshold(Number(e.target.value)); setDirty(true); }}
                    className="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400" />
              }
            </div>
          </div>

          <div className="flex flex-1" style={{ minHeight: 0 }}>
            {/* Question list */}
            <div className="w-52 shrink-0 border-r border-slate-200 bg-slate-50 flex flex-col">
              <div className="flex-1 overflow-y-auto p-2 space-y-1">
                {questions.map((q, i) => (
                  <div key={q.id || i}
                    className={`group flex items-center gap-1.5 rounded-md px-2 py-1.5 cursor-pointer text-xs ${i === selectedQ ? "bg-brand-100 text-brand-800" : "hover:bg-slate-200 text-slate-700"}`}
                    onClick={() => setSelectedQ(i)}>
                    <span className="shrink-0 px-1 py-0.5 rounded text-[10px] font-medium bg-slate-200 text-slate-700">{TYPE_BADGE[q.type] || "MC"}</span>
                    <span className="flex-1 truncate">Q{i + 1}. {q.stem ? q.stem.slice(0, 30) : "(empty)"}</span>
                    <div className="hidden group-hover:flex flex-col gap-0.5">
                      <button onClick={e => { e.stopPropagation(); moveQ(i, -1); }} className="hover:text-brand-700 leading-none">▲</button>
                      <button onClick={e => { e.stopPropagation(); moveQ(i, 1);  }} className="hover:text-brand-700 leading-none">▼</button>
                    </div>
                  </div>
                ))}
                {questions.length === 0 && <div className="text-xs text-slate-400 italic px-2 py-4">No questions yet.</div>}
              </div>
              <div className="relative border-t border-slate-200 p-2">
                <button onClick={() => setAddTypeMenu(m => !m)}
                  className="w-full text-xs px-2 py-1.5 bg-brand-600 text-white rounded-md hover:bg-brand-700">
                  + Add Question
                </button>
                {addTypeMenu && (
                  <div className="absolute bottom-full left-2 right-2 mb-1 bg-white border border-slate-200 rounded-md shadow-lg text-xs overflow-hidden z-10">
                    <button onClick={() => addQuestion("multiple_choice")} className="w-full text-left px-3 py-2 hover:bg-slate-50 text-slate-700">Multiple Choice</button>
                    <button onClick={() => addQuestion("free_response")}   className="w-full text-left px-3 py-2 hover:bg-slate-50 text-slate-700">Free Response</button>
                  </div>
                )}
              </div>
            </div>

            {/* Question editor */}
            <div className="flex-1 overflow-y-auto p-4">
              {currentQ === null ? (
                <div className="h-full flex items-center justify-center text-sm text-slate-400 italic">Select or add a question.</div>
              ) : (
                <div className="space-y-4 max-w-2xl">
                  <div className="flex items-center justify-between">
                    <span className="text-xs font-semibold text-slate-700 uppercase tracking-wide">
                      Q{selectedQ + 1} — {currentQ.type === "free_response" ? "Free Response" : "Multiple Choice"}
                    </span>
                    <button onClick={() => setPreviewQ(p => ({ ...p, [selectedQ]: !p[selectedQ] }))}
                      className={`text-xs px-2.5 py-1 rounded-md border ${previewQ[selectedQ] ? "bg-slate-800 text-white border-slate-800" : "border-slate-300 text-slate-700 hover:bg-slate-50"}`}>
                      {previewQ[selectedQ] ? "Edit" : "Preview"}
                    </button>
                  </div>

                  {previewQ[selectedQ] ? (
                    /* Question preview */
                    <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 space-y-3">
                      <div className="text-sm font-medium text-slate-800 whitespace-pre-wrap">{currentQ.stem || "(no stem)"}</div>
                      {currentQ.type === "multiple_choice" && (
                        <>
                          <div className="space-y-1.5">
                            {["a", "b", "c", "d"].map(k => (
                              <div key={k} className={`text-xs px-3 py-2 rounded border ${showAnswer[selectedQ] && k === currentQ.answer ? "border-emerald-300 bg-emerald-50 text-emerald-800" : "border-slate-200 text-slate-700"}`}>
                                <span className="font-mono text-slate-400 mr-1">{k}.</span> {currentQ.options?.[k] || "(empty)"}
                                {showAnswer[selectedQ] && k === currentQ.answer && <span className="ml-2 font-semibold">✓</span>}
                              </div>
                            ))}
                          </div>
                          <button onClick={() => setShowAnswer(s => ({ ...s, [selectedQ]: !s[selectedQ] }))}
                            className="text-xs text-brand-700 hover:underline">
                            {showAnswer[selectedQ] ? "Hide answer" : "Show answer"}
                          </button>
                          {showAnswer[selectedQ] && currentQ.rationale && (
                            <div className="text-xs text-slate-600 italic">{currentQ.rationale}</div>
                          )}
                        </>
                      )}
                      {currentQ.type === "free_response" && (
                        <>
                          <button onClick={() => setShowAnswer(s => ({ ...s, [selectedQ]: !s[selectedQ] }))}
                            className="text-xs text-brand-700 hover:underline">
                            {showAnswer[selectedQ] ? "Hide model answer" : "Show model answer"}
                          </button>
                          {showAnswer[selectedQ] && (
                            <div className="bg-white border border-slate-200 rounded p-3 text-xs text-slate-700 whitespace-pre-wrap">{currentQ.model_answer}</div>
                          )}
                        </>
                      )}
                    </div>
                  ) : (
                    /* Question edit */
                    <div className="space-y-3">
                      <div>
                        <label className="text-xs font-medium text-slate-600 block mb-1">
                          {currentQ.type === "free_response" ? "Stem (facts + prompts)" : "Stem"}
                        </label>
                        <textarea value={currentQ.stem || ""} onChange={e => updateQ({ stem: e.target.value })}
                          rows={currentQ.type === "free_response" ? 10 : 6}
                          className="w-full border border-slate-300 rounded-md px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-brand-400 resize-y" />
                      </div>
                      <div>
                        <label className="text-xs font-medium text-slate-600 block mb-1">Topic (analytics)</label>
                        <input value={currentQ.topic || ""} onChange={e => updateQ({ topic: e.target.value })}
                          className="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400"
                          placeholder="e.g. Made-whole doctrine" />
                      </div>

                      {currentQ.type === "multiple_choice" && (
                        <>
                          <div>
                            <label className="text-xs font-medium text-slate-600 block mb-1">Options</label>
                            <div className="space-y-2">
                              {["a", "b", "c", "d"].map(k => (
                                <div key={k} className="flex items-center gap-2">
                                  <input type="radio" name={`correct_${selectedQ}`} checked={currentQ.answer === k}
                                    onChange={() => updateQ({ answer: k })} className="text-brand-600 shrink-0" />
                                  <span className="font-mono text-xs text-slate-500 w-4">{k}.</span>
                                  <input value={currentQ.options?.[k] || ""} onChange={e => updateQ({ options: { ...currentQ.options, [k]: e.target.value } })}
                                    className="flex-1 border border-slate-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-brand-400"
                                    placeholder={`Option ${k}`} />
                                </div>
                              ))}
                            </div>
                            <div className="text-[10px] text-slate-400 mt-1">Select the radio button next to the correct answer.</div>
                          </div>
                          <div>
                            <label className="text-xs font-medium text-slate-600 block mb-1">Explanation (shown after submission)</label>
                            <textarea value={currentQ.rationale || ""} onChange={e => updateQ({ rationale: e.target.value })} rows={4}
                              className="w-full border border-slate-300 rounded-md px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-brand-400 resize-y"
                              placeholder="Why is this the correct answer? Why are the other options wrong?" />
                          </div>
                        </>
                      )}

                      {currentQ.type === "free_response" && (
                        <>
                          <div>
                            <label className="text-xs font-medium text-slate-600 block mb-1">Model Answer Walkthrough</label>
                            <textarea value={currentQ.model_answer || ""} onChange={e => updateQ({ model_answer: e.target.value })} rows={12}
                              className="w-full border border-slate-300 rounded-md px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-brand-400 resize-y"
                              placeholder="Step-by-step model answer shown after learner submits…" />
                          </div>
                          <div>
                            <label className="text-xs font-medium text-slate-600 block mb-1">Grading Rubric</label>
                            <textarea value={currentQ.grading_rubric || ""} onChange={e => updateQ({ grading_rubric: e.target.value })} rows={6}
                              className="w-full border border-slate-300 rounded-md px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-brand-400 resize-y"
                              placeholder="Rubric points: what a complete answer must include…" />
                          </div>
                        </>
                      )}
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
