);

/* ---------- Intake / Triage ---------- */
function IntakeView({ claims, selectedClaimId, setSelectedClaimId, openClaim }) {
  const [q, setQ] = useState("");
  const [filter, setFilter] = useState("all");
  const [toast, setToast] = useState("");
  const [dialog, setDialog] = useState(null);
  const showToast = (msg) => setToast(msg);

  const rows = claims.map(c => ({ ...c, triage: triageClaim(c) }));
  const filtered = rows.filter(r => {
    if (filter === "potential" && !r.triage.hasSubrogationPotential) return false;
    if (filter === "none" && r.triage.hasSubrogationPotential) return false;
    if (q && !(`${r.member.firstName} ${r.member.lastName} ${r.id}`.toLowerCase().includes(q.toLowerCase()))) return false;
    return true;
  });

  const selected = filtered.find(r => r.id === selectedClaimId) || rows.find(r => r.id === selectedClaimId);

  return (
    <div className="space-y-4 fade-in">
      <div className="flex items-start justify-between flex-wrap gap-2">
        <div>
          <h1 className="text-2xl font-semibold text-slate-800">Claims & Triage</h1>
          <p className="text-sm text-slate-500">Triage rules flag claims with subrogation potential. Showing <span className="font-medium text-slate-700">{claims.length} claim{claims.length === 1 ? "" : "s"}</span> for this customer — switch customers in the top bar to see other books.</p>
        </div>
        <button
          onClick={() => setDialog({
            title: "New claim intake",
            description: "Manually create a claim record for triage. In production, claim intake happens automatically from carrier feeds (837 transactions, NCPDP, or daily extracts) — this dialog is the manual entry fallback for edge cases.",
            fields: [
              { name: "memberName", label: "Member name", type: "text", required: true, placeholder: "e.g., Marcus Reyes" },
              { name: "accidentDate", label: "Date of accident", type: "date", required: true, defaultValue: new Date().toISOString().slice(0, 10) },
              { name: "accidentState", label: "State of accident", type: "text", required: true, defaultValue: "WI", placeholder: "WI" },
              { name: "summary", label: "Summary (optional)", type: "textarea", rows: 2, placeholder: "Brief description of the incident and known coverages." },
            ],
            submitLabel: "Create claim",
            onSubmit: ({ memberName }) => showToast(`New claim queued for triage · ${memberName}`),
          })}
          className="text-sm px-3 py-1.5 bg-brand-600 text-white rounded-md hover:bg-brand-700">
          + New Claim
        </button>
      </div>

      <div className="flex gap-2 flex-wrap">
        <div className="relative flex-1 min-w-[200px]">
          <Icon d={ICONS.search} className="w-4 h-4 absolute left-2.5 top-2.5 text-slate-400" />
          <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search member or claim ID…"
            className="w-full pl-8 pr-3 py-2 text-sm border border-slate-300 rounded-md" />
        </div>
        <select value={filter} onChange={e => setFilter(e.target.value)}
          className="text-sm border border-slate-300 rounded-md px-2 py-2 bg-white">
          <option value="all">All claims</option>
          <option value="potential">Subrogation potential</option>
          <option value="none">No potential</option>
        </select>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div className="lg:col-span-2 bg-white border border-slate-200 rounded-lg overflow-hidden">
          <div className="overflow-x-auto scrollbar-thin">
            <table className="min-w-full text-sm">
              <thead className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
                <tr>
                  <th className="text-left px-3 py-2 font-medium">Claim</th>
                  <th className="text-left px-3 py-2 font-medium">Member</th>
                  <th className="text-right px-3 py-2 font-medium">Paid</th>
                  <th className="text-left px-3 py-2 font-medium">Triage</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(r => (
                  <tr key={r.id}
                      onClick={() => setSelectedClaimId(r.id)}
                      onDoubleClick={() => openClaim(r.id)}
                      className={`border-t border-slate-100 cursor-pointer hover:bg-slate-50 ${selectedClaimId === r.id ? "bg-brand-50" : ""}`}>
                    <td className="px-3 py-2">
                      <div className="font-medium text-slate-800">{r.id}</div>
                      <div className="text-xs text-slate-500">{r.serviceDate}</div>
                    </td>
                    <td className="px-3 py-2">
                      <div className="text-slate-800">{r.member.firstName} {r.member.lastName}</div>
                      <div className="text-xs text-slate-500">{r.diagnosisCodes.join(", ")}</div>
                    </td>
                    <td className="px-3 py-2 text-right tabular-nums">{fmtMoney(r.paidAmount)}</td>
                    <td className="px-3 py-2">
                      <div className="flex items-center justify-between gap-2">
                        {r.triage.hasSubrogationPotential ? (
                          <Pill className="bg-amber-100 text-amber-900">
                            <Icon d={ICONS.alert} className="w-3 h-3 mr-1" />
                            Potential ({r.triage.score})
                          </Pill>
                        ) : (
                          <Pill className="bg-slate-100 text-slate-600">No flag</Pill>
                        )}
                        <button onClick={(e) => { e.stopPropagation(); openClaim(r.id); }}
                                className="text-xs text-brand-700 hover:underline">Open →</button>
                      </div>
                    </td>
                  </tr>
                ))}
                {filtered.length === 0 && (
                  <tr><td colSpan="4" className="text-center text-sm text-slate-400 py-8">No claims match the current filter.</td></tr>
                )}
              </tbody>
            </table>
          </div>
        </div>

        <div className="bg-white border border-slate-200 rounded-lg p-4">
          {selected ? (
            <div className="space-y-3 text-sm">
              <div>
                <div className="text-xs text-slate-500 uppercase tracking-wide">Claim detail</div>
                <div className="font-semibold text-slate-800">{selected.id} · {selected.member.firstName} {selected.member.lastName}</div>
              </div>
              <Row k="Date of service" v={selected.serviceDate} />
              <Row k="Billed / Paid"   v={`${fmtMoney(selected.billedAmount)} / ${fmtMoney(selected.paidAmount)}`} />
              <Row k="Diagnoses"       v={selected.diagnosisCodes.join(", ")} />
              <Row k="Place of service" v={selected.placeOfService} />
              <Row k="Accident"        v={selected.accidentIndicator === "Y" ? `Yes (${selected.accidentState || "—"} · ${selected.accidentDate || "—"})` : selected.accidentIndicator === "N" ? "No" : "Unknown"} />
              <div className="pt-2 border-t border-slate-100">
                <div className="text-xs text-slate-500 uppercase tracking-wide mb-1">Triage signals</div>
                {selected.triage.signals.length === 0
                  ? <div className="text-xs text-slate-400">No signals.</div>
                  : <ul className="space-y-1">
                      {selected.triage.signals.map((s, i) => (
                        <li key={i} className="text-xs text-slate-700 flex gap-1.5"><span className="text-amber-500">•</span>{s}</li>
                      ))}
                    </ul>
                }
                <div className="text-xs text-slate-500 mt-2">Score: <span className="font-semibold text-slate-700">{selected.triage.score}</span> · Recommended: <span className="font-semibold text-slate-700">{selected.triage.recommendedAction.replace("_", " ")}</span></div>
              </div>
            </div>
          ) : (
            <div className="text-sm text-slate-400 text-center py-10">Select a claim to see triage detail.</div>
          )}
        </div>
      </div>
      <Toast message={toast} onClose={() => setToast("")} />
      <Dialog config={dialog} onClose={() => setDialog(null)} />
    </div>
  );
}
const Row = ({ k, v }) => (
  <div className="flex justify-between gap-3 text-xs">
    <span className="text-slate-500">{k}</span>
    <span className="text-slate-800 text-right">{v}</span>
  </div>
);

/* ---------- COB Analyzer ---------- */
function CobAnalyzerView({ claims, initialClaimId }) {
  const [claimId, setClaimId] = useState(initialClaimId || claims[0]?.id);
  const [toast, setToast] = useState("");
  const [dialog, setDialog] = useState(null);
  const showToast = (msg) => setToast(msg);
  useEffect(() => { if (initialClaimId) setClaimId(initialClaimId); }, [initialClaimId]);

  const claim = claims.find(c => c.id === claimId);
  const result = useMemo(() => claim ? determineCobPrimacy({
    accident: claim.accidentIndicator === "Y" ? { isAuto: true, state: claim.accidentState, date: claim.accidentDate } : { isAuto: false },
    member: claim.member,
    coverages: claim.coverages,
  }) : null, [claim]);

  const wiOverlay = useMemo(() => claim ? wisconsinOverlay({
    accident: { state: claim.accidentState },
    liability: claim.liability,
    recovery: claim.recovery,
    coverages: claim.coverages,
  }) : null, [claim]);

  if (!claim) return <div className="fade-in"><h1 className="text-2xl font-semibold text-slate-800">COB Analyzer</h1><p className="text-sm text-slate-500 mt-1">No claims for this tenant.</p></div>;

  const primary   = claim.coverages.find(c => c.id === result.primaryId);
  const secondary = claim.coverages.find(c => c.id === result.secondaryId);

  const confColor = result.confidence === "HIGH" ? "bg-emerald-100 text-emerald-800" : result.confidence === "MEDIUM" ? "bg-amber-100 text-amber-900" : "bg-rose-100 text-rose-800";

  return (
    <div className="space-y-4 fade-in">
      <div>
        <h1 className="text-2xl font-semibold text-slate-800">COB Primacy Analyzer</h1>
        <p className="text-sm text-slate-500">Explainable coordination-of-benefits determination with case citations.</p>
      </div>

      <div className="flex flex-col sm:flex-row gap-2">
        <select value={claimId} onChange={e => setClaimId(e.target.value)} className="text-sm border border-slate-300 rounded-md px-3 py-2 bg-white flex-1">
          {claims.map(c => (
            <option key={c.id} value={c.id}>{c.id} — {c.member.firstName} {c.member.lastName} — {c.diagnosisCodes.join(", ")}</option>
          ))}
        </select>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        {/* Inputs */}
        <Card title="Inputs">
          <div className="space-y-2 text-sm">
            <div className="text-xs text-slate-500 uppercase">Member</div>
            <Row k="Name" v={`${claim.member.firstName} ${claim.member.lastName}`} />
            <Row k="DOB / Age" v={`${claim.member.dob} (${claim.member.age})`} />
            <Row k="Relationship" v={claim.member.relationship} />
            {claim.accidentIndicator === "Y" && (
              <>
                <div className="text-xs text-slate-500 uppercase mt-3">Accident</div>
                <Row k="State" v={claim.accidentState || "—"} />
                <Row k="Date"  v={claim.accidentDate || "—"} />
                <Row k="Jurisdiction" v="Wisconsin (at-fault, made-whole)" />
              </>
            )}
            <div className="text-xs text-slate-500 uppercase mt-3">Coverages</div>
            {claim.coverages.map(cov => (
              <div key={cov.id} className="text-xs border border-slate-100 rounded-md p-2 bg-slate-50">
                <div className="font-medium text-slate-800">{cov.payerName}</div>
                <div className="text-slate-500">{cov.planType} · {cov.basis} · {cov.funding}</div>
                {cov.subscriberName && <div className="text-slate-500">Subscriber: {cov.subscriberName} (DOB {cov.subscriberDob})</div>}
                {cov.hasEscapeClause && <div className="text-amber-700">⚠ Escape clause</div>}
                {cov.hasExcessClause && <div className="text-amber-700">⚠ Excess clause</div>}
              </div>
            ))}
          </div>
        </Card>

        {/* Determination */}
        <div className="lg:col-span-2 space-y-4">
          <div className="bg-white border border-slate-200 rounded-lg overflow-hidden">
            <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between flex-wrap gap-2">
              <h2 className="font-medium text-slate-800 text-sm">Determination</h2>
              <div className="flex gap-2 items-center">
                <Pill className={confColor}>Confidence: {result.confidence}</Pill>
                {result.reviewRequired && <Pill className="bg-rose-100 text-rose-800">Manual review</Pill>}
              </div>
            </div>
            <div className="p-4 space-y-4">
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div className="border border-emerald-200 bg-emerald-50 rounded-md p-3">
                  <div className="text-xs uppercase text-emerald-800 font-semibold mb-1">Primary</div>
                  <div className="font-semibold text-slate-800">{primary?.payerName || "—"}</div>
                  <div className="text-xs text-slate-500">{primary?.planType} · {primary?.basis}</div>
                </div>
                <div className="border border-slate-200 bg-slate-50 rounded-md p-3">
                  <div className="text-xs uppercase text-slate-600 font-semibold mb-1">Secondary</div>
                  <div className="font-semibold text-slate-800">{secondary?.payerName || "—"}</div>
                  <div className="text-xs text-slate-500">{secondary?.planType} · {secondary?.basis}</div>
                </div>
              </div>

              <div>
                <div className="text-xs uppercase text-slate-500 font-semibold mb-1">Controlling rule</div>
                <div className="text-sm font-medium text-slate-800">{result.rule}</div>
                <div className="text-sm text-slate-600">{result.ruleDescription}</div>
              </div>

              <div>
                <div className="text-xs uppercase text-slate-500 font-semibold mb-1">Rationale</div>
                <p className="text-sm text-slate-700 leading-relaxed">{result.rationale}</p>
              </div>

              {result.citations.length > 0 && (
                <div>
                  <div className="text-xs uppercase text-slate-500 font-semibold mb-1">Citations</div>
                  <ul className="space-y-1">
                    {result.citations.map((c, i) => (
                      <li key={i} className="text-xs text-slate-600 flex gap-2 items-start">
                        <Icon d={ICONS.ext} className="w-3.5 h-3.5 mt-0.5 text-brand-600" />
                        <span className="font-mono">{c}</span>
                      </li>
                    ))}
                  </ul>
                </div>
              )}

              {result.warnings.length > 0 && (
                <div className="border border-amber-200 bg-amber-50 rounded-md p-3">
                  <div className="text-xs uppercase text-amber-800 font-semibold mb-1">Warnings</div>
                  <ul className="space-y-1">
                    {result.warnings.map((w, i) => (
                      <li key={i} className="text-xs text-amber-900 flex gap-2"><span>⚠</span>{w}</li>
                    ))}
                  </ul>
                </div>
              )}

              <div className="flex gap-2 pt-2 border-t border-slate-100 flex-wrap">
                <button
                  onClick={() => showToast("Determination saved to claim file")}
                  className="text-sm px-3 py-1.5 bg-brand-600 text-white rounded-md hover:bg-brand-700">
                  Save determination
                </button>
                <button
                  onClick={() => setDialog({
                    title: "Send to Recovery",
                    description: "This file will be packaged and routed to your recovery team. In production, the recovery team is one of: in-house subrogation counsel, contracted outside law firm, or subrogation TPA — configured per customer at onboarding.",
                    body: (
                      <div className="bg-slate-50 border border-slate-200 rounded-md p-3 space-y-1.5 text-xs">
                        <div><span className="text-slate-500 font-semibold uppercase">Primary:</span> <span className="text-slate-800">{primary?.payerName || "—"} <span className="text-slate-500">({primary?.planType || "—"})</span></span></div>
                        <div><span className="text-slate-500 font-semibold uppercase">Secondary:</span> <span className="text-slate-800">{secondary?.payerName || "—"} <span className="text-slate-500">({secondary?.planType || "—"})</span></span></div>
                        <div><span className="text-slate-500 font-semibold uppercase">Controlling rule:</span> <span className="text-slate-800 font-mono">{result.rule}</span></div>
                        {wiOverlay && wiOverlay.flags && wiOverlay.flags.length > 0 && (
                          <div><span className="text-slate-500 font-semibold uppercase">WI overlay:</span> <span className="text-slate-800">{wiOverlay.flags.map(f => f.label).join(" · ")}</span></div>
                        )}
                        {claim.liability && claim.liability.attorneyOfRecord && (
                          <div><span className="text-slate-500 font-semibold uppercase">Attorney of record:</span> <span className="text-slate-800">{claim.liability.attorneyOfRecord}</span></div>
                        )}
                        <div><span className="text-slate-500 font-semibold uppercase">Confidence:</span> <span className="text-slate-800">{result.confidence}</span></div>
                      </div>
                    ),
                    fields: [
                      { name: "priority", label: "Priority", type: "select",
                        defaultValue: "STANDARD",
                        options: [
                          { value: "STANDARD", label: "Standard" },
                          { value: "URGENT", label: "Urgent — statute of limitations approaching" },
                        ] },
                      { name: "notes", label: "Notes for recovery team (optional)", type: "textarea", rows: 2,
                        placeholder: "e.g., Member has retained Brennan Law; coordinate intake call within 7 days." },
                    ],
                    submitLabel: "Send to recovery team",
                    onSubmit: ({ priority }) => {
                      showToast(`Recovery file routed · ${priority === "URGENT" ? "Urgent priority" : "Standard priority"}`);
                    },
                  })}
                  className="text-sm px-3 py-1.5 bg-white border border-slate-300 text-slate-700 rounded-md hover:bg-slate-50">
                  Send to Recovery
                </button>
                <button
                  onClick={() => setDialog({
                    title: "Override determination",
                    description: "Override the engine’s recommended primacy. Your override and justification will be permanently recorded in the audit log alongside the original determination.",
                    fields: [
                      { name: "justification", label: "Justification (required for audit)", type: "textarea", required: true, rows: 3,
                        placeholder: "e.g., Plan-document language explicitly makes auto med-pay primary for accident-related claims." },
                    ],
                    submitLabel: "Override & log",
                    danger: true,
                    onSubmit: () => showToast("Override logged with justification"),
                  })}
                  className="text-sm px-3 py-1.5 bg-white border border-slate-300 text-slate-700 rounded-md hover:bg-slate-50">
                  Override
                </button>
              </div>
            </div>
          </div>

          {/* Wisconsin overlay panel */}
          {wiOverlay && (
            <div className="bg-white border border-red-200 rounded-lg overflow-hidden">
              <div className="px-4 py-3 border-b border-red-100 bg-red-50 flex items-center justify-between flex-wrap gap-2">
                <h2 className="font-medium text-red-900 text-sm">Wisconsin recovery overlay</h2>
                <Pill className="bg-red-100 text-red-800">WI · at-fault state</Pill>
              </div>
              <div className="p-4 space-y-3">
                <p className="text-sm text-slate-700">{wiOverlay.summary}</p>

                {wiOverlay.compNeg && (
                  <div className={`rounded-md p-3 ${wiOverlay.compNeg.barred ? "bg-rose-50 border border-rose-200" : "bg-amber-50 border border-amber-200"}`}>
                    <div className="text-xs uppercase font-semibold mb-1 text-slate-700">Comparative negligence — Wis. Stat. § 895.045</div>
                    <p className="text-sm text-slate-800">{wiOverlay.compNeg.rationale}</p>
                    {!wiOverlay.compNeg.barred && (
                      <div className="mt-2 grid grid-cols-3 gap-2 text-xs">
                        <div><span className="text-slate-500">Claimant fault</span><div className="font-semibold text-slate-800">{wiOverlay.compNeg.claimantFaultPct}%</div></div>
                        <div><span className="text-slate-500">Defendant fault</span><div className="font-semibold text-slate-800">{wiOverlay.compNeg.defendantFaultPct}%</div></div>
                        <div><span className="text-slate-500">Recoverable</span><div className="font-semibold text-emerald-700">{fmtMoney(wiOverlay.compNeg.recoverable)}</div></div>
                      </div>
                    )}
                  </div>
                )}

                {wiOverlay.commonFund && (
                  <div className="rounded-md p-3 bg-violet-50 border border-violet-200">
                    <div className="text-xs uppercase font-semibold mb-1 text-violet-900">Common-fund pro-rata attorney fee share</div>
                    <p className="text-sm text-slate-800">{wiOverlay.commonFund.rationale}</p>
                    <div className="mt-2 grid grid-cols-2 sm:grid-cols-4 gap-2 text-xs">
                      <div><span className="text-slate-500">Plan gross</span><div className="font-semibold text-slate-800">{fmtMoney(wiOverlay.commonFund.planGrossRecovery)}</div></div>
                      <div><span className="text-slate-500">Settlement</span><div className="font-semibold text-slate-800">{fmtMoney(wiOverlay.commonFund.totalSettlement)}</div></div>
                      <div><span className="text-slate-500">Atty fee share</span><div className="font-semibold text-rose-700">−{fmtMoney(wiOverlay.commonFund.planAttorneyFeeShare)}</div></div>
                      <div><span className="text-slate-500">Net plan recovery</span><div className="font-semibold text-emerald-700">{fmtMoney(wiOverlay.commonFund.netPlanRecovery)}</div></div>
                    </div>
                  </div>
                )}

                <div>
                  <div className="text-xs uppercase text-slate-500 font-semibold mb-1">Wisconsin flags</div>
                  <ul className="space-y-2">
                    {wiOverlay.flags.map((f, i) => (
                      <li key={i} className="text-xs border border-slate-100 rounded-md p-2 bg-slate-50">
                        <div className="font-semibold text-slate-800">{f.label}</div>
                        <div className="text-slate-700 mt-0.5">{f.note}</div>
                        {f.citations && f.citations.length > 0 && (
                          <div className="text-slate-500 mt-1 font-mono">{f.citations.join(" · ")}</div>
                        )}
                      </li>
                    ))}
                  </ul>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
      <Toast message={toast} onClose={() => setToast("")} />
      <Dialog config={dialog} onClose={() => setDialog(null)} />
    </div>
  );
}

/* ---------- Recovery Tracker (Kanban) ---------- */
function RecoveryView({ recoveries, claims }) {
  return (
    <div className="space-y-4 fade-in">
      <div>
        <h1 className="text-2xl font-semibold text-slate-800">Recovery Tracker</h1>
        <p className="text-sm text-slate-500">Pipeline of active subrogation and auto med-pay recoveries.</p>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 overflow-x-auto">
        {RECOVERY_STAGES.map(stage => {
          const stageRecs = recoveries.filter(r => r.stage === stage.id);
          const total = stageRecs.reduce((s, r) => s + (r.demand || 0), 0);
          return (
            <div key={stage.id} className="bg-slate-100 rounded-lg p-2 min-w-[180px]">
              <div className="flex items-center justify-between mb-2">
                <Pill className={stage.color}>{stage.label}</Pill>
                <span className="text-xs text-slate-500">{stageRecs.length}</span>
              </div>
              <div className="space-y-2">
                {stageRecs.map(r => {
                  const claim = claims.find(c => c.id === r.claimId);
                  return (
                    <div key={r.id} className="bg-white border border-slate-200 rounded-md p-2 text-xs">
                      <div className="font-medium text-slate-800">{r.id}</div>
                      <div className="text-slate-500 truncate">{r.target}</div>
                      <div className="text-slate-500 truncate">{claim?.member.firstName} {claim?.member.lastName}</div>
                      <div className="text-slate-700 mt-1 tabular-nums">{fmtMoney(r.demand)}</div>
                      {r.recovered > 0 && <div className="text-emerald-700 tabular-nums">↳ {fmtMoney(r.recovered)} rec.</div>}
                      <div className="text-slate-400 mt-1">{r.assignedTo}</div>
                    </div>
                  );
                })}
                {stageRecs.length === 0 && (
                  <div className="text-xs text-slate-400 text-center py-3 border border-dashed border-slate-300 rounded-md">empty</div>
                )}
              </div>
              {total > 0 && (
                <div className="text-xs text-slate-500 mt-2 text-right">Total: <span className="font-semibold tabular-nums text-slate-700">{fmtMoney(total)}</span></div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------- Settings ---------- */
/* =========================================================================
   ADMIN & MANAGEMENT DASHBOARD
   Tabbed dashboard for Supervisor + Manager roles. Replaces former SettingsView.
   8 tabs: Approvals, QC, Team, KPIs, Users, Customer, Audit, Roadmap.
   Role-conditional content throughout. Phase-2 features rendered as stubs in Roadmap.
   ========================================================================= */
function AdminOverview({ tenant, currentUser, claims, recoveries, openClaim }) {
  const [tab, setTab] = useState("approvals");
  const [toast, setToast] = useState("");
  const [dialog, setDialog] = useState(null);
  const showToast = (msg) => setToast(msg);
  const isManager = currentUser?.role === "MANAGER";
  const isSupervisor = currentUser?.role === "SUPERVISOR";

  const pendingApprovals = APPROVAL_QUEUE.length;
  const pendingQc = QC_SAMPLES.filter(q => q.status === "PENDING_REVIEW").length;

  const ADMIN_TABS = [
    { id: "approvals",   label: "Approvals",  count: pendingApprovals },
    { id: "qc",          label: "QC",         count: pendingQc },
    { id: "kpis",        label: "KPIs",       count: null },
    { id: "levels",      label: "Job Levels", count: JOB_LEVELS.length },
    { id: "users",       label: "Users",      count: USERS.length },
    { id: "roadmap",     label: "Roadmap",    count: null },
  ];

  return (
    <div className="space-y-4 fade-in">
      {/* Header */}
      <div>
        <h1 className="text-2xl font-semibold text-slate-800">Admin · Overview</h1>
        <p className="text-sm text-slate-500">
          {isManager ? "Manager view — operational queues, customer KPIs, authority configuration. People management lives under Team."
           : isSupervisor ? "Supervisor view — operational queues, QC, customer context. Per-analyst management lives under Team."
           : "Read-only preview."}
        </p>
      </div>

      {/* Tab bar */}
      <div className="border-b border-slate-200 -mx-2 sm:-mx-4 px-2 sm:px-4 overflow-x-auto">
        <div className="flex gap-1 min-w-max">
          {ADMIN_TABS.map(at => (
            <button key={at.id} onClick={() => setTab(at.id)}
              className={`text-sm px-3 py-2 border-b-2 transition-colors flex items-center gap-2 whitespace-nowrap ${tab === at.id ? "border-brand-600 text-brand-700 font-medium" : "border-transparent text-slate-600 hover:text-slate-800"}`}>
              {at.label}
              {at.count !== null && at.count > 0 && (
                <span className={`text-[10px] px-1.5 py-0.5 rounded-full ${tab === at.id ? "bg-brand-100 text-brand-700" : "bg-slate-200 text-slate-600"}`}>{at.count}</span>
              )}
            </button>
          ))}
        </div>
      </div>

      {/* Tab body */}
      {tab === "approvals" && <AdminApprovals isManager={isManager} showToast={showToast} setDialog={setDialog} openClaim={openClaim} />}
      {tab === "qc"        && <AdminQC isManager={isManager} showToast={showToast} setDialog={setDialog} openClaim={openClaim} />}
      {tab === "kpis"      && <AdminKPIs tenant={tenant} isManager={isManager} />}
      {tab === "levels"    && <AdminJobLevels isManager={isManager} showToast={showToast} setDialog={setDialog} />}
      {tab === "users"     && <AdminUsers isManager={isManager} isSupervisor={isSupervisor} currentUser={currentUser} showToast={showToast} setDialog={setDialog} />}
      {tab === "roadmap"   && <AdminRoadmap />}

      <Toast message={toast} onClose={() => setToast("")} />
      <Dialog config={dialog} onClose={() => setDialog(null)} />
    </div>
  );
}

/* =========================================================================
   ADMIN · TEAM (people management surface)
   Role-conditional content:
   - Supervisor: list of their team's analysts; click into per-person view.
   - Manager: list of their supervisors; click into per-supervisor view.
   ========================================================================= */
function AdminTeam({ currentUser, openPerson }) {
  const isManager = currentUser?.role === "MANAGER";
  const isSupervisor = currentUser?.role === "SUPERVISOR";

  // Supervisor's team scope: their own team's analysts
  const supervisorTeamId = isSupervisor ? USERS.find(u => u.id === currentUser?.id)?.teamId : null;

  // Manager's scope: all supervisors they oversee (in prototype, all supervisors)
  const managedSupervisors = isManager ? USERS.filter(u => u.role === "SUPERVISOR") : [];

  // For Supervisor: their analysts
  const teamAnalysts = isSupervisor ? USERS.filter(u =>
    u.teamId === supervisorTeamId && (u.role === "ANALYST" || u.role === "SENIOR_ANALYST")
  ) : [];

  const levelBadge = (levelId) => {
    const l = JOB_LEVELS.find(x => x.id === levelId);
    return l ? <Pill className={`${l.color} text-[10px]`}>{l.label}</Pill> : null;
  };

  if (isSupervisor) {
    const team = TEAMS.find(t => t.id === supervisorTeamId);
    const totalOpen = teamAnalysts.reduce((s, a) => s + (TEAM_WORKLOAD.find(w => w.userId === a.id)?.openClaims || 0) + (TEAM_WORKLOAD.find(w => w.userId === a.id)?.inNegotiation || 0), 0);
    const totalClosed30 = teamAnalysts.reduce((s, a) => s + (TEAM_WORKLOAD.find(w => w.userId === a.id)?.closedLast30 || 0), 0);

    return (
      <div className="space-y-4 fade-in">
        <div>
          <h1 className="text-2xl font-semibold text-slate-800">Admin · Team</h1>
          <p className="text-sm text-slate-500">
            {team ? `Your team — ${team.name}.` : "Your team."} {teamAnalysts.length} analyst{teamAnalysts.length !== 1 ? "s" : ""} · {totalOpen} open claims · {totalClosed30} closed in last 30 days. Click a card to drill into per-analyst depth.
          </p>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
          {teamAnalysts.map(a => {
            const workload = TEAM_WORKLOAD.find(w => w.userId === a.id) || { openClaims: 0, inNegotiation: 0, closedLast30: 0, avgCycleDays: 0 };
            const signal = LEVEL_HEALTH_SIGNALS.find(s => s.userId === a.id);
            const flagColor = signal?.flag === "OK" ? "bg-emerald-100 text-emerald-800" : signal?.flag === "REVIEW" ? "bg-amber-100 text-amber-800" : "bg-rose-100 text-rose-800";
            const pendingFromAnalyst = APPROVAL_QUEUE.filter(ap => ap.requester === a.name).length;
            const activeFileGrants = FILE_AUTHORITY_GRANTS.filter(g => g.analystId === a.id && g.status === "ACTIVE").length;
            return (
              <div key={a.id} className="border border-slate-200 rounded-lg bg-white p-4 hover:border-brand-300 hover:shadow-sm transition cursor-pointer" onClick={() => openPerson(a.id)}>
                <div className="flex items-start justify-between gap-2 mb-2">
                  <div className="flex items-center gap-2">
                    <div className="w-10 h-10 rounded-full bg-slate-200 text-slate-700 flex items-center justify-center text-sm font-semibold">{a.initials}</div>
                    <div>
                      <div className="text-sm font-medium text-slate-800">{a.name}</div>
                      <div className="flex items-center gap-1 mt-0.5">{levelBadge(a.level)}</div>
                    </div>
                  </div>
                  {signal && <Pill className={flagColor}>{signal.flag === "OK" ? "On track" : signal.flag === "REVIEW" ? "Review" : "Alert"}</Pill>}
                </div>
                <div className="grid grid-cols-2 gap-2 text-xs text-slate-600 mb-2">
                  <div>Open: <span className="font-medium text-slate-800">{workload.openClaims + workload.inNegotiation}</span></div>
                  <div>Closed 30d: <span className="font-medium text-slate-800">{workload.closedLast30}</span></div>
                  <div>Avg cycle: <span className="font-medium text-slate-800">{workload.avgCycleDays}d</span></div>
                  <div>In negotiation: <span className="font-medium text-slate-800">{workload.inNegotiation}</span></div>
                </div>
                {signal && (
                  <div className="grid grid-cols-3 gap-2 text-xs text-slate-600 border-t border-slate-100 pt-2">
                    <div>Override: <span className="font-medium text-slate-800">{(signal.overrideRate * 100).toFixed(1)}%</span></div>
                    <div>QC concern: <span className="font-medium text-slate-800">{(signal.qcConcernRate * 100).toFixed(0)}%</span></div>
                    <div>Utilization: <span className="font-medium text-slate-800">{(signal.utilization * 100).toFixed(0)}%</span></div>
                  </div>
                )}
                {(pendingFromAnalyst > 0 || activeFileGrants > 0) && (
                  <div className="flex gap-2 text-xs mt-2 border-t border-slate-100 pt-2">
                    {pendingFromAnalyst > 0 && <Pill className="bg-blue-100 text-blue-800">{pendingFromAnalyst} pending request{pendingFromAnalyst !== 1 ? "s" : ""}</Pill>}
                    {activeFileGrants > 0 && <Pill className="bg-cyan-100 text-cyan-800">{activeFileGrants} active file authority</Pill>}
                  </div>
                )}
                <div className="text-xs text-brand-700 hover:underline mt-3">View details →</div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  if (isManager) {
    return (
      <div className="space-y-4 fade-in">
        <div>
          <h1 className="text-2xl font-semibold text-slate-800">Admin · Team</h1>
          <p className="text-sm text-slate-500">
            Your supervisors and the teams they run. {managedSupervisors.length} supervisor{managedSupervisors.length !== 1 ? "s" : ""}. Click a card to drill into per-supervisor depth.
          </p>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
          {managedSupervisors.map(sup => {
            const team = TEAMS.find(t => t.supervisorId === sup.id);
            const teamMembers = USERS.filter(u => u.teamId === team?.id && (u.role === "ANALYST" || u.role === "SENIOR_ANALYST"));
            const perf = SUPERVISOR_PERFORMANCE.find(p => p.userId === sup.id);
            const teamOpen = teamMembers.reduce((s, m) => s + (TEAM_WORKLOAD.find(w => w.userId === m.id)?.openClaims || 0) + (TEAM_WORKLOAD.find(w => w.userId === m.id)?.inNegotiation || 0), 0);
            const teamClosed30 = teamMembers.reduce((s, m) => s + (TEAM_WORKLOAD.find(w => w.userId === m.id)?.closedLast30 || 0), 0);
            const levelCounts = JOB_LEVELS.map(l => ({ label: l.label, color: l.color, count: teamMembers.filter(m => m.level === l.id).length })).filter(c => c.count > 0);
            return (
              <div key={sup.id} className="border border-slate-200 rounded-lg bg-white p-4 hover:border-brand-300 hover:shadow-sm transition cursor-pointer" onClick={() => openPerson(sup.id)}>
                <div className="flex items-start justify-between gap-2 mb-2">
                  <div className="flex items-center gap-2">
                    <div className="w-10 h-10 rounded-full bg-violet-200 text-violet-900 flex items-center justify-center text-sm font-semibold">{sup.initials}</div>
                    <div>
                      <div className="text-sm font-medium text-slate-800">{sup.name}</div>
                      <div className="text-xs text-slate-500">{team?.name || "Unassigned"}</div>
                    </div>
                  </div>
                  <Pill className="bg-violet-100 text-violet-800">Supervisor</Pill>
                </div>
                <div className="grid grid-cols-2 gap-2 text-xs text-slate-600 mb-2">
                  <div>Team size: <span className="font-medium text-slate-800">{teamMembers.length}</span></div>
                  <div>Open: <span className="font-medium text-slate-800">{teamOpen}</span></div>
                  <div>Closed 30d: <span className="font-medium text-slate-800">{teamClosed30}</span></div>
                  <div>Decisions 30d: <span className="font-medium text-slate-800">{perf?.recentDecisions30d ?? "—"}</span></div>
                </div>
                {levelCounts.length > 0 && (
                  <div className="flex flex-wrap gap-1 mt-2 border-t border-slate-100 pt-2">
                    {levelCounts.map(lc => (
                      <Pill key={lc.label} className={`${lc.color} text-[10px]`}>{lc.count} {lc.label}</Pill>
                    ))}
                  </div>
                )}
                {perf && (
                  <div className="grid grid-cols-3 gap-2 text-xs text-slate-600 border-t border-slate-100 pt-2 mt-2">
                    <div>Avg approval: <span className="font-medium text-slate-800">{perf.avgApprovalHours.toFixed(1)}h</span></div>
                    <div>QC disagree: <span className="font-medium text-slate-800">{(perf.qcDisagreementRate * 100).toFixed(1)}%</span></div>
                    <div>Resolution: <span className="font-medium text-slate-800">{(perf.escalationResolutionRate * 100).toFixed(0)}%</span></div>
                  </div>
                )}
                <div className="text-xs text-brand-700 hover:underline mt-3">View details →</div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return null;
}

/* =========================================================================
   ADMIN · TEAM · PERSON (drill-down)
   Per-direct-report depth. Coaching notes role-private.
   ========================================================================= */
function AdminTeamPerson({ personId, currentUser, goBack, openClaim }) {
  const [toast, setToast] = useState("");
  const [dialog, setDialog] = useState(null);
  const showToast = (msg) => setToast(msg);
  const person = USERS.find(u => u.id === personId);
  if (!person) {
    return (
      <div className="fade-in">
        <button onClick={goBack} className="text-sm text-brand-700 hover:underline flex items-center gap-1 mb-4">
          <Icon d={ICONS.back} className="w-4 h-4" /> Back to Team
        </button>
        <div className="text-sm text-slate-500">Person not found.</div>
      </div>
    );
  }
  const isManager = currentUser?.role === "MANAGER";
  const isPersonAnalyst = person.role === "ANALYST" || person.role === "SENIOR_ANALYST";
  const isPersonSupervisor = person.role === "SUPERVISOR";

  const level = JOB_LEVELS.find(l => l.id === person.level);
  const team = TEAMS.find(t => t.id === person.teamId);
  const workload = TEAM_WORKLOAD.find(w => w.userId === person.id);
  const signal = LEVEL_HEALTH_SIGNALS.find(s => s.userId === person.id);
  const perf = SUPERVISOR_PERFORMANCE.find(p => p.userId === person.id);

  // Pending requests by this person
  const requestsFromPerson = APPROVAL_QUEUE.filter(ap => ap.requester === person.name);
  // QC samples for this analyst
  const qcSamples = QC_SAMPLES.filter(q => q.analyst === person.name);
  // Active file authority grants targeting this analyst
  const fileGrants = FILE_AUTHORITY_GRANTS.filter(g => g.analystId === person.id);

  // Coaching notes — role visibility:
  // - Notes about an analyst: visible to that analyst's supervisor + manager
  // - Notes about a supervisor: visible to manager only
  const coachingNotes = COACHING_NOTES.filter(n => {
    if (n.targetId !== person.id) return false;
    if (n.visibility === "MGR_ONLY") return isManager;
    if (n.visibility === "SUP_AND_MGR") return true; // either role can see
    return false;
  });

  const addCoachingNote = () => setDialog({
    title: `Add coaching note · ${person.name}`,
    description: isManager && isPersonSupervisor
      ? "Manager-only coaching note. Not part of audit log. Visible to you only."
      : "Coaching note visible to supervisor and manager. Not part of audit log.",
    fields: [
      { name: "note", label: "Note", type: "textarea", required: true, rows: 4,
        placeholder: "e.g., Discussed the Brennan settlement allocation; she made the right call on the common-fund pro-rata application." },
    ],
    submitLabel: "Save coaching note",
    onSubmit: () => showToast(`Coaching note saved for ${person.name}`),
  });

  // Supervisor's direct reports (when drilling into a supervisor as Manager)
  const supervisedAnalysts = isPersonSupervisor
    ? USERS.filter(u => u.teamId === team?.id && (u.role === "ANALYST" || u.role === "SENIOR_ANALYST"))
    : [];

  return (
    <div className="space-y-4 fade-in">
      <button onClick={goBack} className="text-xs text-brand-700 hover:underline flex items-center gap-1">
        <Icon d={ICONS.back} className="w-3.5 h-3.5" /> Back to Team
      </button>

      {/* Header */}
      <div className="flex flex-wrap items-start justify-between gap-3">
        <div className="flex items-center gap-3">
          <div className="w-14 h-14 rounded-full bg-slate-200 text-slate-700 flex items-center justify-center text-lg font-semibold">{person.initials}</div>
          <div>
            <h1 className="text-2xl font-semibold text-slate-800">{person.name}</h1>
            <div className="flex items-center gap-2 mt-1 text-sm text-slate-500">
              <Pill className={ROLE_LABELS[person.role]?.color || "bg-slate-100 text-slate-700"}>{ROLE_LABELS[person.role]?.label || person.role}</Pill>
              {level && <Pill className={level.color}>{level.label}</Pill>}
              {team && <span>· {team.name}</span>}
            </div>
          </div>
        </div>
        <Pill className="bg-emerald-100 text-emerald-800">{person.status}</Pill>
      </div>

      {/* Workload + signals (analyst path) */}
      {isPersonAnalyst && workload && (
        <Card title="Workload">
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 text-sm">
            <Kpi label="Open" value={workload.openClaims + workload.inNegotiation} accent="bg-blue-100 text-blue-800" />
            <Kpi label="In negotiation" value={workload.inNegotiation} accent="bg-violet-100 text-violet-800" />
            <Kpi label="Closed 30d" value={workload.closedLast30} accent="bg-emerald-100 text-emerald-800" />
            <Kpi label="Avg cycle" value={`${workload.avgCycleDays}d`} accent="bg-slate-100 text-slate-700" />
          </div>
        </Card>
      )}

      {isPersonAnalyst && signal && (
        <Card title="Level health signals">
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 text-sm">
            <Kpi label="Override rate" value={`${(signal.overrideRate * 100).toFixed(1)}%`} accent={signal.overrideRate > 0.07 ? "bg-amber-100 text-amber-800" : "bg-emerald-100 text-emerald-800"} />
            <Kpi label="QC concern" value={`${(signal.qcConcernRate * 100).toFixed(0)}%`} accent={signal.qcConcernRate > 0.2 ? "bg-amber-100 text-amber-800" : "bg-emerald-100 text-emerald-800"} />
            <Kpi label="Reopen rate" value={`${(signal.reopenRate * 100).toFixed(1)}%`} accent="bg-slate-100 text-slate-700" />
            <Kpi label="Utilization" value={`${(signal.utilization * 100).toFixed(0)}%`} accent={signal.utilization > 0.7 ? "bg-amber-100 text-amber-800" : signal.utilization < 0.3 ? "bg-slate-100 text-slate-700" : "bg-emerald-100 text-emerald-800"} />
          </div>
          {signal.note && <div className="text-xs text-slate-600 italic mt-2">"{signal.note}"</div>}
        </Card>
      )}

      {/* Authority limits + tier */}
      {isPersonAnalyst && person.authority && level && (
        <Card title="Effective authority">
          <div className="space-y-1 text-sm">
            <Row k="Settlement"     v={fmtMoney(person.authority.settlement)} />
            <Row k="Demand"         v={fmtMoney(person.authority.demand)} />
            <Row k="Lien reduction" v={`${Math.round(person.authority.lienReduction * 100)}%`} />
            <Row k="Closure"        v={fmtMoney(person.authority.closure)} />
            <div className="text-xs text-slate-500 italic mt-2">Defaults derived from {level.label} job level. Per-analyst overrides flow through the Approvals queue.</div>
          </div>
        </Card>
      )}

      {/* Supervisor path: their analysts */}
      {isPersonSupervisor && (
        <Card title={`Team — ${team?.name || ""}`}>
          <div className="space-y-2">
            {supervisedAnalysts.map(a => {
              const al = JOB_LEVELS.find(l => l.id === a.level);
              return (
                <div key={a.id} className="flex items-center justify-between gap-2 text-sm border border-slate-100 rounded-md p-2">
                  <div className="flex items-center gap-2">
                    <div className="w-7 h-7 rounded-full bg-slate-200 text-slate-700 flex items-center justify-center text-[10px] font-semibold">{a.initials}</div>
                    <span className="text-slate-800">{a.name}</span>
                    {al && <Pill className={`${al.color} text-[10px]`}>{al.label}</Pill>}
                  </div>
                  <span className="text-xs text-slate-500">Open: {(TEAM_WORKLOAD.find(w => w.userId === a.id)?.openClaims || 0) + (TEAM_WORKLOAD.find(w => w.userId === a.id)?.inNegotiation || 0)}</span>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {/* Supervisor performance (Manager looking at a supervisor) */}
      {isPersonSupervisor && perf && (
        <Card title="Supervisor performance">
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 text-sm">
            <Kpi label="Avg approval" value={`${perf.avgApprovalHours.toFixed(1)}h`} accent="bg-blue-100 text-blue-800" />
            <Kpi label="QC disagreement" value={`${(perf.qcDisagreementRate * 100).toFixed(1)}%`} accent={perf.qcDisagreementRate > 0.1 ? "bg-amber-100 text-amber-800" : "bg-emerald-100 text-emerald-800"} />
            <Kpi label="Resolution rate" value={`${(perf.escalationResolutionRate * 100).toFixed(0)}%`} accent="bg-emerald-100 text-emerald-800" />
            <Kpi label="Decisions 30d" value={perf.recentDecisions30d} accent="bg-slate-100 text-slate-700" />
          </div>
        </Card>
      )}

      {/* Pending requests from this person */}
      {requestsFromPerson.length > 0 && (
        <Card title={`Pending requests from ${person.name}`}>
          <div className="space-y-1">
            {requestsFromPerson.map(r => (
              <div key={r.id} className="text-xs text-slate-700 flex items-center gap-2 border-b border-slate-100 pb-1 last:border-0">
                <span className="font-mono text-slate-500">{r.id}</span>
                {r.claimId && <span className="font-mono text-slate-500">· {r.claimId}</span>}
                <span className="text-slate-800">· {r.summary}</span>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* QC samples (analyst path) */}
      {isPersonAnalyst && qcSamples.length > 0 && (
        <Card title="Recent QC samples">
          <div className="space-y-1">
            {qcSamples.map(q => (
              <div key={q.id} className="text-xs flex items-center justify-between gap-2 border-b border-slate-100 pb-1 last:border-0">
                <div>
                  <span className="font-mono text-slate-500">{q.claimId}</span>
                  <span className="text-slate-700"> · {q.closedAt} · {fmtMoney(q.settlement)}</span>
                </div>
                <Pill className={q.status === "REVIEWED_PASS" ? "bg-emerald-100 text-emerald-800" : q.status === "REVIEWED_CONCERN" ? "bg-rose-100 text-rose-800" : "bg-amber-100 text-amber-800"}>{q.status.replace("REVIEWED_", "")}</Pill>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* File authority grants (analyst path) */}
      {isPersonAnalyst && fileGrants.length > 0 && (
        <Card title="File authority grants">
          <div className="space-y-1">
            {fileGrants.map(g => (
              <div key={g.id} className="text-xs text-slate-700 flex items-center justify-between gap-2 border-b border-slate-100 pb-1 last:border-0">
                <div className="flex items-center gap-2">
                  <Pill className={g.status === "ACTIVE" ? "bg-cyan-100 text-cyan-800" : "bg-slate-100 text-slate-700"}>{g.status}</Pill>
                  <span className="font-mono text-slate-500">{g.claimId}</span>
                  <span className="text-slate-700">· {Object.entries(g.authorityBoost).map(([k, v]) => k === "lienReduction" ? `${k} ${Math.round(v*100)}%` : `${k} ${fmtMoney(v)}`).join(" · ")}</span>
                </div>
                <button onClick={() => openClaim(g.claimId)} className="text-brand-700 hover:underline">Open claim</button>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* Coaching notes */}
      <Card title="Coaching notes" action={{ label: "+ Add note", onClick: addCoachingNote }}>
        <div className="space-y-2">
          {coachingNotes.length === 0 && (
            <div className="text-xs text-slate-500 italic">No coaching notes yet. Notes are role-private (visible per the visibility rule) and not part of the formal audit log.</div>
          )}
          {coachingNotes.map(n => {
            const author = USERS.find(u => u.id === n.authorId);
            return (
              <div key={n.id} className="border border-slate-200 rounded-md p-2 bg-slate-50">
                <div className="flex items-center justify-between text-xs text-slate-500 mb-1">
                  <span>{author?.name} · {new Date(n.timestamp).toLocaleDateString()}</span>
                  <Pill className={n.visibility === "MGR_ONLY" ? "bg-amber-100 text-amber-800" : "bg-slate-200 text-slate-700"}>
                    {n.visibility === "MGR_ONLY" ? "Manager only" : "Supervisor + Manager"}
                  </Pill>
                </div>
                <div className="text-sm text-slate-800">{n.note}</div>
              </div>
            );
          })}
        </div>
      </Card>

      <Toast message={toast} onClose={() => setToast("")} />
      <Dialog config={dialog} onClose={() => setDialog(null)} />
    </div>
  );
}

/* ----- Approvals tab ----- */
function AdminApprovals({ isManager, showToast, setDialog, openClaim }) {
  const typeLabels = {
    LIEN_REDUCTION:        { label: "Lien reduction",     color: "bg-violet-100 text-violet-800" },
    DEMAND_APPROVAL:       { label: "Demand approval",    color: "bg-blue-100 text-blue-800" },
    OVERRIDE_LOCK:         { label: "Override lock",      color: "bg-amber-100 text-amber-800" },
    CLOSURE_BELOW_DEMAND:  { label: "Closure < demand",   color: "bg-slate-100 text-slate-700" },
    SETTLEMENT_ACCEPTANCE: { label: "Settlement",         color: "bg-emerald-100 text-emerald-800" },
    LEVEL_CHANGE_REQUEST:   { label: "Level change",       color: "bg-indigo-100 text-indigo-800" },
    AUTHORITY_OVERRIDE:     { label: "Authority override", color: "bg-indigo-100 text-indigo-800" },
    FILE_AUTHORITY_GRANT:   { label: "File-level grant",   color: "bg-cyan-100 text-cyan-800" },
    USER_ACTIVATION:        { label: "User activation",    color: "bg-emerald-100 text-emerald-800" },
    LATE_ARRIVAL_TO_CLOSED_CASE: { label: "Late arrival → closed", color: "bg-amber-100 text-amber-800" },
  };
  const onApprove = (item) => setDialog({
    title: `Approve: ${typeLabels[item.type]?.label || item.type}`,
    description: `${item.summary}\n\nRequester: ${item.requester}\nJustification: ${item.justification}`,
    fields: [
      { name: "note", label: "Supervisor note (logged to audit)", type: "textarea", rows: 2,
        placeholder: "Optional context for the audit log." },
    ],
    submitLabel: "Approve",
    onSubmit: () => showToast(`Approved · ${item.requester}'s request on ${item.claimId} logged to audit`),
  });
  const onReject = (item) => setDialog({
    title: `Reject: ${typeLabels[item.type]?.label || item.type}`,
    description: `${item.summary}\n\nRequester: ${item.requester}`,
    fields: [
      { name: "reason", label: "Rejection reason (required for audit)", type: "textarea", rows: 3, required: true,
        placeholder: "e.g., Insufficient justification; lien-reduction exceeds policy; analyst should renegotiate." },
    ],
    submitLabel: "Reject & log",
    danger: true,
    onSubmit: () => showToast(`Rejected · ${item.requester} notified; audit logged`),
  });

  return (
    <div className="space-y-3">
      <div className="text-xs text-slate-500">
        Pending items above an analyst's authority limit. Approve, reject, or open the underlying claim for full context.
        {!isManager && <span className="block mt-1">Supervisor approves up to manager-level thresholds; manager handles above-supervisor escalations.</span>}
      </div>
      {APPROVAL_QUEUE.map(item => {
        const t = typeLabels[item.type] || { label: item.type, color: "bg-slate-100 text-slate-700" };
        const urgent = item.priority === "URGENT";
        const isLevelChange = item.type === "LEVEL_CHANGE_REQUEST";
        const isAuthorityOverride = item.type === "AUTHORITY_OVERRIDE";
        const isFileAuthority = item.type === "FILE_AUTHORITY_GRANT";
        const isUserActivation = item.type === "USER_ACTIVATION";
        const isLateArrival = item.type === "LATE_ARRIVAL_TO_CLOSED_CASE";
        const targetUser = (isLevelChange || isAuthorityOverride || isFileAuthority) ? USERS.find(u => u.id === item.targetUserId) : null;
        return (
          <div key={item.id} className={`border rounded-lg p-3 ${urgent ? "border-rose-300 bg-rose-50/40" : "border-slate-200 bg-white"}`}>
            <div className="flex flex-wrap items-start justify-between gap-2 mb-1.5">
              <div className="flex flex-wrap items-center gap-2">
                <Pill className={t.color}>{t.label}</Pill>
                {urgent && <Pill className="bg-rose-100 text-rose-800">Urgent</Pill>}
                {item.claimId && <span className="text-xs text-slate-500 font-mono">{item.claimId}</span>}
                {(isLevelChange || isFileAuthority) && targetUser && <span className="text-xs text-slate-700 font-medium">→ {targetUser.name}</span>}
                {isUserActivation && item.newUser && <span className="text-xs text-slate-700 font-medium">→ {item.newUser.name} (new)</span>}
                <span className="text-xs text-slate-500">· {item.requester} · {new Date(item.requestedAt).toLocaleDateString()}</span>
              </div>
              <div className="flex gap-1">
                {item.claimId && <button onClick={() => openClaim(item.claimId)} className="text-xs px-2 py-1 border border-slate-300 bg-white rounded-md text-slate-700 hover:bg-slate-50">Open claim</button>}
                <button onClick={() => onReject(item)} className="text-xs px-2 py-1 border border-rose-300 bg-white text-rose-700 rounded-md hover:bg-rose-50">Reject</button>
                <button onClick={() => onApprove(item)} className="text-xs px-2 py-1 bg-brand-600 text-white rounded-md hover:bg-brand-700">Approve</button>
              </div>
            </div>
            <div className="text-sm text-slate-800">{item.summary}</div>
            {isLevelChange && (
              <div className="text-xs text-slate-500 mt-1">
                Level change: <span className="font-medium text-slate-700">{item.fromLevel} → {item.toLevel}</span>
              </div>
            )}
            {isAuthorityOverride && item.authorityChange && (
              <div className="text-xs text-slate-500 mt-1">
                Authority deltas:{" "}
                {Object.entries(item.authorityChange).map(([k, v], i) => (
                  <span key={k} className="font-medium text-slate-700">
                    {i > 0 ? " · " : ""}{k}: {k === "lienReduction" ? `${Math.round(v.from * 100)}% → ${Math.round(v.to * 100)}%` : `${fmtMoney(v.from)} → ${fmtMoney(v.to)}`}
                  </span>
                ))}
                {item.effectiveDuration && <span className="text-slate-500"> · effective {item.effectiveDuration}</span>}
              </div>
            )}
            {isFileAuthority && item.fileAuthority && (
              <div className="text-xs text-slate-500 mt-1">
                File authority on <span className="font-mono text-slate-700">{item.claimId}</span>:{" "}
                {Object.entries(item.fileAuthority).map(([k, v], i) => (
                  <span key={k} className="font-medium text-slate-700">
                    {i > 0 ? " · " : ""}{k}: {k === "lienReduction" ? `${Math.round(v * 100)}%` : fmtMoney(v)}
                  </span>
                ))}
                {item.expiry && <span className="text-slate-500"> · expires: {item.expiry === "FILE_CLOSE" ? "on file close" : item.expiry}</span>}
              </div>
            )}
            {isUserActivation && item.newUser && (
              <div className="text-xs text-slate-500 mt-1">
                Role: <span className="font-medium text-slate-700">{ROLE_LABELS[item.newUser.role]?.label || item.newUser.role}</span>
                {item.newUser.teamId && <> · Team: <span className="font-medium text-slate-700">{TEAMS.find(t => t.id === item.newUser.teamId)?.name || item.newUser.teamId}</span></>}
                {item.newUser.level && <> · Level: <span className="font-medium text-slate-700">{JOB_LEVELS.find(l => l.id === item.newUser.level)?.label || item.newUser.level}</span></>}
              </div>
            )}
            {isLateArrival && item.lateArrival && (
              <div className="mt-1.5 text-xs grid grid-cols-1 sm:grid-cols-2 gap-2">
                <div className="border border-amber-200 bg-amber-50/50 rounded-md p-2">
                  <div className="text-[10px] uppercase tracking-wide text-amber-700 font-semibold mb-0.5">Late-arriving claim</div>
                  <div className="font-mono text-slate-700">{item.lateArrival.claimId} · {item.lateArrival.serviceDate}</div>
                  <div className="text-slate-700">{item.lateArrival.provider} · {fmtMoney(item.lateArrival.paidAmount)}</div>
                  <div className="text-slate-500">Dx: {item.lateArrival.diagnosisCodes.join(", ")} · POS {item.lateArrival.placeOfService}</div>
                </div>
                <div className="border border-slate-200 bg-slate-50/60 rounded-md p-2">
                  <div className="text-[10px] uppercase tracking-wide text-slate-600 font-semibold mb-0.5">Closed case context</div>
                  <div className="font-mono text-slate-700">{item.claimId}</div>
                  <div className="text-slate-700">Closed {item.lateArrival.closedAt} · recovery {fmtMoney(item.lateArrival.closedCaseRecoveryAmount)}</div>
                  <div className="text-slate-500">Approve → reopen / supplemental · Reject → write off</div>
                </div>
              </div>
            )}
            {item.amount !== null && !isLevelChange && !isAuthorityOverride && !isFileAuthority && !isUserActivation && (
              <div className="text-xs text-slate-500 mt-1">
                Amount: <span className="font-medium text-slate-700">{item.unit === "%" ? `${item.amount}%` : fmtMoney(item.amount)}</span>
                {item.authorityLimit !== null && <> · Analyst limit: {item.unit === "%" ? `${item.authorityLimit}%` : fmtMoney(item.authorityLimit)}</>}
              </div>
            )}
            <div className="text-xs text-slate-600 mt-1 italic">"{item.justification}"</div>
          </div>
        );
      })}
    </div>
  );
}

/* ----- QC tab ----- */
function AdminQC({ isManager, showToast, setDialog, openClaim }) {
  const statusColor = {
    PENDING_REVIEW:    "bg-amber-100 text-amber-800",
    REVIEWED_PASS:     "bg-emerald-100 text-emerald-800",
    REVIEWED_CONCERN:  "bg-rose-100 text-rose-800",
  };
  const statusLabel = {
    PENDING_REVIEW:    "Pending review",

    ALERT:  "bg-rose-100 text-rose-800",
  };

  const proposeChange = (user, fromLevel, suggestedLevel) => setDialog({
    title: `Propose job-level change · ${user.name}`,
    description: `Currently ${fromLevel}. Supervisor proposes a change; Manager approves.\n\nThis request will land in the Approvals queue with type LEVEL_CHANGE_REQUEST.`,
    fields: [
      { name: "toLevel", label: "Proposed job level", type: "select", required: true,
        defaultValue: suggestedLevel,
        options: JOB_LEVELS.map(l => ({ value: l.id, label: l.label })) },

  return (
    <div className="space-y-3">
      <div className="text-xs text-slate-500">
        Proactive watchlist: per-analyst signals that prompt job-level consideration. Thresholds: override rate &gt;7%, QC concern rate &gt;20%, utilization &gt;70% (promotion signal) or &lt;30% (under-utilization). The signal is the prompt; the supervisor decides whether to propose a change.
      </div>
      <div className="bg-white border border-slate-200 rounded-lg overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 border-b border-slate-200">
            <tr className="text-xs uppercase text-slate-500">
              <th className="text-left px-3 py-2 font-medium">Analyst</th>
              <th className="text-left px-3 py-2 font-medium">Job Level</th>
              <th className="text-left px-3 py-2 font-medium">Override</th>
              <th className="text-left px-3 py-2 font-medium">QC concern</th>
              <th className="text-left px-3 py-2 font-medium">Reopen</th>
              <th className="text-left px-3 py-2 font-medium">Utilization</th>
              <th className="text-left px-3 py-2 font-medium">Flag</th>
              <th className="text-left px-3 py-2 font-medium"></th>
            </tr>
          </thead>
          <tbody>
            {LEVEL_HEALTH_SIGNALS.map(s => {
              const u = USERS.find(x => x.id === s.userId);
              const lvl = JOB_LEVELS.find(x => x.id === u?.level);
              const levelIdx = JOB_LEVELS.findIndex(x => x.id === u?.level);
              const suggestedLevel = s.utilization > 0.7 && levelIdx < JOB_LEVELS.length - 1
                ? JOB_LEVELS[levelIdx + 1].id
                : s.utilization < 0.3 && levelIdx > 0
                ? JOB_LEVELS[levelIdx - 1].id

                <tr key={s.userId} className="border-t border-slate-100">
                  <td className="px-3 py-2">
                    <div className="flex items-center gap-2">
                      <div className="w-7 h-7 rounded-full bg-slate-200 text-slate-700 flex items-center justify-center text-[10px] font-semibold">{u?.initials}</div>
                      <span className="text-slate-800">{u?.name}</span>
                    </div>
                  </td>
                  <td className="px-3 py-2">{lvl && <Pill className={lvl.color}>{lvl.label}</Pill>}</td>
                  <td className="px-3 py-2 text-xs text-slate-700">{(s.overrideRate * 100).toFixed(1)}%</td>
                  <td className="px-3 py-2 text-xs text-slate-700">{(s.qcConcernRate * 100).toFixed(0)}%</td>
                  <td className="px-3 py-2 text-xs text-slate-700">{(s.reopenRate * 100).toFixed(1)}%</td>
                  <td className="px-3 py-2 text-xs text-slate-700">
                    <div className="flex items-center gap-2">
                      <div className="w-20 h-2 bg-slate-100 rounded relative overflow-hidden">
                        <div className={`h-full ${s.utilization > 0.7 ? "bg-amber-500" : s.utilization < 0.3 ? "bg-slate-400" : "bg-emerald-500"}`} style={{ width: (s.utilization * 100) + "%" }} />
                      </div>
                      <span>{(s.utilization * 100).toFixed(0)}%</span>
                    </div>
                  </td>
                  <td className="px-3 py-2"><Pill className={flagColor[s.flag] || "bg-slate-100 text-slate-700"}>{flagLabel[s.flag] || s.flag}</Pill></td>
                  <td className="px-3 py-2 text-xs">
                    {s.flag !== "OK" && (
                      <button onClick={() => proposeChange(u, u?.level, suggestedLevel)} className="text-brand-700 hover:underline">Propose level change</button>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <Card title="Notes on flagged analysts">
        <div className="space-y-2">
          {LEVEL_HEALTH_SIGNALS.filter(s => s.flag !== "OK").map(s => {
            const u = USERS.find(x => x.id === s.userId);
            return (
              <div key={s.userId} className="text-xs text-slate-700">
                <span className="font-medium">{u?.name}:</span> <span className="italic">"{s.note}"</span>
              </div>
            );
          })}
          {LEVEL_HEALTH_SIGNALS.filter(s => s.flag !== "OK").length === 0 && (
            <div className="text-xs text-slate-500 italic">No analysts currently on the watchlist.</div>
          )}
        </div>
      </Card>
    </div>
  );
}

/* ----- Users tab ----- */
function AdminUsers({ isManager, isSupervisor, currentUser, showToast, setDialog }) {
  // Supervisor is scoped to their own team — find the team from the seeded USERS data
  // (currentUser carries id/name/role from the toggle; team comes from USERS).
  const supervisorTeamId = isSupervisor ? USERS.find(u => u.id === currentUser?.id)?.teamId : null;

  const onEditLimits = (user) => setDialog({
    title: `Edit authority limits · ${user.name}`,
    description: "Manager direct edit: changes take effect immediately and are audit-logged. Supervisor changes flow through the approval queue instead.",
    fields: [
      { name: "settlement",    label: "Settlement acceptance authority ($)", type: "text", defaultValue: String(user.authority?.settlement || 0) },
      { name: "demand",        label: "Demand authority ($)",                type: "text", defaultValue: String(user.authority?.demand || 0) },
      { name: "lienReduction", label: "Lien reduction authority (%)",        type: "text", defaultValue: String(Math.round((user.authority?.lienReduction || 0) * 100)) },
      { name: "closure",       label: "Recovery closure authority ($)",      type: "text", defaultValue: String(user.authority?.closure || 0) },
    ],
    submitLabel: "Save limits",
    onSubmit: () => showToast(`Authority limits updated for ${user.name} · audit logged`),
  });

  const onDeactivate = (user) => setDialog({
    title: `Deactivate · ${user.name}`,
    description: `This deactivates ${user.name}. They will no longer be able to log in or receive new claim assignments, approval routings, or QC samples.\n\nAudit history is preserved: their name remains on every historical claim file, audit log entry, and correspondence record under their identity. Reversible — they can be reactivated if they return.`,
    fields: [
      { name: "reason", label: "Reason for deactivation", type: "select", required: true, defaultValue: "DEPARTED",
        options: [
          { value: "DEPARTED",    label: "Left the organization" },
          { value: "LEAVE",       label: "Extended leave of absence" },
          { value: "ROLE_CHANGE", label: "Moved to a different role / org" },
          { value: "OTHER",       label: "Other (see notes)" },
        ] },
      { name: "notes", label: "Notes (optional, audit-logged)", type: "textarea", rows: 2,
        placeholder: "e.g., Last day 2026-05-30; claims being reassigned to K. Nguyen." },
    ],
    submitLabel: "Deactivate user",
    danger: true,
    onSubmit: ({ reason }) => showToast(`${user.name} deactivated · reason ${reason} · audit logged · history preserved`),
  });

  const onProposeChange = (user) => setDialog({
    title: `Propose authority change · ${user.name}`,
    description: `Supervisor-initiated proposal. Manager approves before the change takes effect. Both the proposal and the manager's decision audit-log with justification.\n\nCurrent job level: ${user.level} (${JOB_LEVELS.find(l => l.id === user.level)?.label || user.level}). For permanent level changes, use Level Health instead — this surface is for case-specific overrides (temporary bumps, hardship adjustments, complex-book handling).`,
    fields: [
      { name: "settlement",    label: "Settlement acceptance authority ($)", type: "text", defaultValue: String(user.authority?.settlement || 0) },
      { name: "demand",        label: "Demand authority ($)",                type: "text", defaultValue: String(user.authority?.demand || 0) },
      { name: "lienReduction", label: "Lien reduction authority (%)",        type: "text", defaultValue: String(Math.round((user.authority?.lienReduction || 0) * 100)) },
      { name: "closure",       label: "Recovery closure authority ($)",      type: "text", defaultValue: String(user.authority?.closure || 0) },
      { name: "duration",      label: "Effective duration",                  type: "select", defaultValue: "60",
        options: [
          { value: "30",  label: "30 days" },
          { value: "60",  label: "60 days" },
          { value: "90",  label: "90 days" },
          { value: "perm", label: "Until further notice" },
        ] },
      { name: "justification", label: "Justification (required for audit)", type: "textarea", required: true, rows: 3,
        placeholder: "e.g., Handling a complex book of ERISA self-funded matters this quarter; reduces supervisor approval churn on routine matters." },
    ],
    submitLabel: "Submit for Manager approval",
    onSubmit: () => showToast(`Authority override request submitted · ${user.name} · routed to Manager · audit logged`),
  });

  // Determine which action (if any) is available for a given user row
  const actionFor = (user) => {
    if (!user.authority) return null; // approver roles have no analyst authority
    if (isManager) return { type: "edit", onClick: () => onEditLimits(user) };
    if (isSupervisor && user.teamId === supervisorTeamId) return { type: "propose", onClick: () => onProposeChange(user) };

    <div className="space-y-3">
      <div className="flex justify-between items-center flex-wrap gap-2">
        <div className="text-xs text-slate-500">

          {isManager && " As Manager you can edit limits directly (changes audit-logged), provision users (immediate activation), and deactivate users (preserves audit history)."}
          {isSupervisor && " As Supervisor you can propose authority changes for your team's analysts and add new users to your team (Pending Activation until Manager approves)."}
          {!isManager && !isSupervisor && " Read-only."}
        </div>
        {(isManager || isSupervisor) && (
          <button onClick={() => {
            const supervisorTeam = isSupervisor ? supervisorTeamId : null;
            setDialog({
              title: "Add user",
              description: isSupervisor
                ? `Supervisor-initiated provisioning. New user lands as Pending Activation; Manager approves before they can log in or be assigned work. Team auto-set to your team (${TEAMS.find(t => t.id === supervisorTeam)?.name || ""}).`
                : "Manager-initiated provisioning. For analysts, the job level auto-applies the default authority bands. New user activates immediately and SSO invite is sent. All fields audit-logged.",
              fields: [
