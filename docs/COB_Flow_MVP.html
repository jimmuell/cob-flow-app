/* =========================================================================
   CLAIM DETAIL VIEW — single-claim workspace with 6 tabs.
   ========================================================================= */
function ClaimDetailView({ claim, claimExtras, onExtraChange, tenant, currentUser, goBack }) {
  const [tab, setTab] = useState("overview");
  const [toast, setToast] = useState("");
  const [dialog, setDialog] = useState(null);
  const showToast = (msg) => setToast(msg);
  const userLabel = currentUser?.name || "J. Mueller";

  if (!claim) {
    return (
      <div className="fade-in">
        <button onClick={goBack} className="text-sm text-brand-700 hover:underline flex items-center gap-1 mb-4">
          <Icon d={ICONS.back} className="w-4 h-4" /> Back to Claims
        </button>
        <div className="text-sm text-slate-500">Claim not found — it may belong to a different customer.</div>
      </div>
    );
  }

  // Merge baseline extras (defined in CLAIM_BASELINE) with in-memory user additions
  const baseline = CLAIM_BASELINE[claim.id] || { contacts: {}, activity: [], tasks: [], correspondence: [], records: [] };
  const contacts = baseline.contacts || {};
  const activity = [...(baseline.activity || []), ...(claimExtras.activity || [])]
                     .sort((a, b) => (b.timestamp || "").localeCompare(a.timestamp || ""));
  const tasks = [...(baseline.tasks || []), ...(claimExtras.tasks || [])];
  // Correspondence may have baseline entries updated via in-memory extras (same id).
  // Extras version wins.
  const extrasCorrIds = new Set((claimExtras.correspondence || []).map(c => c.id));
  const correspondence = [
    ...(baseline.correspondence || []).filter(c => !extrasCorrIds.has(c.id)),
    ...(claimExtras.correspondence || []),
  ];
  const records = [...(baseline.records || []), ...(claimExtras.records || [])];

  // Computed primacy + WI overlay (for the Overview tab)
  const primacy = determineCobPrimacy({
    accident: claim.accidentIndicator === "Y" ? { isAuto: true, state: claim.accidentState } : { isAuto: false },
    member: claim.member,
    coverages: claim.coverages,
  });
  const wiOverlay = wisconsinOverlay({
    accident: { state: claim.accidentState },
    liability: claim.liability,
    recovery: claim.recovery,
    coverages: claim.coverages,
  });

  // Action helpers — append activity, add task, add document, complete task
  const addActivity = (entry) => onExtraChange(claim.id, ex => ({
    ...ex, activity: [...(ex.activity || []), { id: `act_${Date.now()}`, by: userLabel, timestamp: new Date().toISOString(), ...entry }],
  }));
  const addTask = (task) => onExtraChange(claim.id, ex => ({
    ...ex, tasks: [...(ex.tasks || []), { id: `tsk_${Date.now()}`, status: "PENDING", assignedTo: "J. Mueller", ...task }],
  }));
  const completeTask = (taskId) => onExtraChange(claim.id, ex => ({
    ...ex,
    tasks: (ex.tasks || []).map(t => t.id === taskId ? { ...t, status: "DONE", completedAt: new Date().toISOString() } : t),
    activity: [...(ex.activity || []), { id: `act_${Date.now()}`, type: "TASK", direction: "INTERNAL", by: userLabel, timestamp: new Date().toISOString(), summary: `Task completed: ${(ex.tasks || []).find(t => t.id === taskId)?.title || taskId}` }],
  }));
  const addRecord = (doc) => onExtraChange(claim.id, ex => ({
    ...ex,
    records: [...(ex.records || []), { id: `doc_${Date.now()}`, uploadedAt: new Date().toISOString(), uploadedBy: "J. Mueller", ...doc }],
    activity: [...(ex.activity || []), { id: `act_${Date.now()}`, type: "DOC_UPLOAD", direction: "INTERNAL", by: userLabel, timestamp: new Date().toISOString(), summary: `Record uploaded: ${doc.name}` }],
  }));
  const addCorrespondence = (corr) => onExtraChange(claim.id, ex => ({
    ...ex,
    correspondence: [...(ex.correspondence || []), { id: `corr_${Date.now()}`, createdAt: new Date().toISOString(), createdBy: userLabel, status: "DRAFT", ...corr }],
    activity: corr.status === "SENT" ? [...(ex.activity || []), {
      id: `act_${Date.now()}`, type: "LETTER", direction: "OUTBOUND", by: userLabel, timestamp: new Date().toISOString(),
      summary: `${LETTER_TYPES[corr.letterType]?.label || corr.letterType} sent to ${corr.recipientName} via ${corr.sendMethod || "—"}`,
    }] : (ex.activity || []),
  }));
  // Override-edit / request-edit audit entry (logs justification + role)
  const logCorrAudit = (corrId, kind, justification) => onExtraChange(claim.id, ex => {
    const corr = correspondence.find(c => c.id === corrId);
    const label = LETTER_TYPES[corr?.letterType]?.label || corr?.letterType || "Letter";
    return { ...ex, activity: [...(ex.activity || []), {
      id: `act_${Date.now()}`,
      type: kind === "OVERRIDE" ? "OVERRIDE" : "APPROVAL_REQ",
      direction: "INTERNAL",
      by: userLabel,
      timestamp: new Date().toISOString(),
      summary: kind === "OVERRIDE"
        ? `Supervisor override edit on ${label} (${corr?.recipientName || ""}). Justification: ${justification}`
        : `Approval requested to edit locked ${label} (${corr?.recipientName || ""}). Justification: ${justification}`,
    }] };
  });
  // PDF archive on SENT — drops a record into the Records tab automatically.
  const archivePdf = (corr, sendMethod, sendDate) => onExtraChange(claim.id, ex => ({
    ...ex,
    records: [...(ex.records || []), {
      id: `doc_corr_${corr.id}_${Date.now()}`,
      name: `${LETTER_TYPES[corr.letterType]?.label || corr.letterType} — ${corr.recipientName.split(" ").slice(0,3).join(" ")} — ${sendDate}.pdf`,
      type: corr.letterType,
      source: "OUTBOUND",
      mimeType: "application/pdf",
      size: 110000 + Math.floor(Math.random() * 50000),
      uploadedAt: new Date().toISOString(),
      uploadedBy: `${userLabel} (auto-archived)`,
      tags: ["correspondence", corr.letterType.toLowerCase()],
      correspondenceId: corr.id,
    }],
  }));
  const updateCorrespondenceStatus = (corrId, newStatus, extra = {}) => onExtraChange(claim.id, ex => {
    const inExtras = (ex.correspondence || []).find(c => c.id === corrId);
    const fromBaseline = (baseline.correspondence || []).find(c => c.id === corrId);
    const source = inExtras || fromBaseline;
    if (!source) return ex;
    const updated = { ...source, status: newStatus, ...extra };
    if (newStatus === "SENT") {
      updated.sentBy = userLabel;
    }
    const others = (ex.correspondence || []).filter(c => c.id !== corrId);
    const newCorr = [...others, updated];
    const activityEntry = {
      id: `act_${Date.now()}`, by: userLabel, timestamp: new Date().toISOString(),
      type: newStatus === "SENT" ? "LETTER" : "STATUS",
      direction: newStatus === "SENT" ? "OUTBOUND" : "INTERNAL",
      summary: newStatus === "SENT"
        ? `${LETTER_TYPES[source.letterType]?.label || source.letterType} sent to ${source.recipientName} via ${SEND_METHODS.find(m => m.value === (extra.sendMethod || source.sendMethod))?.label || "—"}`
        : `${LETTER_TYPES[source.letterType]?.label || source.letterType} → ${CORRESPONDENCE_STATUS[newStatus]?.label || newStatus}`,
    };
    // Auto-archive PDF to Records on SENT transition
    let newRecords = ex.records || [];
    if (newStatus === "SENT") {
      const archived = {
        id: `doc_corr_${corrId}_${Date.now()}`,
        name: `${LETTER_TYPES[source.letterType]?.label || source.letterType} — ${(source.recipientName || "").split(",")[0]} — ${extra.sendDate || new Date().toISOString().slice(0,10)}.pdf`,
        type: source.letterType,
        source: "OUTBOUND",
        mimeType: "application/pdf",
        size: 110000 + Math.floor(Math.random() * 50000),
        uploadedAt: new Date().toISOString(),
        uploadedBy: `${userLabel} (auto-archived)`,
        tags: ["correspondence", (source.letterType || "").toLowerCase()],
        correspondenceId: corrId,
      };
      newRecords = [...newRecords, archived];
    }
    return { ...ex, correspondence: newCorr, records: newRecords, activity: [...(ex.activity || []), activityEntry] };
  });
  // Supersede creates a new DRAFT linked to the original via supersedesId
  const supersedeCorrespondence = (corrId) => onExtraChange(claim.id, ex => {
    const allCorr = [
      ...(baseline.correspondence || []).filter(c => !(ex.correspondence || []).find(x => x.id === c.id)),
      ...(ex.correspondence || [])
    ];
    const original = allCorr.find(c => c.id === corrId);
    if (!original) return ex;
    // Mark the original as SUPERSEDED
    const others = (ex.correspondence || []).filter(c => c.id !== corrId);
    const supersededOriginal = { ...original, status: "SUPERSEDED" };
    // Create a new draft based on it
    const newDraft = {
      id: `corr_${Date.now()}`,
      letterType: original.letterType,
      templateId: original.templateId,
      recipientName: original.recipientName,
      recipientType: original.recipientType,
      subject: original.subject,
      body: original.body,
      sendMethod: null,
      sendDate: null,
      status: "DRAFT",
      supersedesId: original.id,
      createdAt: new Date().toISOString(),
      createdBy: userLabel,
    };
    const activityEntry = {
      id: `act_${Date.now()}`, by: userLabel, timestamp: new Date().toISOString(),
      type: "STATUS", direction: "INTERNAL",
      summary: `${LETTER_TYPES[original.letterType]?.label || original.letterType} superseded; new draft created.`,
    };
    return { ...ex, correspondence: [...others, supersededOriginal, newDraft], activity: [...(ex.activity || []), activityEntry] };
  });

  const TABS = [
    { id: "overview",      label: "Overview" },
    { id: "contacts",      label: "Contacts" },
    { id: "activity",      label: "Activity" },
    { id: "comms",         label: "Communications" },
    { id: "correspondence",label: "Correspondence" },
    { id: "records",       label: "Records" },
    { id: "tasks",         label: "Tasks" },
  ];

  return (
    <div className="space-y-4 fade-in">
      {/* Header */}
      <div className="flex flex-wrap items-start justify-between gap-3">
        <div className="space-y-1 min-w-0">
          <button onClick={goBack} className="text-xs text-brand-700 hover:underline flex items-center gap-1">
            <Icon d={ICONS.back} className="w-3.5 h-3.5" /> Back to Claims
          </button>
          <h1 className="text-2xl font-semibold text-slate-800 truncate">
            {claim.id} · {claim.member.firstName} {claim.member.lastName}
          </h1>
          <div className="text-sm text-slate-500">
            {claim.accidentIndicator === "Y"
              ? <>Wisconsin auto accident · {claim.accidentDate} · Paid {fmtMoney(claim.paidAmount)}</>
              : <>{claim.diagnosisCodes.join(", ")} · {claim.serviceDate} · Paid {fmtMoney(claim.paidAmount)}</>}
          </div>
        </div>
        <div className="flex flex-wrap gap-2 text-xs">
          {claim.caseState && CASE_STATES[claim.caseState] && (
            <Pill className={CASE_STATES[claim.caseState].color} title={CASE_STATES[claim.caseState].hint}>
              Case · {CASE_STATES[claim.caseState].label}
            </Pill>
          )}
          <Pill className="bg-slate-100 text-slate-700">{tenant.name}</Pill>
          {primacy?.rule && <Pill className="bg-brand-50 text-brand-700">{primacy.rule}</Pill>}
          {wiOverlay && <Pill className="bg-red-100 text-red-800">WI overlay · {wiOverlay.compNeg?.barred ? "Recovery barred" : "Made-whole eval req."}</Pill>}
        </div>
      </div>

      {/* File-level authority row — visible to Supervisor + Manager. */}
      {(currentUser?.role === "SUPERVISOR" || currentUser?.role === "MANAGER") && (() => {
        const activeGrant = FILE_AUTHORITY_GRANTS.find(g => g.claimId === claim.id && g.status === "ACTIVE");
        const grantedAnalyst = activeGrant ? USERS.find(u => u.id === activeGrant.analystId) : null;
        const grantedBy = activeGrant ? USERS.find(u => u.id === activeGrant.grantedBy) : null;
        return (
          <div className={`border rounded-lg p-3 flex flex-wrap items-center justify-between gap-2 ${activeGrant ? "border-cyan-300 bg-cyan-50/40" : "border-slate-200 bg-white"}`}>
            <div className="flex items-center gap-3 text-xs">
              <Pill className={activeGrant ? "bg-cyan-100 text-cyan-800" : "bg-slate-100 text-slate-600"}>File authority</Pill>
              {activeGrant ? (
                <span className="text-slate-700">
                  Active for <span className="font-medium">{grantedAnalyst?.name}</span>:{" "}
                  {Object.entries(activeGrant.authorityBoost).map(([k, v], i) => (
                    <span key={k} className="font-mono text-slate-800">
                      {i > 0 ? " · " : ""}{k} {k === "lienReduction" ? `${Math.round(v * 100)}%` : fmtMoney(v)}
                    </span>
                  ))}
                  <span className="text-slate-500"> · granted by {grantedBy?.name} · expires on file close</span>
                </span>
              ) : (
                <span className="text-slate-500">No active elevation. Standard authority applies to the assigned analyst.</span>
              )}
            </div>
            <div className="flex gap-2">
              {activeGrant && (
                <button onClick={() => setDialog({
                  title: "Revoke file authority",
                  description: `Revoke the active file-level elevation on ${claim.id}? This logs to audit and reverts the analyst to standard limits on this file.`,
                  submitLabel: "Revoke",
                  danger: true,
                  onSubmit: () => showToast(`File authority revoked on ${claim.id} · audit logged`),
                })} className="text-xs px-2.5 py-1 border border-rose-300 bg-white text-rose-700 rounded-md hover:bg-rose-50">Revoke</button>
              )}
              <button onClick={() => {
                const analysts = USERS.filter(u => u.role === "ANALYST" || u.role === "SENIOR_ANALYST");
                setDialog({
                  title: "Grant file-level authority",
                  description: `Elevate one analyst's authority for this file only (${claim.id}). Auto-expires on file close. Audit-logged.\n\nWithin supervisor ceiling (settlement ≤ ${fmtMoney(SUPERVISOR_CEILING.settlement)}, demand ≤ ${fmtMoney(SUPERVISOR_CEILING.demand)}, lien reduction ≤ ${Math.round(SUPERVISOR_CEILING.lienReduction * 100)}%): granted unilaterally. Above ceiling: routes to Manager for approval.`,
                  fields: [
                    { name: "analyst", label: "Analyst", type: "select", required: true,
                      defaultValue: activeGrant ? activeGrant.analystId : (analysts[0]?.id || ""),
                      options: analysts.map(a => ({ value: a.id, label: `${a.name} (${JOB_LEVELS.find(l => l.id === a.level)?.label || a.level})` })) },
                    { name: "settlement",    label: `Settlement ceiling for this file ($) — supervisor max ${fmtMoney(SUPERVISOR_CEILING.settlement)}`, type: "text", defaultValue: "50000" },
                    { name: "demand",        label: `Demand ceiling for this file ($) — supervisor max ${fmtMoney(SUPERVISOR_CEILING.demand)}`, type: "text", defaultValue: "75000" },
                    { name: "lienReduction", label: `Lien reduction ceiling for this file (%) — supervisor max ${Math.round(SUPERVISOR_CEILING.lienReduction * 100)}%`, type: "text", defaultValue: "35" },
                    { name: "justification", label: "Justification (required for audit)", type: "textarea", required: true, rows: 3,
                      placeholder: "e.g., Analyst owns the file and has the relationship; settlement on track to close at $40k. Boost avoids re-approval friction on routine actions." },
                  ],
                  submitLabel: "Grant authority",
                  onSubmit: ({ settlement, demand, lienReduction }) => {
                    const s = parseInt(settlement, 10) || 0;
                    const d = parseInt(demand, 10) || 0;
                    const lr = (parseInt(lienReduction, 10) || 0) / 100;
                    const aboveCeiling = s > SUPERVISOR_CEILING.settlement || d > SUPERVISOR_CEILING.demand || lr > SUPERVISOR_CEILING.lienReduction;
                    if (currentUser?.role === "MANAGER" || !aboveCeiling) {
                      showToast(`File authority granted on ${claim.id} · audit logged · expires on file close`);
                    } else {
                      showToast(`Above supervisor ceiling · routed to Manager for approval`);
                    }
                  },
                });
              }} className="text-xs px-2.5 py-1 bg-cyan-600 text-white rounded-md hover:bg-cyan-700">
                {activeGrant ? "Modify grant" : "Grant file authority"}
              </button>
            </div>
          </div>
        );
      })()}

      {/* Tab nav */}
      <div className="border-b border-slate-200 overflow-x-auto scrollbar-thin">
        <div className="flex gap-1 min-w-max">
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`text-sm px-3 py-2 border-b-2 transition-colors ${tab === t.id ? "border-brand-600 text-brand-700 font-medium" : "border-transparent text-slate-600 hover:text-slate-800"}`}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* Tab body */}
      {tab === "overview"       && <CdOverview claim={claim} primacy={primacy} wiOverlay={wiOverlay} addActivity={addActivity} addTask={addTask} setTab={setTab} showToast={showToast} />}
      {tab === "contacts"       && <CdContacts contacts={contacts} />}
      {tab === "activity"       && <CdActivity activity={activity} addActivity={addActivity} showToast={showToast} />}
      {tab === "comms"          && <CdCommunications claim={claim} contacts={contacts} records={records} addActivity={addActivity} addRecord={addRecord} showToast={showToast} tenant={tenant} currentUser={currentUser} />}
      {tab === "correspondence" && <CdCorrespondence correspondence={correspondence} contacts={contacts} claim={claim} tenant={tenant} currentUser={currentUser} addCorrespondence={addCorrespondence} updateCorrespondenceStatus={updateCorrespondenceStatus} supersedeCorrespondence={supersedeCorrespondence} logCorrAudit={logCorrAudit} showToast={showToast} />}
      {tab === "records"        && <CdRecords records={records} addRecord={addRecord} showToast={showToast} />}
      {tab === "tasks"          && <CdTasks tasks={tasks} addTask={addTask} completeTask={completeTask} showToast={showToast} />}

      <Toast message={toast} onClose={() => setToast("")} />
      <Dialog config={dialog} onClose={() => setDialog(null)} />
    </div>
  );
}

/* ---------- Overview tab ---------- */
function CdOverview({ claim, primacy, wiOverlay, addActivity, addTask, setTab, showToast }) {
  const [dialog, setDialog] = useState(null);
  const inSevenDays = new Date(Date.now() + 7 * 86400000).toISOString().slice(0, 10);

  const openCallDialog = () => setDialog({
    title: "Log a call",
    description: "Record an inbound or outbound call against this claim.",
    fields: [
      { name: "direction", label: "Direction", type: "select",
        defaultValue: "OUTBOUND",
        options: [{ value: "OUTBOUND", label: "Outbound — I called them" }, { value: "INBOUND", label: "Inbound — they called me" }] },
      { name: "summary", label: "Call summary", type: "textarea", required: true,
        placeholder: "Spoke with adjuster about demand…", rows: 4 },
      { name: "duration", label: "Duration (optional)", type: "text", placeholder: "e.g. 8 min" },
    ],
    submitLabel: "Log call",
    onSubmit: ({ direction, summary, duration }) => {
      addActivity({ type: "CALL", direction, summary, duration: duration || undefined });
      showToast("Call logged to activity");
      setTab("activity");
    },
  });

  const openTextDialog = () => setDialog({
    title: "Send text message",
    description: "Composes an outbound text message. Verify recipient consent before sending.",
    fields: [
      { name: "body", label: "Message body", type: "textarea", required: true,
        placeholder: "Short text (160 char limit per segment; longer messages split into multiple parts)…", rows: 3 },
    ],
    submitLabel: "Send text",
    onSubmit: ({ body }) => {
      addActivity({ type: "TEXT", direction: "OUTBOUND", summary: `Outbound text: ${body.slice(0, 80)}${body.length > 80 ? "…" : ""}` });
      showToast("Text logged (prototype — no actual send)");
      setTab("activity");
    },
  });

  const openNoteDialog = () => setDialog({
    title: "Add internal note",
    fields: [
      { name: "note", label: "Note", type: "textarea", required: true,
        placeholder: "Internal note visible to claim team only.", rows: 4 },
    ],
    submitLabel: "Add note",
    onSubmit: ({ note }) => {
      addActivity({ type: "NOTE", direction: "INTERNAL", summary: note });
      showToast("Note added");
      setTab("activity");
    },
  });

  const openTaskDialog = () => setDialog({
    title: "Add follow-up task",
    fields: [
      { name: "title", label: "Task", type: "text", required: true,
        placeholder: "Follow up with American Family if no response by…" },
      { name: "due", label: "Due date", type: "date", required: true, defaultValue: inSevenDays },
    ],
    submitLabel: "Add task",
    onSubmit: ({ title, due }) => {
      addTask({ title, due });
      showToast("Task added");
      setTab("tasks");
    },
  });

  // Manual case-grouping (conversion handoff §11.1, pass 1).
  // Shows unattached claims for the same member that the analyst can fold into this case.
  // Phase 2 will replace this with automated heuristic grouping; the manual affordance
  // remains for analyst override.
  const openAttachClaimDialog = () => {
    const candidates = RELATED_CLAIM_CANDIDATES[claim.id] || [];
    setDialog({
      title: "Attach related claim",
      description: candidates.length
        ? `Other claims arrived from the customer feed for ${claim.member.firstName} ${claim.member.lastName} that may belong to this case. Pick a claim to attach. Audit-logged.`
        : `No unattached related claims found for ${claim.member.firstName} ${claim.member.lastName}. New claims that arrive will auto-attach if they match this member and diagnosis cluster within the lookback window.`,
      body: candidates.length ? (
        <div className="space-y-2 max-h-80 overflow-y-auto">
          {candidates.map(c => (
            <button key={c.id}
              onClick={() => {
                addActivity({
                  type: "NOTE",
                  direction: "INTERNAL",
                  summary: `Attached related claim ${c.id} (${c.provider} · ${c.serviceDate} · ${fmtMoney(c.paidAmount)}) to this case.`,
                });
                showToast(`Claim ${c.id} attached to case · audit logged`);
                setDialog(null);
                setTab("activity");
              }}
              className="w-full text-left border border-slate-200 rounded-md p-2.5 hover:border-brand-300 hover:bg-brand-50/30 transition-colors">
              <div className="flex items-center justify-between gap-2 mb-1">
                <span className="font-mono text-xs text-slate-700">{c.id}</span>
                <span className="text-xs font-medium text-slate-800">{fmtMoney(c.paidAmount)}</span>
              </div>
              <div className="text-xs text-slate-600">
                {c.serviceDate} · {c.provider}
              </div>
              <div className="text-[11px] text-slate-500 mt-0.5">
                Dx: {c.diagnosisCodes.join(", ")} · POS {c.placeOfService}
              </div>
            </button>
          ))}
        </div>
      ) : null,
      fields: [],
      submitLabel: candidates.length ? "Close" : "Done",
      onSubmit: () => {},
    });
  };

  return (
    <div className="space-y-4 fade-in">
      {/* Quick actions */}
      <div className="bg-white border border-slate-200 rounded-lg p-3 flex flex-wrap gap-2">
        <QuickBtn icon={ICONS.phone}  label="Log call"        onClick={openCallDialog} />
        <QuickBtn icon={ICONS.sms}    label="Send text"       onClick={openTextDialog} />
        <QuickBtn icon={ICONS.mail}   label="Send email"      onClick={() => setTab("comms")} />
        <QuickBtn icon={ICONS.letter} label="Generate letter" onClick={() => setTab("comms")} />
        <QuickBtn icon={ICONS.fax}    label="Send fax"        onClick={() => setTab("comms")} />
        <QuickBtn icon={ICONS.note}   label="Add note"        onClick={openNoteDialog} />
        <QuickBtn icon={ICONS.task}   label="Add task"        onClick={openTaskDialog} />
        <QuickBtn icon={ICONS.paperclip} label="Attach claim" onClick={openAttachClaimDialog} />
      </div>

      {/* Workflow exit — Send to Work Comp.
          See Spec §14, Send-to-Work-Comp routing bullet. Surface-only in v1; downstream destination, post-redirect state, and WC system data exchange are deferred. */}
      <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 flex flex-wrap items-center justify-between gap-3">
        <div className="text-xs text-amber-900 flex-1 min-w-0">
          <span className="font-semibold uppercase text-amber-800">Workflow exit</span>
          <span className="text-amber-700"> · Use only if investigation reveals the insured was driving a work vehicle or in a work capacity. Front-end triage should filter most of these at intake.</span>
        </div>
        <button onClick={() => setDialog({
          title: "Send to Work Comp",
          description: "Redirect this claim out of COB scope to Workers' Compensation. The claim will be locked from further COB action and retained per the closed-file archival policy. Audit-logged with justification.",
          body: (
            <div className="bg-slate-50 border border-slate-200 rounded-md p-3 space-y-1.5 text-xs">
              <div><span className="text-slate-500 font-semibold uppercase">Claim:</span> <span className="text-slate-800 font-mono">{claim.id}</span></div>
              <div><span className="text-slate-500 font-semibold uppercase">Member:</span> <span className="text-slate-800">{claim.member.firstName} {claim.member.lastName}</span></div>
              <div><span className="text-slate-500 font-semibold uppercase">Date of loss:</span> <span className="text-slate-800">{claim.accidentDate || "—"}</span></div>
              <div><span className="text-slate-500 font-semibold uppercase">Paid to date:</span> <span className="text-slate-800">{fmtMoney(claim.paidAmount)}</span></div>
            </div>
          ),
          fields: [
            { name: "scenario", label: "Discovery", type: "select", required: true,
              defaultValue: "WORK_VEHICLE",
              options: [
                { value: "WORK_VEHICLE",  label: "Work vehicle at time of loss" },
                { value: "WORK_CAPACITY", label: "Acting in work capacity at time of loss" },
                { value: "BOTH",          label: "Both work vehicle and work capacity" },
              ] },
            { name: "wcDestination", label: "Known WC carrier / destination (optional)", type: "text",
              placeholder: "e.g., Sentry, Wisconsin Mutual, employer self-insured…" },
            { name: "justification", label: "Justification (required for audit)", type: "textarea", required: true, rows: 3,
              placeholder: "e.g., Claimant confirmed via call 2026-05-18 that vehicle is company-titled and trip was business-related; HR confirmed report filed with Sentry on 2026-05-15." },
          ],
          submitLabel: "Redirect to Work Comp",
          danger: true,
          onSubmit: ({ scenario, wcDestination, justification }) => {
            const scenarioLabel = ({
              WORK_VEHICLE:  "work vehicle",
              WORK_CAPACITY: "work capacity",
              BOTH:          "work vehicle + work capacity",
            })[scenario] || scenario;
            addActivity({
              type: "WC_REDIRECT",
              direction: "INTERNAL",
              summary: `Claim redirected to Work Comp · Discovery: ${scenarioLabel}${wcDestination ? ` · WC dest: ${wcDestination}` : ""} · Justification: ${justification}`,
            });
            showToast("Claim redirected to Work Comp · audit logged");
            setTab("activity");
          },
        })}
          className="text-sm px-3 py-1.5 bg-white border border-amber-400 text-amber-800 rounded-md hover:bg-amber-100 flex items-center gap-1.5 flex-shrink-0">
          <Icon d={ICONS.ext} className="w-4 h-4" /> Send to Work Comp
        </button>
      </div>

      <Dialog config={dialog} onClose={() => setDialog(null)} />

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <Card title="Member & accident">
          <div className="space-y-2 text-sm">
            <Row k="Member" v={`${claim.member.firstName} ${claim.member.lastName}`} />
            <Row k="DOB / Age" v={`${claim.member.dob} (${claim.member.age})`} />
            <Row k="Service date" v={claim.serviceDate} />
            <Row k="Diagnoses" v={claim.diagnosisCodes.join(", ")} />
            <Row k="Place of service" v={claim.placeOfService} />
            {claim.accidentIndicator === "Y" && (
              <>
                <Row k="Accident state" v={claim.accidentState || "—"} />
                <Row k="Date of loss" v={claim.accidentDate || "—"} />
              </>
            )}
            <Row k="Billed / Paid" v={`${fmtMoney(claim.billedAmount)} / ${fmtMoney(claim.paidAmount)}`} />
          </div>
        </Card>

        <Card title="Coverages on file">
          <div className="space-y-2">
            {claim.coverages.map(c => (
              <div key={c.id} className="text-xs border border-slate-100 rounded-md p-2 bg-slate-50">
                <div className="font-medium text-slate-800">{c.payerName}</div>
                <div className="text-slate-500">{c.planType} · {c.basis} · {c.funding}</div>
                {c.hasCoordinationClause && <div className="text-slate-500">Has COB clause</div>}
                {c.hasExcessClause && <div className="text-amber-700">⚠ Excess clause</div>}
                {c.hasEscapeClause && <div className="text-amber-700">⚠ Escape clause</div>}
              </div>
            ))}
          </div>
        </Card>

        <Card title="Determination & WI overlay">
          <div className="space-y-2 text-sm">
            <Row k="Rule" v={primacy.rule} />
            <Row k="Confidence" v={primacy.confidence} />
            {primacy.reviewRequired && <Pill className="bg-rose-100 text-rose-800">Manual review</Pill>}
            {wiOverlay && (
              <div className="pt-2 mt-2 border-t border-slate-100">
                <div className="text-xs uppercase text-slate-500 font-semibold mb-1">Wisconsin overlay</div>
                {wiOverlay.compNeg && (
                  <Row k="Comp neg" v={wiOverlay.compNeg.barred ? "BARRED (claimant ≥51%)" : `${wiOverlay.compNeg.claimantFaultPct}% / ${wiOverlay.compNeg.defendantFaultPct}%`} />
                )}
                {wiOverlay.compNeg && !wiOverlay.compNeg.barred && (
                  <Row k="Recoverable" v={fmtMoney(wiOverlay.compNeg.recoverable)} />
                )}
                {wiOverlay.commonFund && (
                  <Row k="Net plan recovery" v={fmtMoney(wiOverlay.commonFund.netPlanRecovery)} />
                )}
                <Row k="Made-whole" v={wiOverlay.selfFundedErisaPresent ? "May be preempted (ERISA SF)" : "Applies"} />
              </div>
            )}
          </div>
        </Card>
      </div>
    </div>
  );
}
const QuickBtn = ({ icon, label, onClick }) => (
  <button onClick={onClick}
    className="flex items-center gap-1.5 text-xs px-2.5 py-1.5 border border-slate-300 rounded-md text-slate-700 hover:bg-slate-50 hover:border-slate-400">
    <Icon d={icon} className="w-3.5 h-3.5" /> {label}
  </button>
);

/* ---------- Contacts tab ---------- */
function CdContacts({ contacts }) {
  if (!contacts || Object.keys(contacts).length === 0) {
    return <div className="text-sm text-slate-500 fade-in">No contacts captured for this claim yet. Populate from intake or via the carrier's eligibility response.</div>;
  }
  const sections = [
    { title: "Member / Insured",       items: contacts.member ? [contacts.member] : [] },
    { title: "Health plans (payers)",  items: contacts.plans || [] },
    { title: "Auto carriers",          items: contacts.autoCarriers || [] },
    { title: "Providers",              items: contacts.providers || [] },
    { title: "Attorney",               items: contacts.attorney ? [contacts.attorney] : [] },
  ].filter(s => s.items.length > 0);

  return (
    <div className="space-y-4 fade-in">
      {sections.map(sec => (
        <div key={sec.title}>
          <div className="text-xs uppercase text-slate-500 font-semibold mb-2">{sec.title}</div>
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
            {sec.items.map((c, i) => <ContactCard key={i} c={c} />)}
          </div>
        </div>
      ))}
    </div>
  );
}
function ContactCard({ c }) {
  return (
    <div className="bg-white border border-slate-200 rounded-lg p-3 space-y-2 text-sm">
      <div>
        <div className="font-semibold text-slate-800">{c.name}</div>
        <div className="text-xs text-slate-500">{c.role}{c.contact ? ` · ${c.contact}` : ""}</div>
        {c.claimNumber && <div className="text-xs text-slate-500">Claim #: <span className="font-mono">{c.claimNumber}</span></div>}
      </div>
      <div className="space-y-1 text-xs">
        {c.phone && <ContactLine icon={ICONS.phone} label="Phone" value={c.phone} action="tel" />}
        {c.email && <ContactLine icon={ICONS.mail} label="Email" value={c.email} action="mailto" />}
        {c.fax   && <ContactLine icon={ICONS.fax}  label="Fax"   value={c.fax} />}
        {c.address && <ContactLine icon={ICONS.building} label="Address" value={c.address} />}
      </div>
      {c.consent && (
        <div className="pt-2 border-t border-slate-100">
          <div className="text-xs text-slate-500 mb-1">Communication consent</div>
          <div className="flex flex-wrap gap-1.5 text-xs">
            <ConsentPill ok={c.consent.call}  label="Call" />
            <ConsentPill ok={c.consent.text}  label="Text" />
            <ConsentPill ok={c.consent.email} label="Email" />
            <ConsentPill ok={c.consent.fax}   label="Fax" />
          </div>
        </div>
      )}
      {c.prefs && (
        <div className="text-xs text-slate-500">
          Prefers <span className="text-slate-700 font-medium">{c.prefs.channel}</span> · {c.prefs.time} · {c.prefs.lang}
        </div>
      )}

  );
}
const ContactLine = ({ icon, label, value, action }) => (
  <div className="flex items-start gap-2">
    <Icon d={icon} className="w-3.5 h-3.5 text-slate-500 mt-0.5 flex-shrink-0" />
    <div className="text-slate-500 w-12 flex-shrink-0">{label}</div>
    {action === "tel" ? <a href={`tel:${value}`} className="text-brand-700 hover:underline truncate">{value}</a> :
     action === "mailto" ? <a href={`mailto:${value}`} className="text-brand-700 hover:underline truncate">{value}</a> :
     <div className="text-slate-700 truncate">{value}</div>}
  </div>
);
const ConsentPill = ({ ok, label }) => (
  <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs ${ok ? "bg-emerald-100 text-emerald-800" : "bg-slate-100 text-slate-400 line-through"}`}>{label}</span>
);

/* ---------- Activity tab ---------- */
function CdActivity({ activity, addActivity, showToast }) {
  const [dialog, setDialog] = useState(null);
  const openNoteDialog = () => setDialog({
    title: "Add internal note",
    fields: [{ name: "note", label: "Note", type: "textarea", required: true, rows: 4,
               placeholder: "Internal note visible to claim team only." }],
    submitLabel: "Add note",
    onSubmit: ({ note }) => { addActivity({ type: "NOTE", direction: "INTERNAL", summary: note }); showToast("Note added"); },
  });
  return (
    <div className="space-y-3 fade-in">
      <div className="flex justify-between items-center">
        <div className="text-xs text-slate-500">{activity.length} activity entr{activity.length === 1 ? "y" : "ies"} · newest first</div>
        <button onClick={openNoteDialog}
          className="text-xs px-2.5 py-1.5 border border-slate-300 rounded-md text-slate-700 hover:bg-slate-50 flex items-center gap-1">
          <Icon d={ICONS.note} className="w-3.5 h-3.5" /> Add note
        </button>
      </div>
      {activity.length === 0
        ? <div className="text-sm text-slate-500">No activity yet.</div>
        : <ol className="space-y-2">{activity.map(a => <ActivityItem key={a.id} a={a} />)}</ol>}
      <Dialog config={dialog} onClose={() => setDialog(null)} />
    </div>

}
function ActivityItem({ a }) {
  const cfg = {
    INTAKE:     { color: "bg-slate-100 text-slate-700", icon: ICONS.inbox },
    NOTE:       { color: "bg-amber-100 text-amber-800", icon: ICONS.note },
    CALL:       { color: "bg-blue-100 text-blue-800",   icon: ICONS.phone },
    TEXT:       { color: "bg-violet-100 text-violet-800", icon: ICONS.sms },
    EMAIL:      { color: "bg-emerald-100 text-emerald-800", icon: ICONS.mail },
    FAX:        { color: "bg-amber-100 text-amber-800", icon: ICONS.fax },
    LETTER:     { color: "bg-blue-100 text-blue-800",   icon: ICONS.letter },
    DOC_UPLOAD: { color: "bg-slate-100 text-slate-700", icon: ICONS.upload },
    STATUS:     { color: "bg-zinc-100 text-zinc-700",   icon: ICONS.check },
    TASK:       { color: "bg-emerald-100 text-emerald-800", icon: ICONS.task },
    WC_REDIRECT:{ color: "bg-orange-100 text-orange-800", icon: ICONS.ext },
  };
  const c = cfg[a.type] || { color: "bg-slate-100 text-slate-700", icon: ICONS.note };
  const dir = a.direction === "OUTBOUND" ? "↗ Out" : a.direction === "INBOUND" ? "↙ In" : "Internal";
  const when = a.timestamp ? new Date(a.timestamp).toLocaleString() : "";
  return (
    <li className="bg-white border border-slate-200 rounded-md p-3 flex gap-3">
      <div className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center ${c.color}`}>
        <Icon d={c.icon} className="w-4 h-4" />
      </div>
      <div className="flex-1 min-w-0">
        <div className="flex flex-wrap items-baseline gap-2 text-xs text-slate-500">
          <span className="font-semibold text-slate-800">{a.type}</span>
          <span>· {dir}</span>
          <span>· {a.by}</span>
          {a.duration && <span>· {a.duration}</span>}
          <span className="ml-auto">{when}</span>
        </div>
        <div className="text-sm text-slate-800 mt-1">{a.summary}</div>
        {a.attachments && a.attachments.length > 0 && (
          <div className="mt-1 flex flex-wrap gap-1 text-xs text-slate-500">
            {a.attachments.map((f, i) => (
              <span key={i} className="inline-flex items-center gap-1 bg-slate-50 border border-slate-200 rounded px-1.5 py-0.5">
                <Icon d={ICONS.paperclip} className="w-3 h-3" /> {f}
              </span>
            ))}
          </div>
        )}
      </div>
    </li>
  );
}

/* ---------- Communications tab ---------- */
/* Freeform ad-hoc messages only. Formal letters live in Correspondence. */
function CdCommunications({ claim, contacts, records, addActivity, addRecord, showToast, tenant, currentUser }) {
  const [channel, setChannel] = useState("EMAIL");
  const [dialog, setDialog] = useState(null);
  const [previewing, setPreviewing] = useState(false);
  const channelTemplates = TEMPLATES.filter(t => t.channel === channel && t.category === "COMMUNICATION");
  const [templateId, setTemplateId] = useState(channelTemplates[0]?.id || "");
  const [recipientType, setRecipientType] = useState("AUTO_CARRIER");
  const [body, setBody] = useState(channelTemplates[0]?.body || "");
  const [subject, setSubject] = useState(channelTemplates[0]?.subject || "");
  const [attached, setAttached] = useState([]);

  useEffect(() => {
    const tpls = TEMPLATES.filter(t => t.channel === channel && t.category === "COMMUNICATION");
    setTemplateId(tpls[0]?.id || "");
    setBody(tpls[0]?.body || "");
    setSubject(tpls[0]?.subject || "");
  }, [channel]);
  useEffect(() => {
    const tpl = TEMPLATES.find(t => t.id === templateId);
    if (tpl) { setBody(tpl.body); setSubject(tpl.subject); }
  }, [templateId]);

  const recipientOptions = [
    { id: "AUTO_CARRIER", label: "Auto carrier", items: contacts.autoCarriers || [] },
    { id: "PLAN",         label: "Health plan",  items: contacts.plans || [] },
    { id: "ATTORNEY",     label: "Attorney",     items: contacts.attorney ? [contacts.attorney] : [] },
    { id: "MEMBER",       label: "Member",       items: contacts.member ? [contacts.member] : [] },
    { id: "PROVIDER",     label: "Provider",     items: contacts.providers || [] },
  ];
  const currentRecipient = recipientOptions.find(o => o.id === recipientType)?.items[0];

  const doSend = () => {
    addActivity({
      type: channel, direction: "OUTBOUND",
      summary: channel === "TEXT"
        ? `Outbound text to ${currentRecipient.name}: ${body.slice(0, 80)}${body.length > 80 ? "…" : ""}`
        : `Outbound ${channel.toLowerCase()} to ${currentRecipient.name}: ${subject || body.slice(0,60)}`,
      attachments: attached.length > 0 ? attached.map(a => records.find(d => d.id === a)?.name).filter(Boolean) : undefined,
    });
    showToast(`${channel} to ${currentRecipient.name} logged to activity`);
    setAttached([]);
  };

  const send = () => {
    if (!currentRecipient) {
      setDialog({
        title: "No recipient on file",
        description: "There is no contact captured for this party. Add the contact in the Contacts tab before sending.",
        cancelLabel: "Got it",
      });
      return;
    }
    const consentKey = channel === "TEXT" ? "text" : channel === "EMAIL" ? "email" : channel === "FAX" ? "fax" : "call";
    const requiresConsent = channel === "TEXT" || channel === "EMAIL";
    if (requiresConsent && currentRecipient.consent && currentRecipient.consent[consentKey] === false) {
      setDialog({
        title: "Consent not on file",
        description: `${currentRecipient.name} has not consented to ${channel.toLowerCase()} communication. Sending without documented consent may violate TCPA or HIPAA requirements.`,
        submitLabel: "Send anyway",
        cancelLabel: "Cancel",
        danger: true,
        onSubmit: () => doSend(),
      });
      return;
    }
    doSend();
  };

  return (
    <div className="space-y-4 fade-in">
      <div className="bg-white border border-slate-200 rounded-lg p-4 space-y-3">
        <div className="text-xs text-slate-500 -mt-1">Ad-hoc messages — quick emails, texts, faxes, calls. Formal workflow letters live in <span className="font-medium text-slate-700">Correspondence</span>.</div>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
          {["EMAIL", "FAX", "TEXT"].map(ch => (
            <button key={ch} onClick={() => setChannel(ch)}
              className={`text-xs px-2.5 py-1.5 rounded-md border ${channel === ch ? "border-brand-600 bg-brand-50 text-brand-700 font-medium" : "border-slate-300 text-slate-700 hover:bg-slate-50"}`}>
              {ch}
            </button>
          ))}
        </div>

        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
          <label className="text-xs text-slate-600 block">
            Recipient
            <select value={recipientType} onChange={e => setRecipientType(e.target.value)}
              className="mt-1 w-full text-sm border border-slate-300 rounded-md px-2 py-1.5 bg-white">
              {recipientOptions.filter(o => o.items.length > 0).map(o => (
                <option key={o.id} value={o.id}>{o.label}{o.items[0] ? ` — ${o.items[0].name}` : ""}</option>
              ))}
            </select>
          </label>
          <label className="text-xs text-slate-600 block">
            Template
            <select value={templateId} onChange={e => setTemplateId(e.target.value)}
              className="mt-1 w-full text-sm border border-slate-300 rounded-md px-2 py-1.5 bg-white">
              <option value="">— blank —</option>
              {channelTemplates.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
          </label>
        </div>

        {channel !== "TEXT" && (
          <label className="text-xs text-slate-600 block">
            Subject
            <input value={subject} onChange={e => setSubject(e.target.value)}
              className="mt-1 w-full text-sm border border-slate-300 rounded-md px-2 py-1.5 bg-white" />
          </label>
        )}

        <label className="text-xs text-slate-600 block">
          Body
          <textarea value={body} onChange={e => setBody(e.target.value)} rows={8}
            className="mt-1 w-full text-sm border border-slate-300 rounded-md px-2 py-1.5 bg-white font-mono" />
        </label>

        {(channel === "EMAIL" || channel === "FAX") && (
          <div>
            <div className="text-xs text-slate-600 mb-1">Attach records (from this claim)</div>
            <div className="flex flex-wrap gap-1.5">
              {records.length === 0 && <span className="text-xs text-slate-400">No records on file yet.</span>}
              {records.map(d => (
                <button key={d.id} onClick={() => setAttached(a => a.includes(d.id) ? a.filter(x => x !== d.id) : [...a, d.id])}
                  className={`text-xs px-2 py-1 rounded-md border flex items-center gap-1 ${attached.includes(d.id) ? "bg-brand-50 border-brand-400 text-brand-700" : "bg-white border-slate-300 text-slate-700 hover:bg-slate-50"}`}>
                  <Icon d={ICONS.paperclip} className="w-3 h-3" />
                  {d.name.length > 28 ? d.name.slice(0,28) + "…" : d.name}
                </button>
              ))}
            </div>
          </div>
        )}

        <div className="flex justify-end gap-2 pt-2 border-t border-slate-100">
          <button
            onClick={() => showToast("Draft saved · resume from Activity tab")}
            className="text-sm px-3 py-1.5 bg-white border border-slate-300 text-slate-700 rounded-md hover:bg-slate-50">
            Save draft
          </button>
          <button onClick={() => setPreviewing(true)} className="text-sm px-3 py-1.5 bg-white border border-slate-300 text-slate-700 rounded-md hover:bg-slate-50">
            Preview
          </button>
          <button onClick={send} className="text-sm px-3 py-1.5 bg-brand-600 text-white rounded-md hover:bg-brand-700">
            Send {channel.toLowerCase()}
          </button>
        </div>
      </div>
      <div className="text-xs text-slate-500 italic">Prototype: messages are logged to the Activity tab but no actual sending occurs. Production integrations: Twilio (text/voice with BAA), SendGrid or Postmark (email with BAA), eFax or Documo (fax).</div>
      <Dialog config={dialog} onClose={() => setDialog(null)} />
      {previewing && (
        <CommunicationsPreview
          channel={channel}
          subject={subject}
          body={body}
          recipient={currentRecipient}
          attached={attached}
          records={records}
          tenant={tenant}
          currentUser={currentUser}
          claim={claim}
          onClose={() => setPreviewing(false)}
          onSend={() => { setPreviewing(false); send(); }}
        />
      )}
    </div>
  );
}

/* ---------- Communications preview modal ----------
   Renders a composed message as the recipient will see it.
   EMAIL: stylized email card with From/To/Subject/body/signature.
   FAX:   facsimile cover sheet + body + confidentiality footer.
   TEXT:  phone-style chat bubble + character/segment count + carrier note.
   Merge fields are resolved using a context built from claim + tenant + currentUser. */
function CommunicationsPreview({ channel, subject, body, recipient, attached, records, tenant, currentUser, claim, onClose, onSend }) {
  const memberData = claim?.member || {};
  const recoveryData = claim?.recovery || {};
  const today = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
  const ctx = {
    today: { date: today },
    customer: { name: tenant?.name || "—" },
    member: {
      name: `${memberData.firstName || ""} ${memberData.lastName || ""}`.trim() || "—",
      firstName: memberData.firstName || "",
      lastName: memberData.lastName || "",
      dob: memberData.dob || "—",
    },
    accident: { date: claim?.accidentDate || "—", state: claim?.accidentState || "—" },
    recovery: {
      id: claim?.id?.toUpperCase() || "—",
      opened: claim?.openedDate || "—",
      totalMedicalPaid: fmtMoney(recoveryData.totalMedicalPaid ?? claim?.paidAmount ?? 0),
      demand: fmtMoney(recoveryData.totalMedicalPaid ?? claim?.paidAmount ?? 0),
    },
    primacy: { rule: claim?._primacyRule || "controlling COB rule" },
    attorney: { name: claim?.liability?.attorneyOfRecord || "—" },
    analyst: { name: currentUser?.name || "—", phone: "(414) 555-0100", email: "analyst@cobflow.example", fax: "(414) 555-0101" },
  };
  const resolvedSubject = resolveMerges(subject, ctx);
  const resolvedBody = resolveMerges(body, ctx);
  const attachedRecords = (attached || []).map(id => records.find(d => d.id === id)).filter(Boolean);

  const renderEmail = () => (
    <div className="bg-white border border-slate-200 rounded-md shadow-sm max-w-2xl mx-auto">
      <div className="border-b border-slate-200 px-4 py-3 bg-slate-50 rounded-t-md text-xs space-y-0.5">
        <div className="text-slate-500">From: <span className="text-slate-800">{ctx.analyst.name} &lt;{ctx.analyst.email}&gt;</span></div>
        <div className="text-slate-500">To: <span className="text-slate-800">{recipient?.name || "(no recipient)"}{recipient?.email ? ` <${recipient.email}>` : ""}</span></div>
        <div className="text-slate-500">Subject: <span className="text-slate-800 font-medium">{resolvedSubject || "(no subject)"}</span></div>
        <div className="text-slate-500">Date: {today}</div>
      </div>
      <div className="px-4 py-4 whitespace-pre-wrap text-sm text-slate-800">{resolvedBody || <span className="text-slate-400 italic">(empty body)</span>}</div>
      {attachedRecords.length > 0 && (
        <div className="px-4 py-2 border-t border-slate-100 bg-slate-50 rounded-b-md">
          <div className="text-xs text-slate-500 mb-1">Attached records ({attachedRecords.length}):</div>
          <div className="flex flex-wrap gap-1.5">
            {attachedRecords.map(r => (
              <span key={r.id} className="text-xs bg-white border border-slate-300 px-2 py-0.5 rounded inline-flex items-center gap-1">
                <Icon d={ICONS.paperclip} className="w-3 h-3" /> {r.name}
              </span>
            ))}
          </div>
        </div>
      )}
    </div>
  );

  const renderFax = () => (
    <div className="bg-white border border-slate-300 rounded-md shadow-sm max-w-2xl mx-auto font-serif p-6">
      <div className="border-b-2 border-slate-800 pb-2 mb-4 text-center">
        <div className="text-2xl font-bold text-slate-900 tracking-wide">FACSIMILE TRANSMISSION</div>
        <div className="text-[10px] text-slate-600 mt-0.5">{tenant?.name || ""} · Subrogation Recovery Department</div>
      </div>
      <table className="w-full text-sm mb-4">
        <tbody>
          <tr><td className="font-semibold pr-2 py-0.5 w-28 align-top">DATE:</td><td>{today}</td></tr>
          <tr><td className="font-semibold pr-2 py-0.5 align-top">TO:</td><td>{recipient?.name || "(no recipient)"}{recipient?.contact ? ` — Attn: ${recipient.contact}` : ""}</td></tr>
          <tr><td className="font-semibold pr-2 py-0.5 align-top">FAX #:</td><td>{recipient?.fax || <span className="text-amber-700">(no fax on file)</span>}</td></tr>
          <tr><td className="font-semibold pr-2 py-0.5 align-top">FROM:</td><td>{ctx.analyst.name}, {ctx.customer.name}</td></tr>
          <tr><td className="font-semibold pr-2 py-0.5 align-top">FAX #:</td><td>{ctx.analyst.fax}</td></tr>
          <tr><td className="font-semibold pr-2 py-0.5 align-top">PAGES:</td><td>{1 + attachedRecords.length} (including this cover sheet)</td></tr>
          <tr><td className="font-semibold pr-2 py-0.5 align-top">RE:</td><td>{resolvedSubject || "(no subject)"}</td></tr>
        </tbody>
      </table>
      <div className="border-t border-slate-300 pt-3 whitespace-pre-wrap text-sm">{resolvedBody || <span className="text-slate-400 italic">(empty body)</span>}</div>
      {attachedRecords.length > 0 && (
        <div className="mt-3 pt-2 border-t border-slate-200 text-xs text-slate-700">
          <span className="font-semibold">Attached:</span> {attachedRecords.map(r => r.name).join(", ")}
        </div>
      )}
      <div className="mt-6 pt-2 border-t border-slate-200 text-[10px] text-slate-500 leading-snug">
        CONFIDENTIALITY NOTICE: This facsimile may contain confidential information protected by HIPAA and other laws. If you are not the intended recipient, please notify the sender immediately and destroy all copies.
      </div>
    </div>
  );

  const renderText = () => {
    const charCount = resolvedBody.length;
    const segments = Math.max(1, Math.ceil(charCount / 160));
    const hasAttach = attachedRecords.length > 0;
    const willMms = charCount > 160 || hasAttach;
    return (
      <div className="max-w-sm mx-auto">
        <div className="bg-slate-900 rounded-3xl p-4 pb-6 shadow-xl">
          <div className="text-center text-xs text-slate-300 mb-2 truncate">
            {recipient?.name || "(no recipient)"}{recipient?.phone ? ` · ${recipient.phone}` : ""}
          </div>
          <div className="bg-slate-100 rounded-2xl px-3 py-4 min-h-[180px] flex flex-col justify-end">
            <div className="self-end max-w-[85%]">
              <div className="bg-blue-500 text-white rounded-2xl rounded-br-md px-3 py-2 text-sm whitespace-pre-wrap break-words">
                {resolvedBody || <span className="italic opacity-70">(empty message)</span>}
              </div>
              <div className="text-[10px] text-slate-500 text-right mt-1">Delivered · From {ctx.customer.name}</div>
            </div>
          </div>
        </div>
        <div className="mt-3 px-1 text-xs text-slate-600 space-y-0.5">
          <div>Characters: <span className="font-mono">{charCount}</span>{charCount > 0 && <span className="text-slate-500"> · {segments} segment{segments !== 1 ? "s" : ""}</span>}</div>
          {willMms && (
            <div className="text-amber-700">
              {charCount > 160 ? "Over 160 chars — delivers as multipart SMS or MMS depending on recipient device." : "Has attachment — delivers as MMS."}
            </div>
          )}
          <div className="text-slate-500 italic">Production routing via Twilio (HIPAA BAA). Standard SMS is unencrypted; avoid PHI in body.</div>
        </div>
      </div>
    );
  };

  const channelLabel = channel === "EMAIL" ? "Email" : channel === "FAX" ? "Fax" : "Text";

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
         onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="absolute inset-0 bg-slate-900/50" />
      <div className="relative bg-white rounded-lg shadow-2xl max-w-3xl w-full max-h-[90vh] flex flex-col fade-in">
        <div className="px-5 py-3 border-b border-slate-100 flex items-center justify-between">
          <div className="min-w-0">
            <div className="text-base font-semibold text-slate-900">Preview · {channelLabel}</div>
            <div className="text-xs text-slate-500 mt-0.5">As the recipient will see it. Merge fields resolved against this claim.</div>
          </div>
          <button onClick={onClose} className="p-1.5 hover:bg-slate-100 rounded ml-2">
            <Icon d={ICONS.close} className="w-4 h-4" />
          </button>
        </div>
        <div className="p-6 overflow-y-auto flex-1 bg-slate-50">
          {channel === "EMAIL" && renderEmail()}
          {channel === "FAX" && renderFax()}
          {channel === "TEXT" && renderText()}
        </div>
        <div className="px-5 py-3 border-t border-slate-100 flex justify-end gap-2">
          <button onClick={onClose} className="text-sm px-3 py-1.5 bg-white border border-slate-300 text-slate-700 rounded-md hover:bg-slate-50">Back to edit</button>
          {onSend && (
            <button onClick={onSend} className="text-sm px-3 py-1.5 bg-brand-600 text-white rounded-md hover:bg-brand-700">
              Send {channelLabel.toLowerCase()}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---------- Correspondence tab ---------- */
/* Formal workflow letters with status lifecycle. Locks once SENT. */
function CdCorrespondence({ correspondence, contacts, claim, tenant, currentUser, addCorrespondence, updateCorrespondenceStatus, supersedeCorrespondence, logCorrAudit, showToast }) {
  const [dialog, setDialog] = useState(null);
  const [viewing, setViewing] = useState(null); // correspondence row being viewed
  const isSupervisor = currentUser?.role === "SUPERVISOR";

  const recipientOptions = [
    { id: "AUTO_CARRIER", label: "Auto carrier", items: contacts.autoCarriers || [] },
    { id: "PLAN",         label: "Health plan",  items: contacts.plans || [] },
    { id: "ATTORNEY",     label: "Attorney",     items: contacts.attorney ? [contacts.attorney] : [] },
    { id: "MEMBER",       label: "Member",       items: contacts.member ? [contacts.member] : [] },
    { id: "PROVIDER",     label: "Provider",     items: contacts.providers || [] },
  ];

  const openNewDialog = () => setDialog({
    title: "New correspondence",
    description: "Pick a letter type and recipient. Body is populated from the template and can be edited before sending.",
    fields: [
      { name: "letterType", label: "Letter type", type: "select", required: true,
        defaultValue: "DEMAND",
        options: Object.entries(LETTER_TYPES).map(([k, v]) => ({ value: k, label: `${v.label} (Tier ${v.tier})` })) },
      { name: "recipientType", label: "Recipient party", type: "select", required: true,
        defaultValue: "AUTO_CARRIER",
        options: recipientOptions.filter(o => o.items.length > 0).map(o => ({ value: o.id, label: `${o.label}${o.items[0] ? ` — ${o.items[0].name}` : ""}` })) },
    ],
    submitLabel: "Create draft",
    onSubmit: ({ letterType, recipientType }) => {
      const tpl = TEMPLATES.find(t => t.letterType === letterType);
      const recipient = recipientOptions.find(o => o.id === recipientType)?.items[0];
      addCorrespondence({
        letterType,
        templateId: tpl?.id,
        recipientName: recipient?.name || "(Unassigned)",
        recipientType,
        subject: tpl?.subject || "",
        body: tpl?.body || "",
        status: "DRAFT",
      });
      showToast(`${LETTER_TYPES[letterType]?.label} draft created`);
    },
  });

  const openSendDialog = (c) => setDialog({
    title: `Send: ${LETTER_TYPES[c.letterType]?.label}`,
    description: `To ${c.recipientName}. Choose delivery method; the letter will move to SENT status and a corresponding activity entry will be logged.`,
    fields: [
      { name: "sendMethod", label: "Delivery method", type: "select", required: true,
        defaultValue: "CERTIFIED_MAIL",
        options: SEND_METHODS.map(m => ({ value: m.value, label: m.label })) },
      { name: "sendDate", label: "Send date", type: "date", required: true,
        defaultValue: new Date().toISOString().slice(0, 10) },
    ],
    submitLabel: "Send",
    onSubmit: ({ sendMethod, sendDate }) => {
      updateCorrespondenceStatus(c.id, "SENT", { sendMethod, sendDate });
      showToast(`${LETTER_TYPES[c.letterType]?.label} sent`);
    },
  });

  const openAckDialog = (c) => setDialog({
    title: `Mark acknowledged: ${LETTER_TYPES[c.letterType]?.label}`,
    fields: [
      { name: "ackDate", label: "Acknowledgment date", type: "date", required: true,
        defaultValue: new Date().toISOString().slice(0, 10) },
      { name: "ackNote", label: "Note (optional)", type: "textarea", rows: 2,
        placeholder: "e.g. Adjuster confirmed receipt by phone." },
    ],
    submitLabel: "Mark acknowledged",
    onSubmit: ({ ackDate, ackNote }) => {
      updateCorrespondenceStatus(c.id, "ACKNOWLEDGED", { ackDate, ackNote });
      showToast(`Marked acknowledged`);
    },
  });

  const openRequestEditDialog = (c) => setDialog({
    title: `Request supervisor approval to edit`,
    description: `This letter is locked because it has been ${c.status === "SENT" ? "sent" : c.status.toLowerCase()}. Provide a justification — your supervisor will review the request and either approve the edit or reject it. The request and the eventual outcome are both written to the audit log.`,
    fields: [
      { name: "justification", label: "Justification", type: "textarea", required: true, rows: 4,
        placeholder: "e.g. Typo in claim number — recipient flagged it on intake call. No substantive content change." },
    ],
    submitLabel: "Submit request",
    onSubmit: ({ justification }) => {
      logCorrAudit(c.id, "REQUEST", justification);
      showToast("Supervisor approval requested · logged to Activity");
    },
  });

  const openOverrideDialog = (c) => setDialog({
    title: `Supervisor override — edit locked letter`,
    description: `You are about to unlock a locked letter for editing. This action and your justification will be permanently recorded in the audit log with both your name and the original analyst's name. Proceed only if absolutely necessary.`,
    fields: [
      { name: "justification", label: "Justification (required for audit)", type: "textarea", required: true, rows: 4,
        placeholder: "e.g. Approved typo correction in claim number per analyst request 2026-05-16." },
    ],
    submitLabel: "Override & log",
    danger: true,
    onSubmit: ({ justification }) => {
      logCorrAudit(c.id, "OVERRIDE", justification);
      showToast("Override logged · letter unlocked for edit (prototype)");
    },
  });

  const grouped = [...correspondence].sort((a, b) => {
    const order = { DRAFT: 0, SENT: 1, ACKNOWLEDGED: 2, SUPERSEDED: 3, CLOSED: 4 };
    return (order[a.status] ?? 9) - (order[b.status] ?? 9);
  });

  return (
    <div className="space-y-4 fade-in">
      <div className="flex justify-between items-center flex-wrap gap-2">
        <div className="text-xs text-slate-500">
          {correspondence.length} letter{correspondence.length === 1 ? "" : "s"} on file
          {" · "}
          {correspondence.filter(c => c.status === "DRAFT").length} draft,
          {" "}{correspondence.filter(c => c.status === "SENT").length} sent,
          {" "}{correspondence.filter(c => c.status === "ACKNOWLEDGED").length} acknowledged
        </div>
        <button onClick={openNewDialog}
          className="text-xs px-2.5 py-1.5 bg-brand-600 text-white rounded-md hover:bg-brand-700 flex items-center gap-1">
          <Icon d={ICONS.letter} className="w-3.5 h-3.5" /> New correspondence
        </button>
      </div>

      {correspondence.length === 0 ? (
        <div className="text-sm text-slate-500 bg-slate-50 border border-slate-200 rounded-lg p-4">
          No correspondence yet. Start with a <span className="font-medium">Demand for Reimbursement</span> or <span className="font-medium">COB Questionnaire</span> from the New correspondence button above.
        </div>
      ) : (
        <div className="space-y-2">
          {grouped.map(c => <CorrespondenceRow key={c.id} c={c}
            isSupervisor={isSupervisor}
            allCorrespondence={correspondence}
            onView={() => setViewing(c)}
            onSend={() => openSendDialog(c)}
            onAck={() => openAckDialog(c)}
            onClose={() => updateCorrespondenceStatus(c.id, "CLOSED")}
            onSupersede={() => supersedeCorrespondence(c.id)}
            onRequestEdit={() => openRequestEditDialog(c)}
            onOverride={() => openOverrideDialog(c)}
          />)}
        </div>
      )}

      <div className="text-xs text-slate-500 italic">
        Prototype: send action records the letter as SENT and adds an activity entry; in production the system also generates the PDF, queues for mailing (Lob or PostGrid for physical mail; SendGrid/Postmark for email; eFax/Documo for fax), and stores the rendered PDF in the Records tab automatically.
      </div>

      <Dialog config={dialog} onClose={() => setDialog(null)} />

      {viewing && (
        <CorrespondenceViewer
          c={viewing}
          claim={claim}
          tenant={tenant}
          currentUser={currentUser}
          onClose={() => setViewing(null)}
          onSendFromPreview={viewing.status === "DRAFT" ? () => { const draft = viewing; setViewing(null); openSendDialog(draft); } : null}
          showToast={showToast}
        />
      )}
    </div>
  );
}

function CorrespondenceRow({ c, isSupervisor, allCorrespondence, onView, onSend, onAck, onClose, onSupersede, onRequestEdit, onOverride }) {
  const lt = LETTER_TYPES[c.letterType] || { label: c.letterType, color: "bg-slate-100 text-slate-700" };
  const st = CORRESPONDENCE_STATUS[c.status] || { label: c.status, color: "bg-slate-100 text-slate-700" };
  const sendMethodLabel = SEND_METHODS.find(m => m.value === c.sendMethod)?.label;
  const isLocked = c.status !== "DRAFT";
  const supersedingLetter = c.status === "SUPERSEDED" ? (allCorrespondence || []).find(x => x.supersedesId === c.id) : null;
  return (
    <div className={`border rounded-lg p-3 flex flex-col sm:flex-row sm:items-center gap-3 ${isLocked ? "bg-slate-50 border-slate-300" : "bg-white border-slate-200"}`}>
      <div className="flex-1 min-w-0">
        <div className="flex flex-wrap items-center gap-2">
          <Pill className={lt.color}>{lt.label}</Pill>
          <Pill className={st.color}>{st.label}</Pill>
          {isLocked && (
            <span className="inline-flex items-center gap-1 text-xs text-slate-500" title="Locked — content cannot be edited">
              <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 11c-1.66 0-3 1.34-3 3 0 .74.27 1.42.72 1.94L9 18h6l-.72-2.06A2.97 2.97 0 0015 14c0-1.66-1.34-3-3-3zM6 10V8a6 6 0 0112 0v2" />
              </svg>
              <span>Locked</span>
            </span>
          )}
          {c.supersedesId && <Pill className="bg-violet-50 text-violet-700">Revision of earlier letter</Pill>}
        </div>
        <div className="text-sm text-slate-800 mt-1.5 truncate">{c.subject || "(no subject)"}</div>
        <div className="text-xs text-slate-500 mt-0.5">
          To {c.recipientName}
          {c.sendDate && <> · sent {c.sendDate}{sendMethodLabel ? ` via ${sendMethodLabel}` : ""}{c.sentBy ? ` by ${c.sentBy}` : ""}</>}
          {c.ackDate && <> · acknowledged {c.ackDate}</>}
          {supersedingLetter && <> · superseded by newer draft</>}
        </div>
      </div>
      <div className="flex flex-wrap gap-1 text-xs">
        <button onClick={onView} className="px-2 py-1 border border-slate-300 bg-white rounded-md text-slate-700 hover:bg-slate-50">{c.status === "DRAFT" ? "Preview" : "View"}</button>
        {/* Draft state — unrestricted */}
        {c.status === "DRAFT" && <button onClick={onSend} className="px-2 py-1 bg-brand-600 text-white rounded-md hover:bg-brand-700">Send</button>}
        {/* Sent state — needs acknowledgment tracking */}
        {c.status === "SENT" && <button onClick={onAck} className="px-2 py-1 border border-emerald-300 bg-white text-emerald-800 rounded-md hover:bg-emerald-50">Mark acknowledged</button>}
        {/* Supersede creates a new draft from this one (does not edit sent content) */}
        {(c.status === "SENT" || c.status === "ACKNOWLEDGED") && <button onClick={onSupersede} className="px-2 py-1 border border-amber-300 bg-white text-amber-800 rounded-md hover:bg-amber-50">Supersede</button>}
        {/* Locked-content edit: analyst requests; supervisor overrides */}
        {isLocked && !isSupervisor && <button onClick={onRequestEdit} className="px-2 py-1 border border-slate-300 bg-white text-slate-700 rounded-md hover:bg-slate-50">Request edit</button>}
        {isLocked && isSupervisor && <button onClick={onOverride} className="px-2 py-1 border border-violet-400 bg-violet-50 text-violet-800 rounded-md hover:bg-violet-100">Override edit</button>}
        {c.status !== "CLOSED" && <button onClick={onClose} className="px-2 py-1 border border-slate-300 bg-white text-slate-700 rounded-md hover:bg-slate-50">Close</button>}
      </div>
    </div>
  );
}

/* Merge-field resolver — fills {{path.to.field}} tokens with values from a context object */
function resolveMerges(template, ctx) {
  if (!template) return "";
  return template.replace(/\{\{\s*([\w.]+)\s*\}\}/g, (_, path) => {
    const v = path.split(".").reduce((obj, k) => (obj == null ? undefined : obj[k]), ctx);
    return v == null || v === "" ? `[${path}]` : String(v);
  });
}

function TaskRow({ t, onComplete }) {
  const overdue = t.status !== "DONE" && t.due && t.due < new Date().toISOString().slice(0,10);
  return (
    <li className="bg-white border border-slate-200 rounded-md p-3 flex items-start gap-3">
      <input type="checkbox" checked={t.status === "DONE"} onChange={onComplete} disabled={t.status === "DONE"}

      <div className="flex-1 min-w-0">

          <span>· {t.assignedTo}</span>

}

          <div>
            <div className="text-sm font-semibold text-slate-800">{mod.title}</div>
            <div className="text-xs text-slate-500">Slide {idx + 1} of {slides.length} · ~{mod.estimatedMinutes} min</div>
          </div>
          <button onClick={onClose} className="p-1.5 hover:bg-slate-100 rounded">
            <Icon d={ICONS.close} className="w-4 h-4" />
          </button>
        </div>
        <div className="p-6 flex-1 overflow-y-auto">
          {slide ? (
            <div className="space-y-4">
              <h2 className="text-xl font-semibold text-slate-800">{slide.heading}</h2>
              <p className="text-base text-slate-700 leading-relaxed">{slide.body}</p>
            </div>
          ) : <div className="text-sm text-slate-400">No slides.</div>}
        </div>
        <div className="h-1 bg-slate-200">
          <div className="h-1 bg-brand-500 transition-all" style={{ width: `${((idx + 1) / slides.length) * 100}%` }} />
        </div>
        <div className="px-5 py-3 border-t border-slate-100 flex justify-between items-center">
          <button onClick={() => setIdx(i => i - 1)} disabled={idx === 0}

            ← Previous
          </button>
          <span className="text-xs text-slate-500">{idx + 1} / {slides.length}</span>
          {isLast ? (
            !isComplete ? (

              Next →
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

  const handleSubmit = () => {
    if (!allAnswered) return;
    const correct = questions.filter(q => answers[q.id] === q.answer).length;
    setScore(correct);
    setSubmitted(true);
  };
  const passed = submitted && (score / questions.length) >= 0.80;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
         onClick={e => { if (e.target === e.currentTarget && !submitted) onClose(); }}>
      <div className="absolute inset-0 bg-slate-900/50" />
      <div className="relative bg-white rounded-lg shadow-2xl max-w-2xl w-full flex flex-col fade-in" style={{ maxHeight: "90vh" }}>
        <div className="px-5 py-3 border-b border-slate-100 flex items-center justify-between">
          <div>
            <div className="text-sm font-semibold text-slate-800">{quiz.title}</div>
            <div className="text-xs text-slate-500">{questions.length} question{questions.length !== 1 ? "s" : ""} · 80% to pass</div>
          </div>
          {!submitted && (
            <button onClick={onClose} className="p-1.5 hover:bg-slate-100 rounded">
              <Icon d={ICONS.close} className="w-4 h-4" />
            </button>
          )}
        </div>
        <div className="p-6 overflow-y-auto flex-1 space-y-6">
          {!submitted ? (
            questions.map((q, qi) => (
              <div key={q.id} className="space-y-3">
                <div>
                  <div className="text-sm font-medium text-slate-800">Q{qi + 1}. {q.stem}</div>
                </div>
                <div className="space-y-2">
                  {Object.entries(q.options).map(([key, text]) => (
                    <label key={key}
                      className={`flex items-start gap-2.5 p-2.5 rounded-md border cursor-pointer ${answers[q.id] === key ? "border-brand-400 bg-brand-50" : "border-slate-200 hover:bg-slate-50"}`}>
                      <input type="radio" name={q.id} value={key} checked={answers[q.id] === key}
                        onChange={() => setAnswers(a => ({ ...a, [q.id]: key }))}
                        className="mt-0.5 text-brand-600 shrink-0" />
                      <span className="text-sm text-slate-800"><span className="font-mono text-slate-400">{key}.</span> {text}</span>
                    </label>
                  ))}
                </div>
              </div>
            ))
          ) : (
            <div className="space-y-4">
              <div className={`text-center py-5 rounded-lg ${passed ? "bg-emerald-50 border border-emerald-200" : "bg-rose-50 border border-rose-200"}`}>
                <div className={`text-3xl font-bold ${passed ? "text-emerald-800" : "text-rose-800"}`}>{score} / {questions.length}</div>
                <div className={`text-sm mt-1 font-medium ${passed ? "text-emerald-700" : "text-rose-700"}`}>{passed ? "Passed ✓" : "Not passed — review the reading and try again"}</div>
                {previousBest?.passed && !passed && (
                  <div className="text-xs text-slate-500 mt-1">Your previous passing attempt still counts.</div>
                )}
              </div>
              {questions.map((q, qi) => {
                const userAns = answers[q.id];
                const correct = userAns === q.answer;
                return (
                  <div key={q.id} className={`rounded-md p-3 border text-xs ${correct ? "border-emerald-200 bg-emerald-50" : "border-rose-200 bg-rose-50"}`}>
                    <div className="font-medium text-slate-800 mb-1">Q{qi + 1}. {q.stem}</div>
                    <div className={correct ? "text-emerald-700" : "text-rose-700"}>
                      Your answer: <span className="font-mono">{userAns}</span>. {q.options[userAns]}
                    </div>
                    {!correct && (
                      <div className="text-slate-700 mt-1">
                        Correct: <span className="font-mono">{q.answer}</span>. {q.options[q.answer]}
                      </div>
                    )}
                    <div className="text-slate-600 mt-1 italic">Rationale: {q.rationale}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
        <div className="px-5 py-3 border-t border-slate-100 flex justify-end gap-2">
          {!submitted ? (
            <>
              <button onClick={onClose}
                className="text-sm px-3 py-1.5 border border-slate-300 text-slate-700 rounded-md hover:bg-slate-50">Cancel</button>
              <button onClick={handleSubmit} disabled={!allAnswered}
                className={`text-sm px-3 py-1.5 text-white rounded-md ${allAnswered ? "bg-brand-600 hover:bg-brand-700" : "bg-slate-300 cursor-not-allowed"}`}>
                Submit
              </button>
            </>
          ) : (
            <button onClick={() => passed ? onPass(score, questions.length) : onFail(score, questions.length)}
              className="text-sm px-3 py-1.5 bg-brand-600 text-white rounded-md hover:bg-brand-700">
              {passed ? "Continue →" : "Close"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

         onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="absolute inset-0 bg-slate-900/50" />

            <div className="text-sm font-semibold text-slate-800">{quiz.title}</div>
            <div className="text-xs text-slate-500">Free-response capstone · work through each scenario, then attest</div>

          <button onClick={onClose} className="p-1.5 hover:bg-slate-100 rounded">
            <Icon d={ICONS.close} className="w-4 h-4" />

                <Pill className="bg-slate-100 text-slate-700">Covers {sc.covers}</Pill>

              <div className="bg-slate-50 border border-slate-200 rounded-md p-3">

            </button>
